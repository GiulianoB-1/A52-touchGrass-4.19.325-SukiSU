name: 63 - A52 GKI 5.10 DT-to-Image compatible coverage

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/63-a52-gki-5.10-dt-image-compatible-coverage.yml
      - scripts/63_audit_a52xq_dtb_image_coverage.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-dt-image-compatible-coverage
  cancel-in-progress: true

env:
  INTEGRATED_ARTIFACT_ID: '8421176850'
  EXPECTED_IMAGE_SHA256: 79ca2033d4cf3bcf1759ec1dab7aed5d6a90b49c9946e6ef8a002f3437658701
  EXPECTED_DTB_SHA256: 8e9c6672e0102e88847e1ec759a6328239bbab7e6c417872f7a62b87a3e13b3e

jobs:
  audit:
    name: Audit Lagoon DT compatibles against integrated Image
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 39 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 63 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Install audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl unzip python3 binutils file device-tree-compiler

      - name: Download verified Workflow 62 integrated artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          rm -rf workspace/workflow63-input
          mkdir -p workspace/workflow63-input
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o workspace/workflow63-input/integrated.zip \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${INTEGRATED_ARTIFACT_ID}/zip"
          unzip -q workspace/workflow63-input/integrated.zip \
            -d workspace/workflow63-input/extracted

      - name: Verify Image and Lagoon DTB inputs
        run: |
          set -Eeuo pipefail
          IMAGE="$(find workspace/workflow63-input/extracted -type f \
            -name Image-NOT-FLASHABLE -print -quit)"
          DTB="$(find workspace/workflow63-input/extracted -type f \
            -name lagoon-earlyboot-probe-NOT-FLASHABLE.dtb -print -quit)"
          test -n "$IMAGE" && test -s "$IMAGE"
          test -n "$DTB" && test -s "$DTB"
          printf '%s  %s\n' "$EXPECTED_IMAGE_SHA256" "$IMAGE" | sha256sum -c -
          printf '%s  %s\n' "$EXPECTED_DTB_SHA256" "$DTB" | sha256sum -c -
          test "$(stat -c %s "$IMAGE")" = 48431616
          test "$(stat -c %s "$DTB")" = 401029
          file "$IMAGE" "$DTB" | tee workspace/workflow63-input/input-file-types.txt
          printf 'IMAGE=%s\nDTB=%s\n' "$IMAGE" "$DTB" \
            >> "$GITHUB_ENV"

      - name: Decompile Lagoon DTB
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts/a52xq-gki-5.10-dt-image-compatible-coverage/logs
          dtc -I dtb -O dts \
            -o workspace/workflow63-input/lagoon-decompiled.dts \
            "$DTB" \
            2> artifacts/a52xq-gki-5.10-dt-image-compatible-coverage/logs/dtc-decompile.log
          test -s workspace/workflow63-input/lagoon-decompiled.dts

      - name: Audit enabled compatibles against Image
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-dt-image-compatible-coverage"
          python3 scripts/63_audit_a52xq_dtb_image_coverage.py \
            --image "$IMAGE" \
            --dtb "$DTB" \
            --dts workspace/workflow63-input/lagoon-decompiled.dts \
            --output "$OUT"
          cp workspace/workflow63-input/input-file-types.txt "$OUT/input-file-types.txt"
          cat >> "$OUT/analysis-metadata.txt" <<EOF
          source_workflow=62
          source_run_id=29616826178
          source_artifact_id=${INTEGRATED_ARTIFACT_ID}
          source_artifact_name=a52xq-gki-5.10-integrated-image-dtb-3-NOT-FLASHABLE
          EOF
          find "$OUT" -type f ! -name SHA256SUMS -print0 | sort -z | \
            xargs -0 sha256sum | sed "s#  $OUT/#  #" > "$OUT/SHA256SUMS"

      - name: Enforce compatible coverage invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-dt-image-compatible-coverage
          test -s "$OUT/DT-IMAGE-COVERAGE-REPORT.md"
          test -s "$OUT/compatible-coverage.tsv"
          test -s "$OUT/required-early-boot-coverage.tsv"
          test -s "$OUT/decompiled-lagoon.dts"
          test -s "$OUT/SHA256SUMS"
          test "$(awk -F '\t' 'NR > 1 && $4 == "fail" {count++} END {print count+0}' \
            "$OUT/required-early-boot-coverage.tsv")" = 0
          grep -qx 'required_early_boot_failures=0' "$OUT/analysis-metadata.txt"
          grep -qx 'flashable=no' "$OUT/analysis-metadata.txt"
          (cd "$OUT" && sha256sum -c SHA256SUMS)

      - name: Upload non-flashable DT-to-Image coverage audit
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-dt-image-compatible-coverage-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-dt-image-compatible-coverage
          if-no-files-found: error
          retention-days: 30

      - name: Upload Workflow 63 failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-dt-image-compatible-coverage-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-dt-image-compatible-coverage
            workspace/workflow63-input
          if-no-files-found: warn
          retention-days: 7
