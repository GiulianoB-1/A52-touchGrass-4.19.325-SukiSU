name: 103 - A52 GKI 5.10 Phase 1 compatibility

run-name: Apply low-risk header bridges and duplicate guards

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/103-a52-gki-5.10-phase1-compat.yml'
      - 'scripts/103_apply_a52xq_phase1_compat.py'
      - 'scripts/a52xq_downstream_port_probe_v3.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/103-a52-gki-5.10-phase1-compat.yml'
      - 'scripts/103_apply_a52xq_phase1_compat.py'
      - 'scripts/a52xq_downstream_port_probe_v3.py'

permissions:
  contents: read
  actions: read

concurrency:
  group: a52-gki-5.10-phase1-compat-${{ github.ref }}
  cancel-in-progress: false

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  TOUCHGRASS_SHA: 6bf351bdf18bdb228db79e66f14a7a9c0178e5d7
  WORKFLOW99_ARTIFACT_ID: '8590238316'
  WORKFLOW100_ARTIFACT_ID: '8591698036'
  WORKFLOW101_ARTIFACT_ID: '8593004099'
  WORKFLOW102_PLAN_ARTIFACT_ID: '8593287348'

jobs:
  phase1:
    name: Apply Phase 1 shims and recompile all downstream units
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out diagnostic project
        uses: actions/checkout@v4

      - name: Prepare runner
        run: |
          set -Eeuo pipefail
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio gzip lz4 file dwarves \
            device-tree-compiler
          python3 -m py_compile \
            scripts/a52xq_downstream_port_probe_v3.py \
            scripts/103_apply_a52xq_phase1_compat.py

      - name: Restore pinned GKI source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Download and verify Workflow 99 to 102 artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          download() {
            local name="$1" id="$2"
            mkdir -p "${name}/extracted"
            curl --fail --location --retry 5 --retry-all-errors \
              --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}/zip" \
              --output "${name}/artifact.zip"
            unzip -q "${name}/artifact.zip" -d "${name}/extracted"
            (cd "${name}/extracted" && sha256sum -c SHA256SUMS)
          }
          download workflow99 "${WORKFLOW99_ARTIFACT_ID}"
          download workflow100 "${WORKFLOW100_ARTIFACT_ID}"
          download workflow101 "${WORKFLOW101_ARTIFACT_ID}"
          download workflow102plan "${WORKFLOW102_PLAN_ARTIFACT_ID}"
          test -s workflow99/extracted/full-integrated-rpmh-mode-abi-fix.patch
          test -s workflow99/extracted/diagnostic.config
          test -s workflow100/extracted/preserved.dts
          test -s workflow101/extracted/config/final.config
          test -s workflow101/extracted/compile/compile-incompatibilities.json
          test -s workflow102plan/extracted/adapter-manifest.json
          grep -Fq '"compiler_error_count": 662' \
            workflow102plan/extracted/adapter-manifest.json
          grep -Fq '"1": 182' workflow102plan/extracted/adapter-manifest.json
          grep -Fq 'phase-1-low-risk-compatibility-shims-and-recompile' \
            workflow102plan/extracted/adapter-manifest.json

      - name: Replay hardware-tested Workflow 99 source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd
          PATCH="$PWD/workflow99/extracted/full-integrated-rpmh-mode-abi-fix.patch"
          git -C gki/common apply --check "$PATCH"
          git -C gki/common apply "$PATCH"
          grep -Fq 'A52RPMHABI copy=1' \
            gki/common/drivers/regulator/a52-rpmh-regulator-downstream.c
          grep -Fq 'A52UFSDEP copy=1 HBA_STAGE' \
            gki/common/drivers/scsi/ufs/ufshcd.c

      - name: Fetch exact working TouchGrass source
        run: |
          set -Eeuo pipefail
          rm -rf touchgrass
          git init touchgrass
          git -C touchgrass remote add origin \
            https://github.com/micr0softstore/samsung_android_kernel_a52xq.git
          git -C touchgrass fetch --depth=1 origin "${TOUCHGRASS_SHA}"
          git -C touchgrass checkout --detach FETCH_HEAD
          test "$(git -C touchgrass rev-parse HEAD)" = "${TOUCHGRASS_SHA}"
          test -s touchgrass/techpack/display/msm/sde/sde_kms.c
          test -s touchgrass/drivers/gpu/msm/adreno.c
          test -s touchgrass/drivers/misc/qseecom.c

      - name: Stage complete downstream compile units
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-phase1-compat
          mkdir -p "$OUT/logs" "$OUT/stage" "$OUT/config" "$OUT/compile"
          python3 scripts/a52xq_downstream_port_probe_v3.py \
            --touchgrass touchgrass \
            --gki gki/common \
            --dts workflow100/extracted/preserved.dts \
            --output "$OUT/stage" \
            2>&1 | tee "$OUT/logs/stage-port.log"
          test -s "$OUT/stage/port-probe-stage.json"
          test -s gki/common/drivers/a52_display/msm/sde/sde_kms.c
          test -s gki/common/drivers/gpu/msm/adreno.c
          test -s gki/common/drivers/a52_secure/qseecom.c

      - name: Apply only Phase 1 low-risk compatibility
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-phase1-compat
          python3 scripts/103_apply_a52xq_phase1_compat.py \
            --touchgrass touchgrass \
            --gki gki/common \
            --output "$OUT/stage" \
            2>&1 | tee "$OUT/logs/phase1-stage.log"
          test -s "$OUT/stage/phase1-compat-report.json"
          test -s gki/common/a52-compat/include/asm/sizes.h
          test -s gki/common/a52-compat/include/asm/dma-iommu.h
          test -s gki/common/a52-compat/include/linux/msm_ion.h
          test -s gki/common/drivers/a52_secure/trace_secure_buffer.h
          ! test -e gki/common/a52-compat/include/linux/mm.h
          ! test -e gki/common/a52-compat/include/linux/kernel.h
          ! grep -Fq 'static inline bool drm_can_sleep' \
            gki/common/a52-compat/include/drm/drmP.h
          ! grep -Fq '../../misc/qseecom_kernel.h' \
            gki/common/drivers/a52_secure/smcinvoke.c

      - name: Resolve Phase 1 compile configuration
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-phase1-compat"
          BUILD="$PWD/workspace/gki-phase1-compat-out"
          mkdir -p "$BUILD"
          cp workflow101/extracted/config/final.config "$BUILD/.config"
          cp "$BUILD/.config" "$OUT/config/before.config"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            2>&1 | tee "$OUT/logs/olddefconfig.log"
          cp "$BUILD/.config" "$OUT/config/final.config"

      - name: Recompile all downstream units with keep-going
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-phase1-compat"
          BUILD="$PWD/workspace/gki-phase1-compat-out"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          "$CLANG" --version | tee "$OUT/logs/toolchain.log"
          set +e
          make -k -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            KCFLAGS=-Wno-error=frame-larger-than Image \
            > "$OUT/logs/port-compile.log" 2>&1
          rc=$?
          set -e
          printf '%s\n' "$rc" > "$OUT/compile/make-return-code.txt"
          if test -s "$BUILD/arch/arm64/boot/Image"; then
            cp "$BUILD/arch/arm64/boot/Image" \
              "$OUT/compile/Image-NON-FLASHABLE"
          fi

      - name: Measure Phase 1 closure and remaining incompatibilities
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-phase1-compat
          python3 - <<'PY'
          import collections
          import json
          import re
          from pathlib import Path

          root = Path('artifacts/a52xq-gki-5.10-phase1-compat')
          baseline = json.loads(Path(
              'workflow101/extracted/compile/compile-incompatibilities.json'
          ).read_text())
          lines = (root / 'logs/port-compile.log').read_text(errors='replace').splitlines()
          compiler = re.compile(
              r'^(?P<file>[^:\s][^:]*):(?P<line>\d+):(?P<column>\d+): '
              r'(?P<kind>fatal error|error): (?P<message>.*)$'
          )
          phase1_patterns = [
              re.compile(r"'asm/sizes\.h' file not found"),
              re.compile(r"'linux/msm_ion\.h' file not found"),
              re.compile(r"'asm/dma-iommu\.h' file not found"),
              re.compile(r"'\.\./\.\./misc/qseecom_kernel\.h' file not found"),
              re.compile(r"'trace_secure_buffer\.h' file not found"),
              re.compile(r"redefinition of 'drm_can_sleep'"),
              re.compile(r"redefinition of 'memblock_free_(early|early_nid|late)'"),
              re.compile(r"attribute declaration must precede definition"),
          ]

          entries = []
          signatures = collections.Counter()
          subsystems = collections.Counter()
          residual_phase1 = collections.Counter()

          def subsystem(path):
              if 'drivers/gpu/msm/' in path:
                  return 'display-kgsl'
              if 'drivers/a52_display/' in path or 'techpack/display/' in path:
                  return 'display-sde-dsi-panel'
              if 'drivers/a52_secure/' in path:
                  return 'secure-qseecom'
              return 'kernel-integration'

          for line in lines:
              match = compiler.match(line)
              if not match:
                  continue
              item = match.groupdict()
              item['subsystem'] = subsystem(item['file'])
              entries.append(item)
              signatures[(item['subsystem'], item['message'])] += 1
              subsystems[item['subsystem']] += 1
              for pattern in phase1_patterns:
                  if pattern.search(item['message']):
                      residual_phase1[item['message']] += 1
                      break

          unique = [
              {'subsystem': key[0], 'message': key[1], 'count': count}
              for key, count in signatures.most_common()
          ]
          result = {
              'status': 'phase1-compatibility-compile-complete',
              'flashable': False,
              'hardware_validated': False,
              'make_return_code': int((root / 'compile/make-return-code.txt').read_text()),
              'baseline_compiler_error_count': baseline['compiler_error_count'],
              'compiler_error_count': len(entries),
              'error_reduction': baseline['compiler_error_count'] - len(entries),
              'baseline_unique_error_signature_count': baseline['unique_error_signature_count'],
              'unique_error_signature_count': len(unique),
              'unique_signature_reduction': baseline['unique_error_signature_count'] - len(unique),
              'planned_phase1_error_count': 182,
              'residual_phase1_error_count': sum(residual_phase1.values()),
              'residual_phase1_signatures': dict(residual_phase1.most_common()),
              'phase1_closed': not residual_phase1,
              'subsystem_counts': dict(subsystems),
              'unique_signatures': unique,
              'entries': entries[:1500],
          }
          (root / 'compile/compile-incompatibilities.json').write_text(
              json.dumps(result, indent=2, sort_keys=True) + '\n'
          )

          md = [
              '# A52 Workflow 103 Phase 1 result', '',
              f"- Baseline errors: **{baseline['compiler_error_count']}**",
              f"- Remaining errors: **{len(entries)}**",
              f"- Error reduction: **{result['error_reduction']}**",
              f"- Baseline unique signatures: **{baseline['unique_error_signature_count']}**",
              f"- Remaining unique signatures: **{len(unique)}**",
              f"- Phase 1 residual errors: **{result['residual_phase1_error_count']}**",
              f"- Phase 1 closed: **{result['phase1_closed']}**",
              '', '## Remaining errors by subsystem', '',
          ]
          for name, count in subsystems.most_common():
              md.append(f'- `{name}`: {count}')
          if residual_phase1:
              md += ['', '## Residual Phase 1 signatures', '']
              for message, count in residual_phase1.most_common():
                  md.append(f'- ×{count}: {message}')
          md += ['', '## Highest-frequency remaining incompatibilities', '']
          for item in unique[:120]:
              md.append(f"- `{item['subsystem']}` ×{item['count']}: {item['message']}")
          (root / 'compile/PHASE1-RESULT.md').write_text('\n'.join(md) + '\n')
          PY
          test -s "$OUT/compile/compile-incompatibilities.json"
          test -s "$OUT/compile/PHASE1-RESULT.md"

      - name: Finalize non-flashable Phase 1 artifact
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-phase1-compat
          cp workflow102plan/extracted/PORT-ADAPTER-PLAN.md \
            "$OUT/WORKFLOW102-PORT-ADAPTER-PLAN.md"
          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 PHASE 1 LOW-RISK COMPATIBILITY

          This artifact is not flashable and is not hardware validated.
          Workflow 99 remains the hardware-tested storage-working baseline.

          Workflow 103 applies only the low-risk Phase 1 plan: selective missing-only
          compatibility headers, removed include shims, and duplicate-definition guards.
          It deliberately does not modify MM accounting, mmap locking, timekeeping,
          interrupts, clock/regulator behavior, PM QoS, display formats, IOMMU/DMA
          semantics, or QSEECom ioctl/shared-memory ownership.

          Read compile/PHASE1-RESULT.md for the measured reduction from Workflow 101.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"
          python3 - <<'PY'
          import json
          from pathlib import Path
          root = Path('artifacts/a52xq-gki-5.10-phase1-compat')
          result = json.loads((root / 'compile/compile-incompatibilities.json').read_text())
          final = {
              'status': 'phase1-low-risk-compatibility-complete',
              'flashable': False,
              'hardware_validated': False,
              'workflow99_baseline_preserved': True,
              'compiler_error_count': result['compiler_error_count'],
              'error_reduction': result['error_reduction'],
              'unique_error_signature_count': result['unique_error_signature_count'],
              'unique_signature_reduction': result['unique_signature_reduction'],
              'residual_phase1_error_count': result['residual_phase1_error_count'],
              'phase1_closed': result['phase1_closed'],
          }
          (root / 'final-state.json').write_text(
              json.dumps(final, indent=2, sort_keys=True) + '\n'
          )
          PY
          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | \
              xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Upload Workflow 103 Phase 1 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-phase1-compat-${{ github.run_number }}-NON-FLASHABLE
          path: artifacts/a52xq-gki-5.10-phase1-compat
          if-no-files-found: error
          retention-days: 14

      - name: Require complete Phase 1 closure
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path('artifacts/a52xq-gki-5.10-phase1-compat/final-state.json')
          state = json.loads(path.read_text())
          if not state['phase1_closed']:
              raise SystemExit(
                  f"Phase 1 still has {state['residual_phase1_error_count']} classified errors"
              )
          PY
