name: 25 - Linux 4.19.325 ReSukiSU A52xq flashable build

on:
  pull_request:
    paths:
      - '.github/workflows/25-linux-4.19.325-resukisu-flashable.yml'
      - 'scripts/common.sh'
      - 'scripts/01_prepare_source.sh'
      - 'scripts/03_apply_linux_4.19.153.sh'
      - 'scripts/04_apply_linux_4.19.154.sh'
      - 'scripts/05_merge_linux_4.19.325.sh'
      - 'scripts/05_merge_linux_4.19.325.py'
      - 'scripts/06*_linux_4.19.325*.sh'
      - 'scripts/07_patch_resukisu_exec_hook.sh'
      - 'scripts/08_build_linux_4.19.153_resukisu_safe.sh'
      - 'scripts/08_build_resukisu_safe_checkpoint.sh'
      - 'scripts/09_package_a52xq_anykernel.sh'
      - 'sources.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a52-linux-4.19.325-flashable-${{ github.ref }}
  cancel-in-progress: true

env:
  JOBS: '4'
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G
  ANYKERNEL_COMMIT: 1c9a500dd4aa8081952523126e97eb155aed941b

jobs:
  build:
    name: Build and package touchGrass Linux 4.19.325 + ReSukiSU for A52xq
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils zip unzip make gcc g++ bc bison flex ccache patch \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils file tar

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: a52xq-linux-4.19.325-flashable-ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a52xq-linux-4.19.325-ccache-${{ runner.os }}-
            a52xq-linux-4.19.250-ccache-${{ runner.os }}-

      - name: Prepare exact touchGrass v1.5.1 source
        run: |
          chmod +x scripts/*.sh scripts/*.py
          ./scripts/01_prepare_source.sh

      - name: Apply and resolve official Linux 4.19.153 update
        run: ./scripts/03_apply_linux_4.19.153.sh

      - name: Apply and resolve official Linux 4.19.154 update
        run: ./scripts/04_apply_linux_4.19.154.sh

      - name: Three-way merge directly to Linux 4.19.325
        run: |
          set -o pipefail
          ./scripts/05_merge_linux_4.19.325.sh 2>&1 | tee artifacts/direct-merge-linux-4.19.325.log

      - name: Apply ordered Linux 4.19.325 compatibility repairs
        run: |
          set -Eeuo pipefail
          for repair in scripts/06*_linux_4.19.325*.sh; do
            printf 'Running %s\n' "$repair"
            "$repair"
          done

      - name: Replace legacy exec dispatch with ReSukiSU manual hook
        run: ./scripts/07_patch_resukisu_exec_hook.sh

      - name: Integrate safe ReSukiSU and build Linux 4.19.325
        run: |
          set -o pipefail
          ./scripts/08_build_resukisu_safe_checkpoint.sh 4.19.325 \
            2>&1 | tee artifacts/linux-4.19.325-resukisu-safe.log

      - name: Check out pinned AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          ref: ${{ env.ANYKERNEL_COMMIT }}
          path: packaging/AnyKernel3
          fetch-depth: 1

      - name: Package and verify A52xq flashable ZIP
        run: |
          ./scripts/09_package_a52xq_anykernel.sh \
            4.19.325 \
            artifacts/Image-touchgrass-4.19.325-resukisu-v4.1.0-safe \
            packaging/AnyKernel3 \
            release

      - name: Record source state
        if: always()
        run: |
          mkdir -p artifacts
          df -h > artifacts/runner-disk.txt
          free -h > artifacts/runner-memory.txt
          uname -a > artifacts/runner-uname.txt
          ccache --show-stats > artifacts/ccache-final.txt 2>&1 || true
          if [ -d workspace/touchgrass-a52xq/.git ]; then
            git -C workspace/touchgrass-a52xq status --short > artifacts/kernel-source-status.txt || true
            git -C workspace/touchgrass-a52xq diff --stat > artifacts/kernel-source-diff.stat.txt || true
            git -C workspace/touchgrass-a52xq diff --check > artifacts/kernel-source-diff-check.txt 2>&1 || true
          fi
          if [ -d workspace/touchgrass-a52xq/KernelSU/.git ]; then
            git -C workspace/touchgrass-a52xq rev-parse HEAD > artifacts/resukisu-head.txt || true
          fi

      - name: Upload A52xq flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: touchGrass-A52xq-Linux-4.19.325-ReSukiSU-v4.1.0-BUILD-VERIFIED-FLASHABLE-${{ github.run_number }}
          path: release/
          if-no-files-found: error
          retention-days: 14

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-linux-4.19.325-resukisu-flashable-${{ github.run_number }}-diagnostics
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
