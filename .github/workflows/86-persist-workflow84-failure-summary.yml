name: 86 - Persist Workflow 84 failure summary

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/86-persist-workflow84-failure-summary.yml'

permissions:
  actions: read
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download failed job log and extract error context
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          JOB_ID: '88107053852'
        run: |
          set -Eeuo pipefail
          mkdir -p diagnostics
          gh api "repos/${REPO}/actions/jobs/${JOB_ID}/logs" > diagnostics/workflow84-full.log
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('diagnostics/workflow84-full.log')
          lines = path.read_text(errors='replace').splitlines()
          patterns = [
              r'error:', r'undefined reference', r'no rule to make target',
              r'build failed', r'command failed', r'process completed with exit code',
              r'FAILED:', r'make(?:\[[0-9]+\])?: \*\*\*', r'grep: ',
          ]
          rx = re.compile('|'.join(patterns), re.I)
          hit_indexes = [i for i, line in enumerate(lines) if rx.search(line)]
          selected = set()
          for i in hit_indexes:
              selected.update(range(max(0, i - 8), min(len(lines), i + 9)))
          selected.update(range(max(0, len(lines) - 180), len(lines)))
          output = []
          last = None
          for i in sorted(selected):
              if last is not None and i > last + 1:
                  output.append('...')
              output.append(f'{i + 1}: {lines[i]}')
              last = i
          Path('diagnostics/workflow84-failure-summary.txt').write_text(
              '\n'.join(output[-500:]) + '\n', encoding='utf-8'
          )
          PY
          rm diagnostics/workflow84-full.log

      - name: Commit summary to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/workflow84-failure-summary.txt
          git commit -m 'Record Workflow 84 failure summary'
          git push origin HEAD:main
