name: 65 - A52 GKI 5.10 QSMMU v500 port-scope analysis

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/65-a52-gki-5.10-qsmmu-v500-port-scope.yml
      - scripts/65_analyze_a52xq_qsmmu_v500.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-qsmmu-v500-port-scope
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  TOUCHGRASS_COMMIT: 6bf351bdf18bdb228db79e66f14a7a9c0178e5d7

jobs:
  analyze:
    name: Discover downstream QSMMU v500 source and API scope
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 41 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 65 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Install analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends git python3 ca-certificates

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate and clean GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

      - name: Restore pinned touchGrass source
        id: touchgrass-cache
        uses: actions/cache/restore@v4
        with:
          path: workspace/touchgrass-a52xq
          key: a52xq-touchgrass-linux-4.19.200-main-v2-${{ runner.os }}-${{ env.TOUCHGRASS_COMMIT }}

      - name: Validate touchGrass source
        run: |
          set -Eeuo pipefail
          test '${{ steps.touchgrass-cache.outputs.cache-hit }}' = true
          test -d workspace/touchgrass-a52xq/.git
          test "$(git -C workspace/touchgrass-a52xq rev-parse HEAD)" = "${TOUCHGRASS_COMMIT}"
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200

      - name: Analyze QSMMU v500 downstream source scope
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-qsmmu-v500-port-scope
          rm -rf "$OUT"
          mkdir -p "$OUT"
          python3 scripts/65_analyze_a52xq_qsmmu_v500.py \
            --gki gki/common \
            --touchgrass workspace/touchgrass-a52xq \
            --output "$OUT"

      - name: Enforce QSMMU source-analysis invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-qsmmu-v500-port-scope
          test -s "$OUT/PORT-SCOPE-REPORT.md"
          test -s "$OUT/compatible-and-symbol-hits.tsv"
          test -s "$OUT/source-inventory.tsv"
          test -s "$OUT/analysis-metadata.txt"
          test -s "$OUT/SHA256SUMS"
          test -d "$OUT/source-snapshot/touchgrass"
          test -d "$OUT/source-snapshot/gki"
          grep -Fxq \
            'artifact_type=a52xq-gki-5.10-qsmmu-v500-source-gap-analysis-not-flashable' \
            "$OUT/analysis-metadata.txt"
          grep -Fxq 'automatic_compatible_aliasing=forbidden' "$OUT/analysis-metadata.txt"
          grep -Fxq 'flashable=no' "$OUT/analysis-metadata.txt"
          test "$(awk -F= '$1 == "touchgrass_exact_qsmmu_compatible_hits" {print $2}' \
            "$OUT/analysis-metadata.txt")" -gt 0
          test "$(awk -F= '$1 == "downstream_candidate_c_files" {print $2}' \
            "$OUT/analysis-metadata.txt")" -gt 0
          ! find "$OUT" -type f \( -name Image -o -name boot.img -o -name '*.dtb' \) | grep -q .
          (cd "$OUT" && sha256sum -c SHA256SUMS)
          cat "$OUT/analysis-metadata.txt"
          sed -n '1,400p' "$OUT/PORT-SCOPE-REPORT.md"

      - name: Upload non-flashable QSMMU v500 port-scope analysis
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-qsmmu-v500-port-scope-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-qsmmu-v500-port-scope
          if-no-files-found: error
          retention-days: 30

      - name: Upload Workflow 65 failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-qsmmu-v500-port-scope-failure-${{ github.run_number }}
          path: artifacts/a52xq-gki-5.10-qsmmu-v500-port-scope
          if-no-files-found: warn
          retention-days: 7
