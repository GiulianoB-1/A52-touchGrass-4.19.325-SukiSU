name: 99 - A52 GKI 5.10 RPMh mode ABI fix

run-name: Build A52 GKI 5.10 RPMh regulator mode ABI fix

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/99-a52-gki-5.10-rpmh-mode-abi-fix.yml'
      - 'scripts/99_stage_a52xq_rpmh_mode_abi_fix.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/99-a52-gki-5.10-rpmh-mode-abi-fix.yml'
      - 'scripts/99_stage_a52xq_rpmh_mode_abi_fix.py'

permissions:
  contents: read
  actions: read

concurrency:
  group: a52-gki-5.10-rpmh-mode-abi-fix-${{ github.ref }}
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  WORKFLOW98_ARTIFACT_ID: '8576994569'

jobs:
  build:
    name: Build RPMh mode ABI fix candidate
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out diagnostic project
        uses: actions/checkout@v4

      - name: Prepare runner
        run: |
          set -Eeuo pipefail
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio gzip file dwarves device-tree-compiler

      - name: Restore pinned GKI source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Download and verify Workflow 98 candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workflow98/extracted
          curl --fail --location --retry 5 --retry-all-errors \
            --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW98_ARTIFACT_ID}/zip" \
            --output workflow98/artifact.zip
          unzip -q workflow98/artifact.zip -d workflow98/extracted
          (cd workflow98/extracted && sha256sum -c SHA256SUMS)
          test -s workflow98/extracted/full-integrated-ufs-dependency-audit.patch
          test -s workflow98/extracted/diagnostic.config
          test -s workflow98/extracted/boot.img
          grep -Fq 'A52UFSDEP copy=1 HBA_STAGE' \
            workflow98/extracted/full-integrated-ufs-dependency-audit.patch
          grep -Fq 'a52-rpmh-regulator-downstream.c' \
            workflow98/extracted/full-integrated-ufs-dependency-audit.patch

      - name: Replay exact Workflow 98 source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

          PATCH="$PWD/workflow98/extracted/full-integrated-ufs-dependency-audit.patch"
          git -C gki/common apply --check "$PATCH"
          git -C gki/common apply "$PATCH"

          test -s gki/common/drivers/regulator/a52-rpmh-regulator-downstream.c
          test -s gki/common/include/dt-bindings/regulator/qcom,rpmh-regulator-levels.h
          test -s gki/common/drivers/scsi/ufs/ufshcd.c
          grep -Fq '#include <dt-bindings/regulator/qcom,rpmh-regulator.h>' \
            gki/common/drivers/regulator/a52-rpmh-regulator-downstream.c
          grep -Fq 'A52UFSDEP copy=1 HBA_STAGE' \
            gki/common/drivers/scsi/ufs/ufshcd.c

      - name: Stage downstream RPMh mode ABI fix
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-rpmh-mode-abi-fix
          mkdir -p "$OUT/logs" "$OUT/rpmh-mode-abi" "$OUT/symbols"

          python3 scripts/99_stage_a52xq_rpmh_mode_abi_fix.py \
            --gki gki/common \
            --output "$OUT/rpmh-mode-abi"

          git -C gki/common diff --check
          grep -Fq '#include <dt-bindings/regulator/qcom,rpmh-regulator-levels.h>' \
            gki/common/drivers/regulator/a52-rpmh-regulator-downstream.c
          ! grep -Fq '#include <dt-bindings/regulator/qcom,rpmh-regulator.h>' \
            gki/common/drivers/regulator/a52-rpmh-regulator-downstream.c
          grep -Fq 'A52RPMHABI copy=1' \
            gki/common/drivers/regulator/a52-rpmh-regulator-downstream.c

          while IFS= read -r -d '' file; do
            git -C gki/common add -N -- "$file"
          done < <(git -C gki/common ls-files --others --exclude-standard -z)
          git -C gki/common diff --binary --no-ext-diff \
            > "$OUT/full-integrated-rpmh-mode-abi-fix.patch"
          test -s "$OUT/full-integrated-rpmh-mode-abi-fix.patch"
          grep -Fq 'qcom,rpmh-regulator-levels.h' \
            "$OUT/full-integrated-rpmh-mode-abi-fix.patch"

      - name: Configure diagnostic kernel
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-rpmh-mode-abi-fix"
          BUILD="$PWD/workspace/gki-rpmh-mode-abi-out"
          mkdir -p "$BUILD"
          cp workflow98/extracted/diagnostic.config "$BUILD/.config"

          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            2>&1 | tee "$OUT/logs/olddefconfig.log"
          cp "$BUILD/.config" "$OUT/diagnostic.config"

          grep -Fxq 'CONFIG_REGULATOR=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_REGULATOR_QCOM_RPMH=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_QCOM_RPMH=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_QCOM_COMMAND_DB=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_SCSI_UFSHCD=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_SCSI_UFS_QCOM=y' "$BUILD/.config"

      - name: Build Image and relevant symbols
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-rpmh-mode-abi-fix"
          BUILD="$PWD/workspace/gki-rpmh-mode-abi-out"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          "$CLANG" --version | tee "$OUT/logs/toolchain.log"
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            KCFLAGS=-Wno-error=frame-larger-than Image \
            2>&1 | tee "$OUT/logs/Image.log"

          test -s "$BUILD/arch/arm64/boot/Image"
          test -s "$BUILD/vmlinux"
          test -s "$BUILD/System.map"
          test -s "$BUILD/drivers/regulator/a52-rpmh-regulator-downstream.o"
          test -s "$BUILD/drivers/scsi/ufs/ufshcd.o"
          test -s "$BUILD/drivers/scsi/ufs/ufs-qcom.o"

          cp "$BUILD/arch/arm64/boot/Image" "$OUT/Image"
          cp "$BUILD/vmlinux" "$OUT/symbols/vmlinux"
          cp "$BUILD/System.map" "$OUT/symbols/System.map"
          cp "$BUILD/drivers/regulator/a52-rpmh-regulator-downstream.o" \
            "$OUT/symbols/a52-rpmh-regulator-downstream.o"
          cp "$BUILD/drivers/scsi/ufs/ufshcd.o" "$OUT/symbols/ufshcd.o"
          cp "$BUILD/drivers/scsi/ufs/ufs-qcom.o" "$OUT/symbols/ufs-qcom.o"

          llvm-nm -n "$BUILD/vmlinux" | \
            grep -E ' (rpmh_regulator_init|rpmh_regulator_probe|rpmh_regulator_parse_vrm_modes|ufshcd_hba_init|ufshcd_get_vreg|ufs_qcom_init)$' \
            > "$OUT/symbols/rpmh-ufs-symbols.txt"
          llvm-objdump -dr "$BUILD/drivers/regulator/a52-rpmh-regulator-downstream.o" \
            > "$OUT/symbols/a52-rpmh-regulator-downstream.disassembly.txt"

          grep -aFq 'A52RPMHABI copy=1 pass=%d ret=%d lpm=%d auto=%d hpm=%d count=%d' "$OUT/Image"
          grep -aFq 'A52RPMHREG READY' "$OUT/Image"
          grep -aFq 'A52UFSDEP copy=1 HBA_STAGE' "$OUT/Image"
          grep -aFq 'A52ICE copy=1 SAFE_BYPASS' "$OUT/Image"
          gzip -n -9 -c "$OUT/Image" > "$OUT/Image.gz"
          gzip -t "$OUT/Image.gz"

      - name: Repack and audit boot image
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-rpmh-mode-abi-fix
          python3 scripts/38_repack_a52_p1_boot.py \
            --source workflow98/extracted/boot.img \
            --kernel "$OUT/Image.gz" \
            --output "$OUT/boot.img" \
            --report "$OUT/repack-report.json"

          python3 - <<'PY'
          import hashlib
          import importlib.util
          import json
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              'a52_boot_repack', 'scripts/38_repack_a52_p1_boot.py'
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          source_path = Path('workflow98/extracted/boot.img')
          output = Path('artifacts/a52xq-gki-5.10-rpmh-mode-abi-fix')
          output_path = output / 'boot.img'
          image_path = output / 'Image.gz'
          src = module.parse_boot(source_path.read_bytes())
          new = module.parse_boot(output_path.read_bytes())

          checks = {
              'partition_size_preserved': (
                  output_path.stat().st_size
                  == source_path.stat().st_size
                  == 100663296
              ),
              'replacement_kernel_used': (
                  hashlib.sha256(new['kernel']).digest()
                  == hashlib.sha256(image_path.read_bytes()).digest()
              ),
              'workflow98_ramdisk_preserved': new['ramdisk'] == src['ramdisk'],
              'second_preserved': new['second'] == src['second'],
              'reserved_dtb_preserved': new['dtb'] == src['dtb'],
              'diagnostic_cmdline_preserved': new['cmdline'] == src['cmdline'],
              'ramoops_reservation_present': (
                  b'a52-ramoops-reserved@b1b00000' in new['dtb']
              ),
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('final audit failed: ' + ', '.join(failed))

          (output / 'final-audit.json').write_text(
              json.dumps(
                  {
                      'status': 'rpmh-mode-abi-fix-candidate',
                      'hardware_validated': False,
                      'input': 'successful Workflow 98 run 1 artifact',
                      'behavior_change': (
                          'use Samsung downstream RPMh mode-number ABI for the '
                          'copied downstream regulator driver; no dummy regulator '
                          'and no UFS power bypass'
                      ),
                      'checks': checks,
                  },
                  indent=2,
                  sort_keys=True,
              )
              + '\n',
              encoding='utf-8',
          )
          PY

      - name: Finalize audited candidate
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-rpmh-mode-abi-fix

          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 RPMH REGULATOR MODE ABI FIX

          Workflow 98 proved that vdd-hba and every UFS clock succeeded, but
          devm_regulator_get("vcc") returned -EPROBE_DEFER. The live vcc supplier
          is pm6150a_l7 under the ldoe7 RPMh aggregate provider. That provider
          had probed and failed with -EINVAL while parsing qcom,supported-modes.

          The copied Samsung downstream regulator driver was compiled against
          Android common 5.10's upstream mode ABI (RET/LPM/AUTO/HPM = 0/1/2/3),
          while Samsung's downstream DT uses PASS/RET/LPM/AUTO/HPM = 0/1/2/3/4.
          This candidate switches only that copied driver to the matching
          downstream header and enforces the numeric ABI at compile time.

          No dummy regulator or additional UFS rail bypass is introduced.
          This image is not hardware-validated.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/candidate-status.tsv"
          printf 'workflow98-source-replayed\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'downstream-mode-header-used\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'mode-abi-compile-guard\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'workflow98-ufs-audit-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'additional-power-bypass\tno\n' >> "$OUT/candidate-status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/candidate-status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | \
              xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )
          test "$(stat -c %s "$OUT/boot.img")" = 100663296

      - name: Upload RPMh mode ABI fix candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-rpmh-mode-abi-fix-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-gki-5.10-rpmh-mode-abi-fix
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-rpmh-mode-abi-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-rpmh-mode-abi-fix
            workspace/gki-rpmh-mode-abi-out/.config
          if-no-files-found: warn
          retention-days: 14
