name: Probe latest Workflow 95 status

# Refresh 5: capture the latest run and failed build log tail.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/zz-probe-workflow95-status.yml'

permissions:
  actions: read
  contents: write

jobs:
  probe:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Record latest Workflow 95 run
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          mkdir -p .github/diagnostics
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ['REPOSITORY']
          token = os.environ['GH_TOKEN']
          workflow = '95-a52-gki-5.10-ufs-bridge-flight-recorder.yml'
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'workflow95-status-probe',
          }

          def request(url):
              return urllib.request.Request(url, headers=headers)

          def get(url):
              with urllib.request.urlopen(request(url)) as response:
                  return json.load(response)

          def get_text(url):
              with urllib.request.urlopen(request(url)) as response:
                  return response.read().decode('utf-8', errors='replace')

          base = f'https://api.github.com/repos/{repo}'
          runs = get(f'{base}/actions/workflows/{workflow}/runs?branch=main&per_page=5')
          latest = runs['workflow_runs'][0]
          run_id = latest['id']
          jobs = get(f'{base}/actions/runs/{run_id}/jobs?per_page=100')['jobs']
          artifacts = get(f'{base}/actions/runs/{run_id}/artifacts?per_page=100')['artifacts']

          build_job = next(
              (job for job in jobs if job.get('name', '').startswith('Build UFS PHY bridge')),
              None,
          )
          log_tail = None
          if build_job and build_job.get('status') == 'completed':
              try:
                  log_text = get_text(f"{base}/actions/jobs/{build_job['id']}/logs")
                  log_tail = '\n'.join(log_text.splitlines()[-240:])
              except Exception as exc:
                  log_tail = f'log retrieval failed: {type(exc).__name__}: {exc}'

          payload = {
              'workflow': workflow,
              'run': {
                  key: latest.get(key)
                  for key in (
                      'id', 'run_number', 'run_attempt', 'event', 'status', 'conclusion',
                      'head_branch', 'head_sha', 'created_at', 'updated_at', 'run_started_at',
                      'html_url'
                  )
              },
              'jobs': [
                  {
                      'id': job.get('id'),
                      'name': job.get('name'),
                      'status': job.get('status'),
                      'conclusion': job.get('conclusion'),
                      'started_at': job.get('started_at'),
                      'completed_at': job.get('completed_at'),
                      'html_url': job.get('html_url'),
                      'steps': [
                          {
                              'number': step.get('number'),
                              'name': step.get('name'),
                              'status': step.get('status'),
                              'conclusion': step.get('conclusion'),
                          }
                          for step in job.get('steps', [])
                      ],
                  }
                  for job in jobs
              ],
              'artifacts': [
                  {
                      'id': artifact.get('id'),
                      'name': artifact.get('name'),
                      'size_in_bytes': artifact.get('size_in_bytes'),
                      'expired': artifact.get('expired'),
                      'created_at': artifact.get('created_at'),
                      'expires_at': artifact.get('expires_at'),
                  }
                  for artifact in artifacts
              ],
              'build_log_tail': log_tail,
          }
          Path('.github/diagnostics/latest-workflow95.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY

      - name: Commit probe result
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/diagnostics/latest-workflow95.json
          git commit -m 'Record latest Workflow 95 status'
          git push
