name: 13 - Linux 4.19.159 five-version checkpoint diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/13-linux-4.19.159-checkpoint-diagnostics.yml'
      - 'scripts/common.sh'
      - 'scripts/01_prepare_source.sh'
      - 'scripts/03_apply_linux_4.19.153.sh'
      - 'scripts/04_apply_linux_4.19.154.sh'
      - 'scripts/05a_diagnose_linux_checkpoint.sh'
      - 'sources.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a52-linux-4.19.159-checkpoint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Diagnose touchGrass Linux 4.19.154 to 4.19.159
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git xz-utils make python3 tar

      - name: Prepare exact touchGrass source
        run: |
          chmod +x scripts/*.sh
          ./scripts/01_prepare_source.sh

      - name: Apply reviewed Linux 4.19.153 update
        run: ./scripts/03_apply_linux_4.19.153.sh

      - name: Apply reviewed Linux 4.19.154 update
        run: ./scripts/04_apply_linux_4.19.154.sh

      - name: Diagnose official Linux 4.19.154 to 4.19.159 delta
        run: |
          set -o pipefail
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.154 4.19.159 \
            2>&1 | tee artifacts/checkpoint-4.19.154-to-4.19.159.log

      - name: Upload checkpoint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-linux-4.19.159-checkpoint-diagnostics
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
