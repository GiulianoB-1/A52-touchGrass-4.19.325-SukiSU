name: 95 - A52 GKI 5.10 UFS bridge full flight recorder

run-name: Build A52 GKI 5.10 UFS PHY bridge and single-shot storage recorder

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/95-a52-gki-5.10-ufs-bridge-flight-recorder.yml'
      - 'scripts/94_stage_a52xq_ufs_live_trace.py'
      - 'scripts/94b_stage_a52xq_ufs_phy_bridge.py'
      - 'scripts/a52_diag94_common.py'
      - 'scripts/a52_diag94_core.py'
      - 'scripts/a52_diag94_extra.py'
      - 'scripts/a52_diag94_printk.py'
      - 'scripts/93_stage_a52xq_pid1_exit_trace.py'
      - 'scripts/92_stage_a52xq_post_init_flight_recorder.py'
      - 'scripts/91_stage_a52xq_first_irq_trace.py'
      - 'scripts/83_stage_a52xq_early_start_kernel_breadcrumbs.py'
      - 'scripts/75_stage_a52xq_msm_watchdog.py'
      - 'scripts/38_repack_a52_p1_boot.py'

permissions:
  contents: read
  actions: read

concurrency:
  group: a52-gki-5.10-ufs-bridge-flight-recorder
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  WORKFLOW68_ARTIFACT_ID: '8427146475'
  WORKFLOW78_ARTIFACT_ID: '8428992052'

jobs:
  build:
    name: Build UFS PHY bridge and storage flight recorder boot image
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out diagnostic project
        uses: actions/checkout@v4

      - name: Prepare runner
        run: |
          set -Eeuo pipefail
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio gzip file dwarves device-tree-compiler

      - name: Restore pinned GKI source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Replay proven integrated A52 port
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

          mkdir -p workflow68/extracted
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW68_ARTIFACT_ID}/zip" \
            --output workflow68/artifact.zip
          unzip -q workflow68/artifact.zip -d workflow68/extracted
          (cd workflow68/extracted && sha256sum -c SHA256SUMS)
          git -C gki/common apply --check "$PWD/workflow68/extracted/integrated-port.patch"
          git -C gki/common apply "$PWD/workflow68/extracted/integrated-port.patch"

      - name: Stage full storage recorder and PHY bridge
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder
          mkdir -p "$OUT/logs" "$OUT/watchdog-bridge" \
            "$OUT/early-start-breadcrumbs" "$OUT/first-irq-trace" \
            "$OUT/post-init-flight-recorder" "$OUT/pid1-exit-trace" \
            "$OUT/ufs-flight-recorder" "$OUT/ufs-phy-bridge"

          python3 scripts/75_stage_a52xq_msm_watchdog.py \
            --gki gki/common --output "$OUT/watchdog-bridge"
          python3 scripts/83_stage_a52xq_early_start_kernel_breadcrumbs.py \
            --gki gki/common --output "$OUT/early-start-breadcrumbs"
          python3 scripts/91_stage_a52xq_first_irq_trace.py \
            --gki gki/common --output "$OUT/first-irq-trace"
          python3 scripts/92_stage_a52xq_post_init_flight_recorder.py \
            --gki gki/common --output "$OUT/post-init-flight-recorder"
          python3 scripts/93_stage_a52xq_pid1_exit_trace.py \
            --gki gki/common --output "$OUT/pid1-exit-trace"
          python3 scripts/94_stage_a52xq_ufs_live_trace.py \
            --gki gki/common --output "$OUT/ufs-flight-recorder"
          python3 scripts/94b_stage_a52xq_ufs_phy_bridge.py \
            --gki gki/common --output "$OUT/ufs-phy-bridge"

          git -C gki/common diff --check
          grep -Fq 'A52UFS copy=1 PROBE_BEGIN' gki/common/drivers/scsi/ufs/ufs-qcom.c
          grep -Fq 'CORE stage=link_startup' gki/common/drivers/scsi/ufs/ufshcd.c
          grep -Fq 'SD stage=device_add_disk' gki/common/drivers/scsi/sd.c
          grep -Fq 'SNAPSHOT begin' gki/common/drivers/scsi/ufs/a52-ufs-live-trace.c
          grep -Fq 'A52LOG seq=%u' gki/common/kernel/printk/printk.c
          grep -Fq 'qcom,ufs-phy-qmp-v3' gki/common/drivers/phy/qualcomm/phy-qcom-qmp.c
          grep -Fq 'A52PHY copy=1 MATCH' gki/common/drivers/phy/qualcomm/phy-qcom-qmp.c
          grep -Fq 'A52DEV copy=1 DEFER' gki/common/drivers/base/dd.c

          git -C gki/common diff --binary --no-ext-diff \
            > "$OUT/full-integrated-ufs-bridge-flight-recorder.patch"
          test -s "$OUT/full-integrated-ufs-bridge-flight-recorder.patch"

      - name: Configure diagnostic kernel
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder"
          BUILD="$PWD/workspace/gki-ufs-bridge-flight-recorder-out"
          mkdir -p "$BUILD"
          cp workflow68/extracted/integrated.config "$BUILD/.config"

          for symbol in \
            WATCHDOG WATCHDOG_CORE WATCHDOG_HANDLE_BOOT_ENABLED QCOM_WDT \
            PRINTK_TIME PSTORE PSTORE_RAM PSTORE_CONSOLE PSTORE_PMSG \
            SCSI BLK_DEV_SD SCSI_UFSHCD SCSI_UFSHCD_PLATFORM SCSI_UFS_QCOM \
            GENERIC_PHY PHY_QCOM_QMP QCOM_SCM EFI_PARTITION MSDOS_PARTITION; do
            gki/common/scripts/config --file "$BUILD/.config" --enable "$symbol"
          done
          gki/common/scripts/config --file "$BUILD/.config" --disable TRIM_UNUSED_KSYMS
          gki/common/scripts/config --file "$BUILD/.config" --set-str UNUSED_KSYMS_WHITELIST ''

          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            2>&1 | tee "$OUT/logs/olddefconfig.log"
          cp "$BUILD/.config" "$OUT/diagnostic.config"

          grep -Fxq 'CONFIG_SCSI_UFS_QCOM=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_SCSI_UFSHCD_PLATFORM=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_BLK_DEV_SD=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_PHY_QCOM_QMP=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_EFI_PARTITION=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_PSTORE_RAM=y' "$BUILD/.config"

      - name: Build bridge flight recorder Image
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder"
          BUILD="$PWD/workspace/gki-ufs-bridge-flight-recorder-out"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          "$CLANG" --version | tee "$OUT/logs/toolchain.log"
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            KCFLAGS=-Wno-error=frame-larger-than Image \
            2>&1 | tee "$OUT/logs/Image.log"

          test -s "$BUILD/arch/arm64/boot/Image"
          cp "$BUILD/arch/arm64/boot/Image" "$OUT/Image"
          grep -aFq 'A52UFS copy=1 SNAPSHOT begin' "$OUT/Image"
          grep -aFq 'A52UFS copy=1 CORE stage=link_startup' "$OUT/Image"
          grep -aFq 'A52UFS copy=1 SD stage=device_add_disk' "$OUT/Image"
          grep -aFq 'A52LOG seq=%u' "$OUT/Image"
          grep -aFq 'A52PHY copy=1 MATCH' "$OUT/Image"
          grep -aFq 'A52DEV copy=1 CALL' "$OUT/Image"
          grep -aFq 'A52DEV copy=1 DEFER' "$OUT/Image"
          grep -aFq 'A52KMSG copy=1' "$OUT/Image"
          grep -aFq 'A52EXIT copy=1 FINAL' "$OUT/Image"
          gzip -n -9 -c "$OUT/Image" > "$OUT/Image.gz"
          gzip -t "$OUT/Image.gz"

      - name: Download and verify reserved-memory boot source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workflow78/extracted
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW78_ARTIFACT_ID}/zip" \
            --output workflow78/artifact.zip
          unzip -q workflow78/artifact.zip -d workflow78/extracted
          (cd workflow78/extracted && sha256sum -c SHA256SUMS)
          test -s workflow78/extracted/boot.img
          grep -Fxq $'persistent-memory-reserved-in-dtb\tyes' \
            workflow78/extracted/candidate-status.tsv

      - name: Repack and audit bridge flight recorder boot image
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder
          python3 scripts/38_repack_a52_p1_boot.py \
            --source workflow78/extracted/boot.img \
            --kernel "$OUT/Image.gz" \
            --output "$OUT/boot.img" \
            --report "$OUT/repack-report.json"

          python3 - <<'PY'
          import hashlib
          import importlib.util
          import json
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "a52_boot_repack", "scripts/38_repack_a52_p1_boot.py"
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          source_path = Path("workflow78/extracted/boot.img")
          output_path = Path("artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder/boot.img")
          image_path = Path("artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder/Image.gz")
          src = module.parse_boot(source_path.read_bytes())
          new = module.parse_boot(output_path.read_bytes())

          checks = {
              "partition_size_preserved": output_path.stat().st_size == source_path.stat().st_size == 100663296,
              "replacement_kernel_used": hashlib.sha256(new["kernel"]).digest() == hashlib.sha256(image_path.read_bytes()).digest(),
              "rom_ramdisk_preserved": new["ramdisk"] == src["ramdisk"],
              "second_preserved": new["second"] == src["second"],
              "reserved_dtb_preserved": new["dtb"] == src["dtb"],
              "diagnostic_cmdline_preserved": new["cmdline"] == src["cmdline"],
              "reservation_node_present": b"a52-ramoops-reserved@b1b00000" in new["dtb"],
              "ufs_host_node_present": b"ufshc@1d84000" in new["dtb"],
              "ufs_phy_node_present": b"ufsphy_mem@1d87000" in new["dtb"],
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit("final audit failed: " + ", ".join(failed))

          Path("artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder/final-audit.json").write_text(
              json.dumps(
                  {
                      "status": "ufs-bridge-flight-recorder-repacked-audited",
                      "hardware_validated": False,
                      "prior_capture": "live UFS host and PHY enabled but unbound; Android init exited 127",
                      "compatibility_bridge": "qcom,ufs-phy-qmp-v3 -> sdm845_ufsphy_cfg",
                      "trace_scope": (
                          "device bind/defer, QMP match, qcom/platform/core UFS stages, "
                          "kernel storage logs, SCSI disks, block devices, Android init"
                      ),
                      "checks": checks,
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n"
          )
          PY

      - name: Finalize audited candidate
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder

          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 UFS PHY BRIDGE + FULL STORAGE FLIGHT RECORDER

          Workflow 94 proved that the live UFS host and QMP-v3 PHY nodes are enabled
          and have platform devices, but neither driver is bound. Android init then
          times out waiting for physical partitions and exits 127.

          This candidate bridges Samsung's qcom,ufs-phy-qmp-v3 compatible to the
          upstream 5.10 QMP-v3 UFS configuration and captures the full storage path:
          driver calls/returns/deferrals, QMP match, Qualcomm/platform/UFS-core stages,
          storage kernel messages, SCSI disk registration, repeated live DT snapshots,
          block-device enumeration, Android init kmsg, PID 1 exit, IRQ and panic data.

          This image is not hardware-validated.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/candidate-status.tsv"
          printf 'ufs-phy-compatible-bridge\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'device-core-bind-defer-trace\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'full-ufs-core-flight-recorder\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'storage-kernel-log-mirror\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'scsi-and-block-enumeration\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'pid1-kmsg-exit-trace-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-ramdisk-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/candidate-status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )
          test "$(stat -c %s "$OUT/boot.img")" = 100663296

      - name: Upload bridge flight recorder candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-ufs-bridge-flight-recorder-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostic logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-ufs-bridge-flight-recorder-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-ufs-bridge-flight-recorder
            workspace/gki-ufs-bridge-flight-recorder-out/.config
          if-no-files-found: warn
          retention-days: 14

  report:
    name: Report Workflow 95 status
    if: always()
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      issues: write
      actions: read
    steps:
      - name: Post run status to issue 45
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ needs.build.result }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          python3 - <<'PY' > payload.json
          import json
          import os

          body = (
              f"Workflow 95 run: {os.environ['RUN_URL']}\n\n"
              f"Status: completed\n"
              f"Conclusion: {os.environ['RESULT']}\n"
              f"Head SHA: {os.environ['HEAD_SHA']}\n\n"
              "Purpose: bridge Samsung's qcom,ufs-phy-qmp-v3 compatible and capture "
              "the full UFS, SCSI, block-device and Android init storage path in one boot."
          )
          print(json.dumps({"body": body}))
          PY
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'Content-Type: application/json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/45/comments" \
            --data-binary @payload.json
