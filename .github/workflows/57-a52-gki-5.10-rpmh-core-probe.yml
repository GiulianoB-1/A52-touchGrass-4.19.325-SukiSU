name: 57 - A52 GKI 5.10 RPMh core compile probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/57-a52-gki-5.10-rpmh-core-probe.yml
      - scripts/57_probe_a52xq_gki_rpmh_core.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-rpmh-core-probe
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  SEED_ARTIFACT_ID: '8413697551'
  SEED_CONFIG_SHA256: b4da88c027cb7d3efad948b0f0986ee24d968dedcf14499d360f4e0c623cf01a

jobs:
  probe:
    name: Compile-probe GKI command-db and RPMh providers
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 32 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 57 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install compile-probe dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio lz4 file dwarves

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate and clean GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          test -x gki/common/scripts/config
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

      - name: Obtain Workflow 52 resolved configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workspace/workflow52-seed artifacts/logs
          ZIP=workspace/workflow52-seed/seed.zip
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o "$ZIP" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SEED_ARTIFACT_ID}/zip"
          unzip -p "$ZIP" a52xq-5.10-resolved.config \
            > workspace/workflow52-seed/a52xq-5.10-resolved.config
          test -s workspace/workflow52-seed/a52xq-5.10-resolved.config
          printf '%s  %s\n' "$SEED_CONFIG_SHA256" \
            workspace/workflow52-seed/a52xq-5.10-resolved.config | sha256sum -c -

      - name: Inventory pinned RPMh and interconnect sources
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-rpmh-core-probe
          rm -rf "$OUT" workspace/gki-rpmh-core-out
          mkdir -p "$OUT/logs" workspace/gki-rpmh-core-out
          python3 scripts/57_probe_a52xq_gki_rpmh_core.py inventory \
            --gki gki/common \
            --output "$OUT"
          test -s "$OUT/rpmh-source-inventory.tsv"
          test -s "$OUT/kconfig-makefile-inventory.tsv"
          test -s "$OUT/analysis-metadata.txt"

      - name: Resolve toolchain and compile each RPMh object
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-rpmh-core-probe"
          BASE="$PWD/workspace/workflow52-seed/a52xq-5.10-resolved.config"
          STATUS="$PWD/workspace/workflow57-compile-status.tsv"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          {
            "$CLANG" --version
            ld.lld --version
            aarch64-linux-gnu-gcc --version | head -1
          } | tee "$OUT/logs/toolchain.log"

          printf 'probe\ttarget\tconfig_symbol\tsource_present\tresolved_value\tresult\texit_code\tobject_produced\n' > "$STATUS"

          config_value() {
            local file="$1" symbol="$2"
            if grep -Fxq "${symbol}=y" "$file"; then printf y
            elif grep -Fxq "${symbol}=m" "$file"; then printf m
            else printf n
            fi
          }

          run_probe() {
            local probe="$1" source="$2" target="$3" config_symbol="$4"
            shift 4
            local probe_out="$PWD/workspace/gki-rpmh-core-out/$probe"
            local log="$OUT/logs/$probe.log"
            local source_present=no resolved=n result source_rc=0 produced=no

            if test ! -f "gki/common/$source"; then
              printf 'Source missing: %s\n' "$source" > "$log"
              result=source-missing
              printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
                "$probe" "$target" "$config_symbol" "$source_present" \
                "$resolved" "$result" "$source_rc" "$produced" >> "$STATUS"
              return
            fi
            source_present=yes

            rm -rf "$probe_out"
            mkdir -p "$probe_out"
            cp "$BASE" "$probe_out/.config"
            gki/common/scripts/config --file "$probe_out/.config" --disable TRIM_UNUSED_KSYMS
            gki/common/scripts/config --file "$probe_out/.config" --set-str UNUSED_KSYMS_WHITELIST ''
            for symbol in "$@"; do
              gki/common/scripts/config --file "$probe_out/.config" --enable "${symbol#CONFIG_}"
            done
            make -C gki/common O="$probe_out" ARCH=arm64 \
              LLVM=1 LLVM_IAS=1 olddefconfig >> "$log" 2>&1

            resolved="$(config_value "$probe_out/.config" "$config_symbol")"
            if test "$resolved" = n; then
              result=config-blocked
            else
              set +e
              make -C gki/common O="$probe_out" ARCH=arm64 \
                LLVM=1 LLVM_IAS=1 -j4 "$target" >> "$log" 2>&1
              source_rc=$?
              set -e
              if test -s "$probe_out/$target"; then produced=yes; fi
              if test "$source_rc" -eq 0 && test "$produced" = yes; then
                result=compiled
              else
                result=compile-failed
              fi
            fi

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$probe" "$target" "$config_symbol" "$source_present" \
              "$resolved" "$result" "$source_rc" "$produced" >> "$STATUS"
          }

          run_probe command-db \
            drivers/soc/qcom/cmd-db.c drivers/soc/qcom/cmd-db.o \
            CONFIG_QCOM_COMMAND_DB \
            CONFIG_QCOM_COMMAND_DB

          run_probe rpmh-core \
            drivers/soc/qcom/rpmh.c drivers/soc/qcom/rpmh.o \
            CONFIG_QCOM_RPMH \
            CONFIG_QCOM_COMMAND_DB CONFIG_QCOM_RPMH

          run_probe rpmh-rsc \
            drivers/soc/qcom/rpmh-rsc.c drivers/soc/qcom/rpmh-rsc.o \
            CONFIG_QCOM_RPMH \
            CONFIG_QCOM_COMMAND_DB CONFIG_QCOM_RPMH

          run_probe rpmh-regulator \
            drivers/regulator/qcom-rpmh-regulator.c \
            drivers/regulator/qcom-rpmh-regulator.o \
            CONFIG_REGULATOR_QCOM_RPMH \
            CONFIG_REGULATOR CONFIG_QCOM_COMMAND_DB CONFIG_QCOM_RPMH \
            CONFIG_REGULATOR_QCOM_RPMH

          run_probe rpmh-clock \
            drivers/clk/qcom/clk-rpmh.c drivers/clk/qcom/clk-rpmh.o \
            CONFIG_QCOM_CLK_RPMH \
            CONFIG_COMMON_CLK CONFIG_COMMON_CLK_QCOM CONFIG_QCOM_COMMAND_DB \
            CONFIG_QCOM_RPMH CONFIG_QCOM_CLK_RPMH

          run_probe rpmh-power-domain \
            drivers/soc/qcom/rpmhpd.c drivers/soc/qcom/rpmhpd.o \
            CONFIG_QCOM_RPMHPD \
            CONFIG_PM_GENERIC_DOMAINS CONFIG_QCOM_COMMAND_DB CONFIG_QCOM_RPMH \
            CONFIG_QCOM_RPMHPD

          cat "$STATUS"
          python3 scripts/57_probe_a52xq_gki_rpmh_core.py finalize \
            --output "$OUT" \
            --status-file "$STATUS"

      - name: Enforce RPMh probe invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-rpmh-core-probe
          test -s "$OUT/PORTING-PROBE-REPORT.md"
          test -s "$OUT/compile-status.tsv"
          test -s "$OUT/rpmh-source-inventory.tsv"
          test -s "$OUT/kconfig-makefile-inventory.tsv"
          test -s "$OUT/analysis-metadata.txt"
          test -s "$OUT/SHA256SUMS"
          test "$(tail -n +2 "$OUT/compile-status.tsv" | wc -l)" -eq 6
          grep -Fxq \
            'artifact_type=a52xq-gki-5.10-rpmh-core-compile-probe-not-flashable' \
            "$OUT/analysis-metadata.txt"
          ! find "$OUT" -type f \( -name Image -o -name boot.img \) | grep -q .
          (cd "$OUT" && sha256sum -c SHA256SUMS)
          cat "$OUT/analysis-metadata.txt"
          sed -n '1,360p' "$OUT/PORTING-PROBE-REPORT.md"

      - name: Upload non-flashable RPMh core probe
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-rpmh-core-probe-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-rpmh-core-probe
          if-no-files-found: error
          retention-days: 30

      - name: Upload Workflow 57 failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-rpmh-core-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-rpmh-core-probe/
            workspace/workflow57-compile-status.tsv
            workspace/gki-rpmh-core-out/*/.config
          if-no-files-found: warn
          retention-days: 7
