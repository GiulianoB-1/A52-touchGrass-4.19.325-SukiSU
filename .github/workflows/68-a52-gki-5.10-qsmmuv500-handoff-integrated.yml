name: 68 - A52 GKI 5.10 QSMMUv500 handoff integrated probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/68-a52-gki-5.10-qsmmuv500-handoff-integrated.yml
      - scripts/67_stage_a52xq_native_qsmmuv500.py
      - scripts/68_stage_a52xq_qsmmuv500_handoff.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-qsmmuv500-handoff-integrated
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  TOUCHGRASS_COMMIT: 6bf351bdf18bdb228db79e66f14a7a9c0178e5d7
  UPSTREAM_LINUX_SHA: 830b3c68c1fb1e9176028d02ef86f3cf76aa2476
  SEED_ARTIFACT_ID: '8413697551'
  SEED_CONFIG_SHA256: b4da88c027cb7d3efad948b0f0986ee24d968dedcf14499d360f4e0c623cf01a

jobs:
  build:
    name: Build GKI Image with A52 QSMMUv500 firmware handoff
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 44 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 68 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install integrated-build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio lz4 file dwarves device-tree-compiler

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate and clean GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          test -x gki/common/scripts/config
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

      - name: Restore pinned touchGrass source
        id: touchgrass-cache
        uses: actions/cache/restore@v4
        with:
          path: workspace/touchgrass-a52xq
          key: a52xq-touchgrass-linux-4.19.200-main-v2-${{ runner.os }}-${{ env.TOUCHGRASS_COMMIT }}

      - name: Validate touchGrass source
        run: |
          set -Eeuo pipefail
          test '${{ steps.touchgrass-cache.outputs.cache-hit }}' = true
          test -d workspace/touchgrass-a52xq/.git
          test "$(git -C workspace/touchgrass-a52xq rev-parse HEAD)" = "${TOUCHGRASS_COMMIT}"
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200

      - name: Obtain Workflow 52 resolved configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workspace/workflow52-seed
          ZIP=workspace/workflow52-seed/seed.zip
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o "$ZIP" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SEED_ARTIFACT_ID}/zip"
          unzip -p "$ZIP" a52xq-5.10-resolved.config \
            > workspace/workflow52-seed/a52xq-5.10-resolved.config
          printf '%s  %s\n' "$SEED_CONFIG_SHA256" \
            workspace/workflow52-seed/a52xq-5.10-resolved.config | sha256sum -c -

      - name: Download pinned Linux 6.1 SM6350 provider sources
        run: |
          set -Eeuo pipefail
          UP="$PWD/workspace/linux-v6.1-sm6350"
          BASE="https://raw.githubusercontent.com/torvalds/linux/${UPSTREAM_LINUX_SHA}"
          rm -rf "$UP"
          mkdir -p "$UP/drivers/interconnect/qcom" "$UP/include/dt-bindings/interconnect"
          curl -fL --retry 3 --retry-all-errors -o "$UP/drivers/interconnect/qcom/sm6350.c" \
            "$BASE/drivers/interconnect/qcom/sm6350.c"
          curl -fL --retry 3 --retry-all-errors -o "$UP/drivers/interconnect/qcom/sm6350.h" \
            "$BASE/drivers/interconnect/qcom/sm6350.h"
          curl -fL --retry 3 --retry-all-errors -o "$UP/include/dt-bindings/interconnect/qcom,sm6350.h" \
            "$BASE/include/dt-bindings/interconnect/qcom,sm6350.h"

      - name: Replay proven A52 source phases and stage native QSMMUv500
        run: |
          set -Eeuo pipefail
          TG=workspace/touchgrass-a52xq
          SEED=workspace/workflow52-seed/a52xq-5.10-resolved.config
          OUT=artifacts/a52xq-gki-5.10-qsmmuv500-handoff-integrated
          rm -rf "$OUT" workspace/workflow68-stage workspace/gki-qsmmuv500-integrated-out
          mkdir -p "$OUT/logs" workspace/workflow68-stage

          python3 scripts/53_probe_a52xq_lagoon_phase1.py stage \
            --gki gki/common --touchgrass "$TG" --seed-config "$SEED" \
            --output workspace/workflow68-stage/phase1
          python3 scripts/54_probe_a52xq_lagoon_clocks_phase2.py stage \
            --gki gki/common --touchgrass "$TG" \
            --output workspace/workflow68-stage/phase2
          python3 scripts/55_probe_a52xq_lagoon_remaining_clocks.py stage \
            --gki gki/common --touchgrass "$TG" \
            --output workspace/workflow68-stage/phase3
          python3 scripts/56_probe_a52xq_lagoon_earlyboot_dt.py stage \
            --gki gki/common --touchgrass "$TG" \
            --output workspace/workflow68-stage/device-tree
          python3 scripts/59_probe_a52xq_sm6350_interconnect.py stage \
            --gki gki/common --upstream workspace/linux-v6.1-sm6350 \
            --output workspace/workflow68-stage/interconnect
          python3 scripts/67_stage_a52xq_native_qsmmuv500.py \
            --gki gki/common --output "$OUT/native-compatible"
          python3 scripts/68_stage_a52xq_qsmmuv500_handoff.py \
            --gki gki/common --output "$OUT/firmware-handoff"

          test -s "$OUT/native-compatible/native-qsmmuv500.patch"
          test -s "$OUT/firmware-handoff/qsmmuv500-handoff.patch"
          git -C gki/common diff --check
          git -C gki/common diff --binary --no-ext-diff > "$OUT/integrated-port.patch"
          test -s "$OUT/integrated-port.patch"

      - name: Resolve integrated configuration
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-qsmmuv500-handoff-integrated"
          BUILD="$PWD/workspace/gki-qsmmuv500-integrated-out"
          SEED="$PWD/workspace/workflow52-seed/a52xq-5.10-resolved.config"
          mkdir -p "$BUILD"
          cp "$SEED" "$BUILD/.config"

          while read -r symbol; do
            test -z "$symbol" && continue
            gki/common/scripts/config --file "$BUILD/.config" --enable "${symbol#CONFIG_}"
          done <<'SYMBOLS'
          CONFIG_ARCH_QCOM
          CONFIG_OF
          CONFIG_GPIOLIB
          CONFIG_COMMON_CLK_QCOM
          CONFIG_QCOM_GDSC
          CONFIG_PINCTRL_MSM
          CONFIG_DEBUG_FS
          CONFIG_SDM_GCC_LAGOON
          CONFIG_PINCTRL_LAGOON
          CONFIG_QCOM_LLCC
          CONFIG_CAM_CC_LAGOON
          CONFIG_DISP_CC_LAGOON
          CONFIG_GPU_CC_LAGOON
          CONFIG_VIDEO_CC_LAGOON
          CONFIG_NPU_CC_LAGOON
          CONFIG_QCOM_CLK_DEBUG
          CONFIG_DEBUG_CC_LAGOON
          CONFIG_QCOM_SCM
          CONFIG_HWSPINLOCK
          CONFIG_QCOM_SMEM
          CONFIG_OF_RESERVED_MEM
          CONFIG_QCOM_COMMAND_DB
          CONFIG_QCOM_RPMH
          CONFIG_MAILBOX
          CONFIG_PM
          CONFIG_QCOM_AOSS_QMP
          CONFIG_QCOM_GENI_SE
          CONFIG_INTERCONNECT
          CONFIG_INTERCONNECT_QCOM
          CONFIG_INTERCONNECT_QCOM_RPMH_POSSIBLE
          CONFIG_INTERCONNECT_QCOM_SM6350
          CONFIG_IOMMU_SUPPORT
          CONFIG_ARM_SMMU
          CONFIG_REGULATOR
          CONFIG_REGULATOR_QCOM_RPMH
          CONFIG_GENERIC_PHY
          CONFIG_PHY_QCOM_QMP
          CONFIG_SCSI
          CONFIG_SCSI_DMA
          CONFIG_SCSI_UFSHCD
          CONFIG_SCSI_UFSHCD_PLATFORM
          CONFIG_SCSI_UFS_QCOM
          CONFIG_BLK_INLINE_ENCRYPTION
          CONFIG_SCSI_UFS_CRYPTO
          CONFIG_EROFS_FS
          CONFIG_EROFS_FS_XATTR
          CONFIG_EROFS_FS_ZIP
          CONFIG_F2FS_FS
          CONFIG_F2FS_FS_XATTR
          CONFIG_F2FS_FS_POSIX_ACL
          CONFIG_F2FS_FS_COMPRESSION
          CONFIG_FS_ENCRYPTION
          CONFIG_FS_ENCRYPTION_INLINE_CRYPT
          CONFIG_FS_VERITY
          CONFIG_BLOCK
          CONFIG_BLK_DEV_DM
          CONFIG_BLK_DEV_DM_BUILTIN
          CONFIG_DM_INIT
          CONFIG_DM_UEVENT
          CONFIG_DM_VERITY
          CONFIG_DM_VERITY_FEC
          CONFIG_CRYPTO
          CONFIG_DM_CRYPT
          CONFIG_DM_DEFAULT_KEY
          CONFIG_CGROUPS
          CONFIG_CGROUP_FREEZER
          CONFIG_BLK_CGROUP
          CONFIG_BLK_CGROUP_RWSTAT
          CONFIG_TTY
          CONFIG_SERIAL_CORE
          CONFIG_SERIAL_EARLYCON
          CONFIG_SERIAL_QCOM_GENI
          CONFIG_SERIAL_QCOM_GENI_CONSOLE
          CONFIG_PSTORE
          CONFIG_PSTORE_CONSOLE
          CONFIG_PSTORE_PMSG
          CONFIG_PSTORE_RAM
          SYMBOLS

          gki/common/scripts/config --file "$BUILD/.config" --disable TRIM_UNUSED_KSYMS
          gki/common/scripts/config --file "$BUILD/.config" --set-str UNUSED_KSYMS_WHITELIST ''

          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            > "$OUT/logs/olddefconfig.log" 2>&1
          cp "$BUILD/.config" "$OUT/integrated.config"

      - name: Build integrated Image and Lagoon DTB
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-qsmmuv500-handoff-integrated"
          BUILD="$PWD/workspace/gki-qsmmuv500-integrated-out"
          STATUS="$OUT/build-status.tsv"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          "$CLANG" --version | tee "$OUT/logs/toolchain.log"
          printf 'target\tresult\texit_code\tbytes\n' > "$STATUS"

          set +e
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            KCFLAGS=-Wno-error=frame-larger-than Image \
            > "$OUT/logs/Image.log" 2>&1
          image_rc=$?
          set -e
          image_result=failed
          image_bytes=0
          if test "$image_rc" -eq 0 && test -s "$BUILD/arch/arm64/boot/Image"; then
            image_result=built
            image_bytes="$(stat -c %s "$BUILD/arch/arm64/boot/Image")"
            cp "$BUILD/arch/arm64/boot/Image" "$OUT/Image-NOT-FLASHABLE"
          fi
          printf 'Image\t%s\t%s\t%s\n' "$image_result" "$image_rc" "$image_bytes" >> "$STATUS"

          SOURCE="$PWD/gki/common/arch/arm64/boot/dts/qcom/lagoon-earlyboot-probe.dts"
          PREPROCESSED="$BUILD/lagoon-earlyboot-probe.preprocessed.dts"
          DTB="$BUILD/lagoon-earlyboot-probe.dtb"
          set +e
          cpp -nostdinc -undef -D__DTS__ -x assembler-with-cpp \
            -I "$PWD/gki/common/arch/arm64/boot/dts/qcom" \
            -I "$PWD/gki/common/include" \
            -I "$PWD/gki/common/scripts/dtc/include-prefixes" \
            "$SOURCE" "$PREPROCESSED" > "$OUT/logs/Lagoon-DTB.log" 2>&1
          cpp_rc=$?
          dtb_rc=$cpp_rc
          if test "$cpp_rc" -eq 0; then
            dtc -I dts -O dtb -@ -o "$DTB" "$PREPROCESSED" \
              >> "$OUT/logs/Lagoon-DTB.log" 2>&1
            dtb_rc=$?
          fi
          set -e
          dtb_result=failed
          dtb_bytes=0
          if test "$dtb_rc" -eq 0 && test -s "$DTB"; then
            dtb_result=compiled
            dtb_bytes="$(stat -c %s "$DTB")"
            cp "$DTB" "$OUT/lagoon-earlyboot-qsmmuv500-NOT-FLASHABLE.dtb"
            dtc -I dtb -O dts -o "$OUT/lagoon-earlyboot-qsmmuv500.dts" "$DTB" \
              2>> "$OUT/logs/Lagoon-DTB.log"
          fi
          printf 'Lagoon-DTB\t%s\t%s\t%s\n' "$dtb_result" "$dtb_rc" "$dtb_bytes" >> "$STATUS"

          image_compatible=no
          image_skip_init=no
          image_3lvl=no
          dt_parent=no
          dt_skip_init=no
          dt_3lvl=no
          dt_tbu_count=0

          if test "$image_result" = built; then
            strings "$OUT/Image-NOT-FLASHABLE" | grep -Fxq 'qcom,qsmmu-v500' && image_compatible=yes
            strings "$OUT/Image-NOT-FLASHABLE" | grep -Fxq 'qcom,skip-init' && image_skip_init=yes
            strings "$OUT/Image-NOT-FLASHABLE" | grep -Fxq 'qcom,use-3-lvl-tables' && image_3lvl=yes
          fi
          if test "$dtb_result" = compiled; then
            grep -Fq 'compatible = "qcom,qsmmu-v500"' "$OUT/lagoon-earlyboot-qsmmuv500.dts" && dt_parent=yes
            grep -Fq 'qcom,skip-init;' "$OUT/lagoon-earlyboot-qsmmuv500.dts" && dt_skip_init=yes
            grep -Fq 'qcom,use-3-lvl-tables;' "$OUT/lagoon-earlyboot-qsmmuv500.dts" && dt_3lvl=yes
            dt_tbu_count="$(grep -Fc 'compatible = "qcom,qsmmuv500-tbu"' "$OUT/lagoon-earlyboot-qsmmuv500.dts")"
          fi

          cat > "$OUT/qsmmuv500-contract-status.tsv" <<EOF
          check\tresult
          image-compatible\t${image_compatible}
          image-skip-init\t${image_skip_init}
          image-three-level-tables\t${image_3lvl}
          dt-parent-compatible\t${dt_parent}
          dt-skip-init\t${dt_skip_init}
          dt-three-level-tables\t${dt_3lvl}
          dt-tbu-child-count\t${dt_tbu_count}
          EOF
          sed -i 's/^          //' "$OUT/qsmmuv500-contract-status.tsv"

          cat > "$OUT/INTEGRATED-QSMMUV500-REPORT.md" <<EOF
          # A52xq GKI 5.10 QSMMUv500 integrated probe

          ## Build

          - Image: \`${image_result}\`, exit code \`${image_rc}\`, bytes \`${image_bytes}\`
          - Lagoon DTB: \`${dtb_result}\`, exit code \`${dtb_rc}\`, bytes \`${dtb_bytes}\`

          ## ROM contract found in outputs

          - Image contains \`qcom,qsmmu-v500\`: \`${image_compatible}\`
          - Image contains \`qcom,skip-init\`: \`${image_skip_init}\`
          - Image contains \`qcom,use-3-lvl-tables\`: \`${image_3lvl}\`
          - DT parent compatible present: \`${dt_parent}\`
          - DT firmware handoff property present: \`${dt_skip_init}\`
          - DT 39-bit page-table property present: \`${dt_3lvl}\`
          - DT QSMMUv500 TBU children preserved: \`${dt_tbu_count}\`

          ## Scope

          This is an integrated non-flashable Image and DTB compile probe. It preserves the GKI 5.10 native ARM-SMMU architecture and ports only the A52 firmware-handoff contract needed before a controlled boot package is attempted.
          EOF
          sed -i 's/^          //' "$OUT/INTEGRATED-QSMMUV500-REPORT.md"

          cat > "$OUT/analysis-metadata.txt" <<EOF
          artifact_type=a52xq-gki-5.10-qsmmuv500-handoff-integrated-not-flashable
          gki_commit=${GKI_COMMON_SHA}
          touchgrass_commit=${TOUCHGRASS_COMMIT}
          source_strategy=extend-native-gki-arm-smmu
          image_result=${image_result}
          dtb_result=${dtb_result}
          image_compatible=${image_compatible}
          image_skip_init=${image_skip_init}
          image_three_level_tables=${image_3lvl}
          dt_parent_compatible=${dt_parent}
          dt_skip_init=${dt_skip_init}
          dt_three_level_tables=${dt_3lvl}
          dt_tbu_child_count=${dt_tbu_count}
          actlr_table=deferred
          tbu_driver=deferred
          boot_test=no
          flashable=no
          EOF
          sed -i 's/^          //' "$OUT/analysis-metadata.txt"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )
          cat "$STATUS"
          cat "$OUT/qsmmuv500-contract-status.tsv"

      - name: Upload integrated QSMMUv500 handoff probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-qsmmuv500-handoff-integrated-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-qsmmuv500-handoff-integrated
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce integrated QSMMUv500 result
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-qsmmuv500-handoff-integrated
          grep -Fqx $'Image\tbuilt\t0' <(cut -f1-3 "$OUT/build-status.tsv")
          grep -Fqx $'Lagoon-DTB\tcompiled\t0' <(cut -f1-3 "$OUT/build-status.tsv")
          grep -Fxq $'image-compatible\tyes' "$OUT/qsmmuv500-contract-status.tsv"
          grep -Fxq $'image-skip-init\tyes' "$OUT/qsmmuv500-contract-status.tsv"
          grep -Fxq $'image-three-level-tables\tyes' "$OUT/qsmmuv500-contract-status.tsv"
          grep -Fxq $'dt-parent-compatible\tyes' "$OUT/qsmmuv500-contract-status.tsv"
          grep -Fxq $'dt-skip-init\tyes' "$OUT/qsmmuv500-contract-status.tsv"
          grep -Fxq $'dt-three-level-tables\tyes' "$OUT/qsmmuv500-contract-status.tsv"
          test "$(awk -F '\t' '$1 == "dt-tbu-child-count" {print $2}' "$OUT/qsmmuv500-contract-status.tsv")" = 7
          test -s "$OUT/Image-NOT-FLASHABLE"
          test -s "$OUT/lagoon-earlyboot-qsmmuv500-NOT-FLASHABLE.dtb"
          grep -Fxq 'boot_test=no' "$OUT/analysis-metadata.txt"
          grep -Fxq 'flashable=no' "$OUT/analysis-metadata.txt"
          ! find "$OUT" -type f \( -name boot.img -o -name vendor_boot.img -o -name recovery.img \) | grep -q .
          (cd "$OUT" && sha256sum -c SHA256SUMS)
          sed -n '1,260p' "$OUT/INTEGRATED-QSMMUV500-REPORT.md"
