name: 77 - A52 GKI 5.10 early ramoops boot parameters

run-name: Build A52 GKI 5.10 early ramoops diagnostic candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/77-a52-gki-5.10-early-ramoops-params.yml'

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-early-ramoops-params
  cancel-in-progress: true

env:
  WORKFLOW75_ARTIFACT_ID: '8428249310'

jobs:
  build:
    name: Build early ramoops parameter boot image
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Publish run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 45 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 77 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Purpose: keep the watchdog-validated kernel and original ROM DTB, but register ramoops from built-in boot parameters during postcore init.
          Commit: \`${GITHUB_SHA}\`"

      - name: Download and verify Workflow 75 watchdog candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl unzip python3
          mkdir -p workflow75/extracted
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW75_ARTIFACT_ID}/zip" \
            --output workflow75/artifact.zip
          unzip -q workflow75/artifact.zip -d workflow75/extracted
          (cd workflow75/extracted && sha256sum -c SHA256SUMS)
          test -s workflow75/extracted/boot.img
          test -s workflow75/extracted/Image.gz
          test -s workflow75/extracted/diagnostic.config
          grep -Fxq 'CONFIG_QCOM_WDT=y' workflow75/extracted/diagnostic.config
          grep -Fxq 'CONFIG_PSTORE_RAM=y' workflow75/extracted/diagnostic.config
          grep -Fxq 'CONFIG_PSTORE_CONSOLE=y' workflow75/extracted/diagnostic.config

      - name: Patch boot command line with early ramoops parameters
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-early-ramoops"
          mkdir -p "$OUT"
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import struct
          from pathlib import Path

          source_path = Path("workflow75/extracted/boot.img")
          output_path = Path("artifacts/a52xq-gki-5.10-early-ramoops/boot.img")
          report_path = Path("artifacts/a52xq-gki-5.10-early-ramoops/repack-report.json")

          data = bytearray(source_path.read_bytes())
          if data[:8] != b"ANDROID!":
              raise SystemExit("invalid Android boot image")

          (
              kernel_size,
              kernel_addr,
              ramdisk_size,
              ramdisk_addr,
              second_size,
              second_addr,
              tags_addr,
              page_size,
              header_version,
              os_version,
          ) = struct.unpack_from("<10I", data, 8)

          if header_version != 2:
              raise SystemExit(f"expected header v2, got {header_version}")

          old_cmdline = (
              data[64:576].split(b"\0", 1)[0]
              + data[608:1632].split(b"\0", 1)[0]
          ).decode("ascii")

          params = [
              "ramoops.mem_address=0xB1B00000",
              "ramoops.mem_size=0x00100000",
              "ramoops.mem_type=0",
              "ramoops.record_size=0x00040000",
              "ramoops.console_size=0x00040000",
              "ramoops.ftrace_size=0x00040000",
              "ramoops.pmsg_size=0x00040000",
              "ramoops.dump_oops=1",
              "pstore.backend=ramoops",
          ]

          new_cmdline = old_cmdline
          for param in params:
              key = param.split("=", 1)[0] + "="
              if not any(word.startswith(key) for word in new_cmdline.split()):
                  new_cmdline += " " + param

          encoded = new_cmdline.encode("ascii")
          if len(encoded) > 1536:
              raise SystemExit(f"command line too long: {len(encoded)} > 1536")

          def align(value: int) -> int:
              return (value + page_size - 1) // page_size * page_size

          ramdisk_offset = page_size + align(kernel_size)
          second_offset = ramdisk_offset + align(ramdisk_size)
          recovery_size = struct.unpack_from("<I", data, 1632)[0]
          recovery_offset_header = struct.unpack_from("<Q", data, 1636)[0]
          recovery_offset = (
              recovery_offset_header
              if recovery_size and recovery_offset_header
              else second_offset + align(second_size)
          )
          dtb_offset = (
              align(recovery_offset + recovery_size)
              if recovery_size
              else second_offset + align(second_size)
          )
          dtb_size = struct.unpack_from("<I", data, 1648)[0]

          component_hashes_before = {
              "kernel": hashlib.sha256(data[page_size:page_size + kernel_size]).hexdigest(),
              "ramdisk": hashlib.sha256(data[ramdisk_offset:ramdisk_offset + ramdisk_size]).hexdigest(),
              "second": hashlib.sha256(data[second_offset:second_offset + second_size]).hexdigest(),
              "dtb": hashlib.sha256(data[dtb_offset:dtb_offset + dtb_size]).hexdigest(),
          }

          data[64:576] = b"\0" * 512
          data[608:1632] = b"\0" * 1024
          data[64:64 + min(len(encoded), 512)] = encoded[:512]
          if len(encoded) > 512:
              data[608:608 + len(encoded) - 512] = encoded[512:]

          output_path.write_bytes(data)

          rebuilt = output_path.read_bytes()
          rebuilt_cmdline = (
              rebuilt[64:576].split(b"\0", 1)[0]
              + rebuilt[608:1632].split(b"\0", 1)[0]
          ).decode("ascii")

          component_hashes_after = {
              "kernel": hashlib.sha256(rebuilt[page_size:page_size + kernel_size]).hexdigest(),
              "ramdisk": hashlib.sha256(rebuilt[ramdisk_offset:ramdisk_offset + ramdisk_size]).hexdigest(),
              "second": hashlib.sha256(rebuilt[second_offset:second_offset + second_size]).hexdigest(),
              "dtb": hashlib.sha256(rebuilt[dtb_offset:dtb_offset + dtb_size]).hexdigest(),
          }

          checks = {
              "partition_size_preserved": len(rebuilt) == len(data),
              "kernel_unchanged": component_hashes_after["kernel"] == component_hashes_before["kernel"],
              "ramdisk_unchanged": component_hashes_after["ramdisk"] == component_hashes_before["ramdisk"],
              "second_unchanged": component_hashes_after["second"] == component_hashes_before["second"],
              "rom_dtb_unchanged": component_hashes_after["dtb"] == component_hashes_before["dtb"],
              "watchdog_diagnostics_preserved": all(
                  token in rebuilt_cmdline
                  for token in [
                      "initcall_debug",
                      "pstore.compress=none",
                      "watchdog.handle_boot_enabled=1",
                  ]
              ),
              "early_ramoops_parameters_present": all(param in rebuilt_cmdline for param in params),
              "ramoops_layout_matches_recovery": all(
                  token in rebuilt_cmdline
                  for token in [
                      "ramoops.mem_address=0xB1B00000",
                      "ramoops.mem_size=0x00100000",
                      "ramoops.record_size=0x00040000",
                      "ramoops.console_size=0x00040000",
                      "ramoops.ftrace_size=0x00040000",
                      "ramoops.pmsg_size=0x00040000",
                  ]
              ),
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit("audit failed: " + ", ".join(failed))

          report = {
              "status": "early-ramoops-parameters-repacked-audited",
              "hardware_validated": False,
              "source_boot_sha256": hashlib.sha256(source_path.read_bytes()).hexdigest(),
              "output_boot_sha256": hashlib.sha256(rebuilt).hexdigest(),
              "output_bytes": len(rebuilt),
              "old_cmdline": old_cmdline,
              "new_cmdline": rebuilt_cmdline,
              "component_hashes": component_hashes_after,
              "checks": checks,
              "interpretation": (
                  "The watchdog-validated kernel and original ROM DTB are unchanged. "
                  "Ramoops is now instantiated from built-in parameters during postcore init."
              ),
          }
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n")
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - name: Finalize audited early ramoops candidate
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-early-ramoops"
          cp workflow75/extracted/Image.gz "$OUT/Image.gz"
          cp workflow75/extracted/diagnostic.config "$OUT/diagnostic.config"
          cp workflow75/extracted/watchdog-bridge/patched-qcom-wdt.c "$OUT/patched-qcom-wdt.c"

          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 EARLY RAMOOPS PARAMETER DIAGNOSTIC

          The watchdog-enabled kernel is unchanged from Workflow 75.
          The original ROM DTB and ramdisk are also unchanged.

          This candidate registers ramoops directly from built-in kernel parameters
          during postcore init, before DT-created platform devices are available.

          Persistent-memory layout:
            address      0xB1B00000
            total size   0x00100000
            record       0x00040000
            console      0x00040000
            ftrace       0x00040000
            pmsg         0x00040000

          Test once, force restart only after at least two minutes if it remains stuck,
          enter OrangeFox immediately, and run the pstore collector.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/candidate-status.tsv"
          printf 'watchdog-kernel-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-ramdisk-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-dtb-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'early-ramoops-params-added\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'ramoops-layout-matches-orangefox\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/candidate-status.tsv"
          printf 'flash-performed\tno\n' >> "$OUT/candidate-status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

          test "$(stat -c %s "$OUT/boot.img")" = 100663296
          grep -Fxq $'early-ramoops-params-added\tyes' "$OUT/candidate-status.tsv"

      - name: Upload early ramoops diagnostic candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-early-ramoops-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-gki-5.10-early-ramoops
          if-no-files-found: error
          retention-days: 14
