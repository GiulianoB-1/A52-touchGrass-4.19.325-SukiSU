name: 80 - Package A52 pre-initcall ramoops checkpoint

run-name: Package A52 GKI 5.10 pre-initcall ramoops candidate

on:
  workflow_run:
    workflows:
      - '79 - A52 GKI 5.10 pre-initcall ramoops diagnostic'
    types:
      - completed

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-package-preinitcall-checkpoint
  cancel-in-progress: true

env:
  WORKFLOW78_ARTIFACT_ID: '8428992052'

jobs:
  package:
    name: Package compiled pre-initcall kernel checkpoint
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Publish packaging run status
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          BODY="Workflow 80 packaging run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Status: in_progress
          Source Workflow 79 run: ${SOURCE_RUN_ID}
          Head SHA: ${GITHUB_SHA}

          Purpose: package the compiled pre-initcall ramoops checkpoint without rebuilding the kernel."
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/5010467537" \
            -f body="$BODY"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl unzip python3 file

      - name: Download compiled Workflow 79 checkpoint
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -Eeuo pipefail
          mkdir -p workflow79/extracted
          ARTIFACT_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/artifacts?per_page=100")"
          ARTIFACT_ID="$(jq -r '[.artifacts[] | select(.name | startswith("a52xq-gki-5.10-preinitcall-kernel-checkpoint-"))][0].id' <<<"$ARTIFACT_JSON")"
          test -n "$ARTIFACT_ID"
          test "$ARTIFACT_ID" != null
          printf 'source_workflow79_run=%s\ncheckpoint_artifact_id=%s\n' \
            "$SOURCE_RUN_ID" "$ARTIFACT_ID" > workflow79/source.txt
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            --output workflow79/artifact.zip
          unzip -q workflow79/artifact.zip -d workflow79/extracted
          test -s workflow79/extracted/Image.gz
          test -s workflow79/extracted/diagnostic.config
          test -s workflow79/extracted/full-integrated-preinitcall.patch
          gzip -t workflow79/extracted/Image.gz
          gzip -dc workflow79/extracted/Image.gz | grep -aFq 'qcom,msm-watchdog'
          gzip -dc workflow79/extracted/Image.gz | grep -aFq 'qcom,qsmmu-v500'
          gzip -dc workflow79/extracted/Image.gz | grep -aFq 'A52 pre-initcall ramoops registration complete'
          grep -Fxq 'CONFIG_QCOM_WDT=y' workflow79/extracted/diagnostic.config
          grep -Fxq 'CONFIG_PSTORE_RAM=y' workflow79/extracted/diagnostic.config
          grep -Fxq 'CONFIG_PSTORE_CONSOLE=y' workflow79/extracted/diagnostic.config

      - name: Download and verify reserved early ramoops boot source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workflow78/extracted
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW78_ARTIFACT_ID}/zip" \
            --output workflow78/artifact.zip
          unzip -q workflow78/artifact.zip -d workflow78/extracted
          (cd workflow78/extracted && sha256sum -c SHA256SUMS)
          test -s workflow78/extracted/boot.img
          grep -Fxq $'early-ramoops-params-added\tyes' workflow78/extracted/candidate-status.tsv
          grep -Fxq $'persistent-memory-reserved-in-dtb\tyes' workflow78/extracted/candidate-status.tsv

      - name: Repack and audit final diagnostic boot image
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-preinitcall-ramoops
          mkdir -p "$OUT"
          python3 scripts/38_repack_a52_p1_boot.py \
            --source workflow78/extracted/boot.img \
            --kernel workflow79/extracted/Image.gz \
            --output "$OUT/boot.img" \
            --report "$OUT/repack-report.json"

          python3 - <<'PY'
          import hashlib
          import importlib.util
          import json
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "a52_boot_repack", "scripts/38_repack_a52_p1_boot.py"
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          source_path = Path("workflow78/extracted/boot.img")
          output_path = Path("artifacts/a52xq-gki-5.10-preinitcall-ramoops/boot.img")
          image_path = Path("workflow79/extracted/Image.gz")
          src = module.parse_boot(source_path.read_bytes())
          new = module.parse_boot(output_path.read_bytes())

          required_cmdline = [
              "panic=0",
              "initcall_debug",
              "pstore.compress=none",
              "watchdog.handle_boot_enabled=1",
              "ramoops.mem_address=0xB1B00000",
              "ramoops.mem_size=0x00100000",
              "ramoops.record_size=0x00040000",
              "ramoops.console_size=0x00040000",
              "ramoops.ftrace_size=0x00040000",
              "ramoops.pmsg_size=0x00040000",
          ]
          checks = {
              "partition_size_preserved": output_path.stat().st_size == source_path.stat().st_size == 100663296,
              "replacement_kernel_used": hashlib.sha256(new["kernel"]).digest() == hashlib.sha256(image_path.read_bytes()).digest(),
              "rom_ramdisk_preserved": new["ramdisk"] == src["ramdisk"],
              "second_preserved": new["second"] == src["second"],
              "reserved_dtb_preserved": new["dtb"] == src["dtb"],
              "diagnostic_cmdline_preserved": new["cmdline"] == src["cmdline"],
              "required_cmdline_present": all(token in new["cmdline"] for token in required_cmdline),
              "reservation_node_present": b"a52-ramoops-reserved@b1b00000" in new["dtb"],
              "qsmmuv500_present": b"qcom,qsmmu-v500" in new["dtb"],
              "watchdog_node_present": b"qcom,msm-watchdog" in new["dtb"],
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit("final audit failed: " + ", ".join(failed))

          Path("artifacts/a52xq-gki-5.10-preinitcall-ramoops/final-audit.json").write_text(
              json.dumps(
                  {
                      "status": "pre-initcall-ramoops-repacked-audited",
                      "hardware_validated": False,
                      "checks": checks,
                      "interpretation": (
                          "The kernel registers ramoops immediately after driver_init and before "
                          "all normal initcall levels. The watchdog bridge, ROM ramdisk, reserved "
                          "persistent memory, and diagnostic command line remain preserved."
                      ),
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n"
          )
          PY

      - name: Finalize package
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-preinitcall-ramoops
          cp workflow79/extracted/Image.gz "$OUT/Image.gz"
          cp workflow79/extracted/diagnostic.config "$OUT/diagnostic.config"
          cp workflow79/extracted/full-integrated-preinitcall.patch "$OUT/full-integrated-preinitcall.patch"
          cp -a workflow79/extracted/preinitcall-ramoops "$OUT/"
          cp -a workflow79/extracted/watchdog-bridge "$OUT/"
          cp workflow79/source.txt "$OUT/source-checkpoint.txt"

          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 PRE-INITCALL RAMOOPS DIAGNOSTIC

          This candidate preserves the watchdog bridge that removed the former
          approximately 15-second reset, the ROM ramdisk, the reserved 1 MiB
          persistent-memory range, and the ramoops boot parameters.

          New kernel change:
            ramoops is registered directly after driver_init(), before every normal
            pure/core/postcore initcall. CON_PRINTBUFFER should also copy the existing
            printk backlog into persistent RAM when the console registers.

          This image is not hardware-validated. Flash Boot only, test once, enter
          OrangeFox immediately after the forced restart, and run the pstore collector.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/candidate-status.tsv"
          printf 'watchdog-bridge-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-ramdisk-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'persistent-memory-reserved-in-dtb\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'ramoops-params-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'ramoops-before-normal-initcalls\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'compiled-checkpoint-reused\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/candidate-status.tsv"
          printf 'flash-performed\tno\n' >> "$OUT/candidate-status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )
          test "$(stat -c %s "$OUT/boot.img")" = 100663296
          grep -Fxq $'ramoops-before-normal-initcalls\tyes' "$OUT/candidate-status.tsv"

      - name: Upload final pre-initcall ramoops candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-preinitcall-ramoops-packaged-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-gki-5.10-preinitcall-ramoops
          if-no-files-found: error
          retention-days: 14

      - name: Publish final packaging status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_STATUS: ${{ job.status }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          BODY="Workflow 80 packaging run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Status: completed
          Conclusion: ${FINAL_STATUS}
          Source Workflow 79 run: ${SOURCE_RUN_ID}
          Head SHA: ${GITHUB_SHA}

          Purpose: package the compiled pre-initcall ramoops checkpoint without rebuilding the kernel."
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/5010467537" \
            -f body="$BODY"
