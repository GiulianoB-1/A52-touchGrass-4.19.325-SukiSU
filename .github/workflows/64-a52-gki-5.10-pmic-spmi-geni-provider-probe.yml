name: 64 - A52 GKI 5.10 PMIC SPMI and GENI provider probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/64-a52-gki-5.10-pmic-spmi-geni-provider-probe.yml
      - scripts/64_probe_a52xq_pmic_spmi_geni.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-pmic-spmi-geni-provider-probe
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  SEED_ARTIFACT_ID: '8413697551'
  SEED_CONFIG_SHA256: b4da88c027cb7d3efad948b0f0986ee24d968dedcf14499d360f4e0c623cf01a

jobs:
  probe:
    name: Compile-probe PMIC SPMI watchdog and GENI providers
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 40 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 64 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install compile-probe dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio lz4 file dwarves

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate and clean GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          test -x gki/common/scripts/config
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

      - name: Obtain Workflow 52 resolved configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workspace/workflow52-seed artifacts/logs
          ZIP=workspace/workflow52-seed/seed.zip
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o "$ZIP" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SEED_ARTIFACT_ID}/zip"
          unzip -p "$ZIP" a52xq-5.10-resolved.config \
            > workspace/workflow52-seed/a52xq-5.10-resolved.config
          test -s workspace/workflow52-seed/a52xq-5.10-resolved.config
          printf '%s  %s\n' "$SEED_CONFIG_SHA256" \
            workspace/workflow52-seed/a52xq-5.10-resolved.config | sha256sum -c -

      - name: Inventory PMIC SPMI watchdog and GENI probes
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-pmic-spmi-geni-provider-probe
          rm -rf "$OUT" workspace/gki-pmic-spmi-geni-out
          mkdir -p "$OUT/logs" "$OUT/configs" workspace/gki-pmic-spmi-geni-out
          python3 scripts/64_probe_a52xq_pmic_spmi_geni.py stage \
            --gki gki/common \
            --output "$OUT"
          test -s "$OUT/probe-plan.tsv"
          test -s "$OUT/compatible-source-coverage.tsv"
          test -s "$OUT/analysis-metadata.txt"
          test "$(tail -n +2 "$OUT/probe-plan.tsv" | wc -l)" -eq 9
          test "$(tail -n +2 "$OUT/compatible-source-coverage.tsv" | wc -l)" -eq 13

      - name: Resolve configurations and compile each provider object
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-pmic-spmi-geni-provider-probe"
          BASE="$PWD/workspace/workflow52-seed/a52xq-5.10-resolved.config"
          STATUS="$PWD/workspace/workflow64-compile-status.tsv"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          "$CLANG" --version | tee "$OUT/logs/toolchain.log"

          printf 'probe\ttarget\tconfig_symbol\tresolved_value\tresult\texit_code\tobject_produced\n' > "$STATUS"

          config_value() {
            local file="$1" symbol="$2"
            if grep -Fxq "${symbol}=y" "$file"; then printf y
            elif grep -Fxq "${symbol}=m" "$file"; then printf m
            else printf n
            fi
          }

          missing_sources() {
            local probe="$1"
            awk -F '\t' -v probe="$probe" 'NR > 1 && $1 == probe { print $7 }' \
              "$OUT/probe-plan.tsv" | tr -d '\r'
          }

          run_probe() {
            local probe="$1" target="$2" config_symbol="$3"
            shift 3
            local probe_out="$PWD/workspace/gki-pmic-spmi-geni-out/$probe"
            local log="$OUT/logs/$probe.log"
            local missing
            rm -rf "$probe_out"
            mkdir -p "$probe_out"
            cp "$BASE" "$probe_out/.config"
            gki/common/scripts/config --file "$probe_out/.config" --disable TRIM_UNUSED_KSYMS
            gki/common/scripts/config --file "$probe_out/.config" --set-str UNUSED_KSYMS_WHITELIST ''
            for symbol in "$@"; do
              gki/common/scripts/config --file "$probe_out/.config" --enable "${symbol#CONFIG_}"
            done
            make -C gki/common O="$probe_out" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
              >> "$log" 2>&1
            cp "$probe_out/.config" "$OUT/configs/$probe.config"

            local resolved result rc produced=no
            resolved="$(config_value "$probe_out/.config" "$config_symbol")"
            missing="$(missing_sources "$probe")"
            if test -n "$missing"; then
              result=source-missing
              rc=0
              printf 'Missing source files: %s\n' "$missing" >> "$log"
            elif test "$resolved" = n; then
              result=config-blocked
              rc=0
            else
              local object_target object_rc
              local -a targets
              IFS=',' read -r -a targets <<< "$target"
              rc=0
              produced=yes
              for object_target in "${targets[@]}"; do
                set +e
                make -C gki/common O="$probe_out" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
                  "$object_target" >> "$log" 2>&1
                object_rc=$?
                set -e
                if test "$object_rc" -ne 0; then rc=$object_rc; fi
                if ! test -s "$probe_out/$object_target"; then produced=no; fi
              done
              if test "$rc" -eq 0 && test "$produced" = yes; then
                result=compiled
              else
                result=compile-failed
              fi
            fi
            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$probe" "$target" "$config_symbol" "$resolved" "$result" "$rc" "$produced" \
              >> "$STATUS"
          }

          run_probe spmi-core \
            "drivers/spmi/spmi.o" CONFIG_SPMI \
            CONFIG_ARCH_QCOM CONFIG_SPMI
          run_probe spmi-pmic-arb \
            "drivers/spmi/spmi-pmic-arb.o" CONFIG_SPMI_MSM_PMIC_ARB \
            CONFIG_ARCH_QCOM CONFIG_OF CONFIG_SPMI CONFIG_SPMI_MSM_PMIC_ARB
          run_probe spmi-pmic-mfd \
            "drivers/mfd/qcom-spmi-pmic.o" CONFIG_MFD_SPMI_PMIC \
            CONFIG_ARCH_QCOM CONFIG_OF CONFIG_SPMI CONFIG_MFD_CORE CONFIG_MFD_SPMI_PMIC
          run_probe spmi-pmic-pinctrl \
            "drivers/pinctrl/qcom/pinctrl-spmi-gpio.o,drivers/pinctrl/qcom/pinctrl-spmi-mpp.o" \
            CONFIG_PINCTRL_QCOM_SPMI_PMIC CONFIG_ARCH_QCOM CONFIG_OF CONFIG_SPMI \
            CONFIG_PINCTRL CONFIG_GPIOLIB CONFIG_PINCTRL_QCOM_SPMI_PMIC
          run_probe spmi-temp-alarm \
            "drivers/thermal/qcom/qcom-spmi-temp-alarm.o" CONFIG_QCOM_SPMI_TEMP_ALARM \
            CONFIG_ARCH_QCOM CONFIG_OF CONFIG_SPMI CONFIG_THERMAL CONFIG_QCOM_SPMI_TEMP_ALARM
          run_probe spmi-adc5 \
            "drivers/iio/adc/qcom-vadc-common.o,drivers/iio/adc/qcom-spmi-adc5.o" \
            CONFIG_QCOM_SPMI_ADC5 CONFIG_ARCH_QCOM CONFIG_OF CONFIG_SPMI CONFIG_IIO \
            CONFIG_QCOM_VADC_COMMON CONFIG_QCOM_SPMI_ADC5
          run_probe spmi-pmic-clkdiv \
            "drivers/clk/qcom/clk-spmi-pmic-div.o" CONFIG_SPMI_PMIC_CLKDIV \
            CONFIG_ARCH_QCOM CONFIG_OF CONFIG_SPMI CONFIG_COMMON_CLK CONFIG_SPMI_PMIC_CLKDIV
          run_probe qcom-watchdog \
            "drivers/watchdog/qcom-wdt.o" CONFIG_QCOM_WDT \
            CONFIG_ARCH_QCOM CONFIG_OF CONFIG_WATCHDOG CONFIG_WATCHDOG_CORE CONFIG_QCOM_WDT
          run_probe geni-i2c \
            "drivers/soc/qcom/qcom-geni-se.o,drivers/i2c/busses/i2c-qcom-geni.o" \
            CONFIG_I2C_QCOM_GENI CONFIG_ARCH_QCOM CONFIG_OF CONFIG_I2C \
            CONFIG_QCOM_GENI_SE CONFIG_I2C_QCOM_GENI

          cat "$STATUS"
          python3 scripts/64_probe_a52xq_pmic_spmi_geni.py finalize \
            --output "$OUT" --status-file "$STATUS"

      - name: Enforce PMIC SPMI and GENI probe invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-pmic-spmi-geni-provider-probe
          test -s "$OUT/PORTING-PROBE-REPORT.md"
          test -s "$OUT/compile-status.tsv"
          test -s "$OUT/probe-plan.tsv"
          test -s "$OUT/compatible-source-coverage.tsv"
          test -s "$OUT/analysis-metadata.txt"
          test -s "$OUT/SHA256SUMS"
          test "$(tail -n +2 "$OUT/compile-status.tsv" | wc -l)" -eq 9
          grep -Fxq \
            'artifact_type=a52xq-gki-5.10-pmic-spmi-geni-provider-compile-probe-not-flashable' \
            "$OUT/analysis-metadata.txt"
          grep -Fxq 'flashable=no' "$OUT/analysis-metadata.txt"
          ! find "$OUT" -type f \( -name Image -o -name boot.img -o -name '*.dtb' \) | grep -q .
          (cd "$OUT" && sha256sum -c SHA256SUMS)
          cat "$OUT/analysis-metadata.txt"
          cat "$OUT/compatible-source-coverage.tsv"
          sed -n '1,700p' "$OUT/PORTING-PROBE-REPORT.md"

      - name: Upload non-flashable PMIC SPMI and GENI provider probe
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-pmic-spmi-geni-provider-probe-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-pmic-spmi-geni-provider-probe
          if-no-files-found: error
          retention-days: 30

      - name: Upload Workflow 64 failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-pmic-spmi-geni-provider-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-pmic-spmi-geni-provider-probe/
            workspace/workflow64-compile-status.tsv
            workspace/gki-pmic-spmi-geni-out/*/.config
          if-no-files-found: warn
          retention-days: 7
