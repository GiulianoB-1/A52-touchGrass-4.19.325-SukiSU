name: 59 - A52 GKI 5.10 SM6350 interconnect compile probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/59-a52-gki-5.10-sm6350-interconnect-probe.yml
      - scripts/59_probe_a52xq_sm6350_interconnect.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-sm6350-interconnect-probe
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  UPSTREAM_LINUX_SHA: 830b3c68c1fb1e9176028d02ef86f3cf76aa2476
  SEED_ARTIFACT_ID: '8413697551'
  SEED_CONFIG_SHA256: b4da88c027cb7d3efad948b0f0986ee24d968dedcf14499d360f4e0c623cf01a

jobs:
  probe:
    name: Compile-probe SM6350 Qualcomm interconnect
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 35 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 59 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install compile-probe dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio lz4 file dwarves

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate and clean GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          test -x gki/common/scripts/config
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

      - name: Obtain Workflow 52 resolved configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workspace/workflow52-seed artifacts/logs
          ZIP=workspace/workflow52-seed/seed.zip
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o "$ZIP" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SEED_ARTIFACT_ID}/zip"
          unzip -p "$ZIP" a52xq-5.10-resolved.config \
            > workspace/workflow52-seed/a52xq-5.10-resolved.config
          test -s workspace/workflow52-seed/a52xq-5.10-resolved.config
          printf '%s  %s\n' "$SEED_CONFIG_SHA256" \
            workspace/workflow52-seed/a52xq-5.10-resolved.config | sha256sum -c -

      - name: Download pinned Linux 6.1 SM6350 provider sources
        run: |
          set -Eeuo pipefail
          UP="$PWD/workspace/linux-v6.1-sm6350"
          BASE="https://raw.githubusercontent.com/torvalds/linux/${UPSTREAM_LINUX_SHA}"
          rm -rf "$UP"
          mkdir -p \
            "$UP/drivers/interconnect/qcom" \
            "$UP/include/dt-bindings/interconnect"
          curl -fL --retry 3 --retry-all-errors \
            -o "$UP/drivers/interconnect/qcom/sm6350.c" \
            "$BASE/drivers/interconnect/qcom/sm6350.c"
          curl -fL --retry 3 --retry-all-errors \
            -o "$UP/drivers/interconnect/qcom/sm6350.h" \
            "$BASE/drivers/interconnect/qcom/sm6350.h"
          curl -fL --retry 3 --retry-all-errors \
            -o "$UP/include/dt-bindings/interconnect/qcom,sm6350.h" \
            "$BASE/include/dt-bindings/interconnect/qcom,sm6350.h"
          test -s "$UP/drivers/interconnect/qcom/sm6350.c"
          test -s "$UP/drivers/interconnect/qcom/sm6350.h"
          test -s "$UP/include/dt-bindings/interconnect/qcom,sm6350.h"
          sha256sum \
            "$UP/drivers/interconnect/qcom/sm6350.c" \
            "$UP/drivers/interconnect/qcom/sm6350.h" \
            "$UP/include/dt-bindings/interconnect/qcom,sm6350.h"

      - name: Stage SM6350 provider and inventory probes
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-sm6350-interconnect-probe
          rm -rf "$OUT" workspace/gki-sm6350-interconnect-out
          mkdir -p "$OUT/logs" "$OUT/configs" workspace/gki-sm6350-interconnect-out
          python3 scripts/59_probe_a52xq_sm6350_interconnect.py stage \
            --gki gki/common \
            --upstream workspace/linux-v6.1-sm6350 \
            --output "$OUT"
          git -C gki/common diff --check > "$OUT/logs/port-diff-check.log" 2>&1 || true
          test -s "$OUT/sm6350-interconnect-port.patch"
          test -s "$OUT/staged-files.tsv"
          test -s "$OUT/probe-plan.tsv"
          test -s "$OUT/analysis-metadata.txt"
          test "$(tail -n +2 "$OUT/probe-plan.tsv" | wc -l)" -eq 4

      - name: Resolve configurations and compile each interconnect object
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-sm6350-interconnect-probe"
          BASE="$PWD/workspace/workflow52-seed/a52xq-5.10-resolved.config"
          STATUS="$PWD/workspace/workflow59-compile-status.tsv"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          "$CLANG" --version | tee "$OUT/logs/toolchain.log"

          printf 'probe\ttarget\tconfig_symbol\tresolved_value\tresult\texit_code\tobject_produced\n' > "$STATUS"

          config_value() {
            local file="$1" symbol="$2"
            if grep -Fxq "${symbol}=y" "$file"; then printf y
            elif grep -Fxq "${symbol}=m" "$file"; then printf m
            else printf n
            fi
          }

          missing_sources() {
            local probe="$1"
            awk -F '\t' -v probe="$probe" 'NR > 1 && $1 == probe { print $7 }' \
              "$OUT/probe-plan.tsv" | tr -d '\r'
          }

          run_probe() {
            local probe="$1" target="$2" config_symbol="$3"
            shift 3
            local probe_out="$PWD/workspace/gki-sm6350-interconnect-out/$probe"
            local log="$OUT/logs/$probe.log"
            local missing
            rm -rf "$probe_out"
            mkdir -p "$probe_out"
            cp "$BASE" "$probe_out/.config"
            gki/common/scripts/config --file "$probe_out/.config" --disable TRIM_UNUSED_KSYMS
            gki/common/scripts/config --file "$probe_out/.config" --set-str UNUSED_KSYMS_WHITELIST ''
            gki/common/scripts/config --file "$probe_out/.config" --enable ARCH_QCOM
            gki/common/scripts/config --file "$probe_out/.config" --enable OF
            for symbol in "$@"; do
              gki/common/scripts/config --file "$probe_out/.config" --enable "${symbol#CONFIG_}"
            done
            make -C gki/common O="$probe_out" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
              >> "$log" 2>&1
            cp "$probe_out/.config" "$OUT/configs/$probe.config"

            local resolved result rc produced=no
            resolved="$(config_value "$probe_out/.config" "$config_symbol")"
            missing="$(missing_sources "$probe")"
            if test -n "$missing"; then
              result=source-missing
              rc=0
              printf 'Missing source files: %s\n' "$missing" >> "$log"
            elif test "$resolved" = n; then
              result=config-blocked
              rc=0
            else
              local object_target object_rc
              local -a targets
              IFS=',' read -r -a targets <<< "$target"
              rc=0
              produced=yes
              for object_target in "${targets[@]}"; do
                set +e
                make -C gki/common O="$probe_out" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
                  "$object_target" >> "$log" 2>&1
                object_rc=$?
                set -e
                if test "$object_rc" -ne 0; then rc=$object_rc; fi
                if ! test -s "$probe_out/$object_target"; then produced=no; fi
              done
              if test "$rc" -eq 0 && test "$produced" = yes; then
                result=compiled
              else
                result=compile-failed
              fi
            fi
            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$probe" "$target" "$config_symbol" "$resolved" "$result" "$rc" "$produced" \
              >> "$STATUS"
          }

          run_probe icc-core \
            "drivers/interconnect/core.o,drivers/interconnect/bulk.o" \
            CONFIG_INTERCONNECT CONFIG_INTERCONNECT
          run_probe qcom-bcm-voter drivers/interconnect/qcom/bcm-voter.o \
            CONFIG_INTERCONNECT_QCOM_BCM_VOTER CONFIG_INTERCONNECT CONFIG_QCOM_RPMH \
            CONFIG_QCOM_COMMAND_DB CONFIG_INTERCONNECT_QCOM \
            CONFIG_INTERCONNECT_QCOM_RPMH_POSSIBLE \
            CONFIG_INTERCONNECT_QCOM_SM6350
          run_probe qcom-icc-rpmh drivers/interconnect/qcom/icc-rpmh.o \
            CONFIG_INTERCONNECT_QCOM_RPMH CONFIG_INTERCONNECT CONFIG_QCOM_RPMH \
            CONFIG_QCOM_COMMAND_DB CONFIG_INTERCONNECT_QCOM \
            CONFIG_INTERCONNECT_QCOM_RPMH_POSSIBLE \
            CONFIG_INTERCONNECT_QCOM_SM6350
          run_probe sm6350-provider drivers/interconnect/qcom/sm6350.o \
            CONFIG_INTERCONNECT_QCOM_SM6350 CONFIG_INTERCONNECT CONFIG_QCOM_RPMH \
            CONFIG_QCOM_COMMAND_DB CONFIG_INTERCONNECT_QCOM \
            CONFIG_INTERCONNECT_QCOM_RPMH_POSSIBLE CONFIG_INTERCONNECT_QCOM_RPMH \
            CONFIG_INTERCONNECT_QCOM_BCM_VOTER CONFIG_INTERCONNECT_QCOM_SM6350

          cat "$STATUS"
          python3 scripts/59_probe_a52xq_sm6350_interconnect.py finalize \
            --output "$OUT" --status-file "$STATUS"

      - name: Enforce SM6350 interconnect probe invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-sm6350-interconnect-probe
          test -s "$OUT/PORTING-PROBE-REPORT.md"
          test -s "$OUT/compile-status.tsv"
          test -s "$OUT/probe-plan.tsv"
          test -s "$OUT/staged-files.tsv"
          test -s "$OUT/sm6350-interconnect-port.patch"
          test -s "$OUT/analysis-metadata.txt"
          test -s "$OUT/SHA256SUMS"
          test "$(tail -n +2 "$OUT/compile-status.tsv" | wc -l)" -eq 4
          grep -Fxq \
            'artifact_type=a52xq-gki-5.10-sm6350-interconnect-compile-probe-not-flashable' \
            "$OUT/analysis-metadata.txt"
          ! find "$OUT" -type f \( -name Image -o -name boot.img -o -name '*.dtb' \) | grep -q .
          (cd "$OUT" && sha256sum -c SHA256SUMS)
          cat "$OUT/analysis-metadata.txt"
          sed -n '1,380p' "$OUT/PORTING-PROBE-REPORT.md"

      - name: Upload non-flashable SM6350 interconnect probe
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-sm6350-interconnect-probe-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-sm6350-interconnect-probe
          if-no-files-found: error
          retention-days: 30

      - name: Upload Workflow 59 failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-sm6350-interconnect-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-sm6350-interconnect-probe/
            workspace/workflow59-compile-status.tsv
            workspace/gki-sm6350-interconnect-out/*/.config
          if-no-files-found: warn
          retention-days: 7
