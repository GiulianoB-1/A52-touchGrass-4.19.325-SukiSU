name: 52 - A52 GKI 5.10 early-boot seed

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/52-a52-gki-5.10-early-boot-seed.yml
      - scripts/52_prepare_a52xq_5.10_early_boot_seed.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-early-boot-seed
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  TOUCHGRASS_COMMIT: 6bf351bdf18bdb228db79e66f14a7a9c0178e5d7
  BASE_CONFIG_ARTIFACT_ID: '8413106096'
  BASE_CONFIG_SHA256: aab272a1b406dda357b34a87339f63a9c50b68525cc3e1bd170eaf0f226ce0c7

jobs:
  seed:
    name: Resolve early-boot config and source-port seed
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 26 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 52 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Install analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl unzip make python3 bc bison flex libssl-dev libelf-dev

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          test -x gki/common/scripts/config

      - name: Restore working touchGrass Linux 4.19.200 source
        id: touchgrass-cache
        uses: actions/cache/restore@v4
        with:
          path: workspace/touchgrass-a52xq
          key: a52xq-touchgrass-linux-4.19.200-main-v2-${{ runner.os }}-${{ env.TOUCHGRASS_COMMIT }}

      - name: Validate touchGrass source
        run: |
          set -Eeuo pipefail
          test '${{ steps.touchgrass-cache.outputs.cache-hit }}' = true
          test -d workspace/touchgrass-a52xq/.git
          test "$(git -C workspace/touchgrass-a52xq rev-parse HEAD)" = "${TOUCHGRASS_COMMIT}"
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200

      - name: Obtain pinned official GKI configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workspace/base-config artifacts/logs
          ZIP=workspace/base-config/workflow51-analysis.zip
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o "$ZIP" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${BASE_CONFIG_ARTIFACT_ID}/zip"
          unzip -p "$ZIP" gki-5.10.config > workspace/base-config/gki-5.10.config
          test -s workspace/base-config/gki-5.10.config
          printf '%s  %s\n' "$BASE_CONFIG_SHA256" workspace/base-config/gki-5.10.config | sha256sum -c -

      - name: Generate and resolve A52 early-boot seed
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-early-boot-seed
          GKI_OUT="$PWD/workspace/gki-a52xq-config-out"
          BASE="$PWD/workspace/base-config/gki-5.10.config"
          rm -rf "$OUT" "$GKI_OUT"
          mkdir -p "$OUT" "$GKI_OUT" artifacts/logs

          python3 scripts/52_prepare_a52xq_5.10_early_boot_seed.py \
            --gki gki/common \
            --touchgrass workspace/touchgrass-a52xq \
            --base-config "$BASE" \
            --output "$OUT"

          cp "$BASE" "$GKI_OUT/.config"
          while IFS= read -r line; do
            case "$line" in
              CONFIG_*=y)
                symbol="${line%%=*}"
                symbol="${symbol#CONFIG_}"
                gki/common/scripts/config --file "$GKI_OUT/.config" --enable "$symbol"
                ;;
            esac
          done < "$OUT/a52xq-early-boot.fragment"

          make -C gki/common O="$GKI_OUT" ARCH=arm64 olddefconfig \
            2>&1 | tee artifacts/logs/workflow52-olddefconfig.log
          test -s "$GKI_OUT/.config"
          cp "$GKI_OUT/.config" "$OUT/a52xq-5.10-resolved.config"

          python3 scripts/52_prepare_a52xq_5.10_early_boot_seed.py \
            --gki gki/common \
            --touchgrass workspace/touchgrass-a52xq \
            --base-config "$BASE" \
            --resolved-config "$GKI_OUT/.config" \
            --output "$OUT"

      - name: Enforce seed invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-early-boot-seed
          test -s "$OUT/PORTING-SEED-REPORT.md"
          test -s "$OUT/a52xq-early-boot.fragment"
          test -s "$OUT/a52xq-5.10-resolved.config"
          test -s "$OUT/early-boot-config-status.tsv"
          test -s "$OUT/source-port-manifest.tsv"
          grep -Fxq 'artifact_type=a52xq-gki-5.10-early-boot-seed-not-flashable' "$OUT/analysis-metadata.txt"
          grep -Fxq "gki_commit=${GKI_COMMON_SHA}" "$OUT/analysis-metadata.txt"
          grep -Fxq 'resolved_config_present=yes' "$OUT/analysis-metadata.txt"
          ! find "$OUT" -type f \( -name 'Image' -o -name 'Image.gz' -o -name 'boot.img' \) | grep -q .
          (
            cd "$OUT"
            sha256sum -c SHA256SUMS
          )
          cat "$OUT/analysis-metadata.txt"
          sed -n '1,220p' "$OUT/PORTING-SEED-REPORT.md"
          column -ts $'\t' "$OUT/early-boot-config-status.tsv" || cat "$OUT/early-boot-config-status.tsv"

      - name: Upload non-flashable early-boot seed
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-early-boot-seed-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-early-boot-seed
          if-no-files-found: error
          retention-days: 30

      - name: Upload Workflow 52 failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-early-boot-seed-failure-${{ github.run_number }}
          path: |
            artifacts/logs/
            artifacts/a52xq-gki-5.10-early-boot-seed/
            workspace/gki-a52xq-config-out/.config
          if-no-files-found: warn
          retention-days: 7
