name: 66 - A52 GKI 5.10 downstream QSMMU object probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/66-a52-gki-5.10-downstream-qsmmu-object-probe.yml
      - scripts/66_probe_a52xq_downstream_qsmmu.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-downstream-qsmmu-object-probe
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  TOUCHGRASS_COMMIT: 6bf351bdf18bdb228db79e66f14a7a9c0178e5d7
  SEED_ARTIFACT_ID: '8413697551'
  SEED_CONFIG_SHA256: b4da88c027cb7d3efad948b0f0986ee24d968dedcf14499d360f4e0c623cf01a

jobs:
  probe:
    name: Compile isolated downstream QSMMU v500 object
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 42 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 66 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install compile-probe dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio lz4 file dwarves

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate and clean GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          test -x gki/common/scripts/config
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

      - name: Restore pinned touchGrass source
        id: touchgrass-cache
        uses: actions/cache/restore@v4
        with:
          path: workspace/touchgrass-a52xq
          key: a52xq-touchgrass-linux-4.19.200-main-v2-${{ runner.os }}-${{ env.TOUCHGRASS_COMMIT }}

      - name: Validate touchGrass source
        run: |
          set -Eeuo pipefail
          test '${{ steps.touchgrass-cache.outputs.cache-hit }}' = true
          test -d workspace/touchgrass-a52xq/.git
          test "$(git -C workspace/touchgrass-a52xq rev-parse HEAD)" = "${TOUCHGRASS_COMMIT}"
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200

      - name: Obtain Workflow 52 resolved configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workspace/workflow52-seed
          ZIP=workspace/workflow52-seed/seed.zip
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o "$ZIP" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SEED_ARTIFACT_ID}/zip"
          unzip -p "$ZIP" a52xq-5.10-resolved.config \
            > workspace/workflow52-seed/a52xq-5.10-resolved.config
          printf '%s  %s\n' "$SEED_CONFIG_SHA256" \
            workspace/workflow52-seed/a52xq-5.10-resolved.config | sha256sum -c -

      - name: Stage isolated downstream QSMMU source
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-downstream-qsmmu-object-probe
          rm -rf "$OUT" workspace/gki-downstream-qsmmu-out
          mkdir -p "$OUT/logs" workspace/gki-downstream-qsmmu-out
          python3 scripts/66_probe_a52xq_downstream_qsmmu.py stage \
            --gki gki/common \
            --touchgrass workspace/touchgrass-a52xq \
            --output "$OUT"
          test -s "$OUT/staged-files.tsv"
          test -s "$OUT/compatibility-headers.tsv"
          test -s "$OUT/source-adaptations.txt"
          test -s "$OUT/downstream-qsmmu-stage.patch"
          test -s "$OUT/analysis-metadata.txt"
          git -C gki/common diff --check

      - name: Resolve configuration and compile isolated downstream object
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-downstream-qsmmu-object-probe"
          BUILD="$PWD/workspace/gki-downstream-qsmmu-out"
          BASE="$PWD/workspace/workflow52-seed/a52xq-5.10-resolved.config"
          STATUS="$PWD/workspace/workflow66-compile-status.tsv"
          TARGET=drivers/iommu/legacy-qsmmu/arm-smmu-downstream.o
          cp "$BASE" "$BUILD/.config"
          for symbol in \
            ARCH_QCOM OF IOMMU_SUPPORT ARM_SMMU PCI ACPI DEBUG_FS \
            QCOM_SCM QCOM_SMEM INTERCONNECT; do
            gki/common/scripts/config --file "$BUILD/.config" --enable "$symbol"
          done
          gki/common/scripts/config --file "$BUILD/.config" --disable TRIM_UNUSED_KSYMS
          gki/common/scripts/config --file "$BUILD/.config" --set-str UNUSED_KSYMS_WHITELIST ''

          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          "$CLANG" --version | tee "$OUT/logs/toolchain.log"
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            > "$OUT/logs/olddefconfig.log" 2>&1
          cp "$BUILD/.config" "$OUT/resolved.config"

          rc=0
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            "$TARGET" > "$OUT/logs/downstream-qsmmu.log" 2>&1 || rc=$?
          result=compile-failed
          produced=no
          if test "$rc" -eq 0 && test -s "$BUILD/$TARGET"; then
            result=compiled
            produced=yes
          fi
          printf 'target\tresult\texit_code\tobject_produced\n%s\t%s\t%s\t%s\n' \
            "$TARGET" "$result" "$rc" "$produced" > "$STATUS"
          cat "$STATUS"
          python3 scripts/66_probe_a52xq_downstream_qsmmu.py finalize \
            --output "$OUT" --status-file "$STATUS"
          test -s "$OUT/PORTING-PROBE-REPORT.md"
          test -s "$OUT/compile-status.tsv"
          test -s "$OUT/SHA256SUMS"

      - name: Enforce isolated QSMMU probe invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-downstream-qsmmu-object-probe
          test -s "$OUT/PORTING-PROBE-REPORT.md"
          test -s "$OUT/compile-status.tsv"
          test -s "$OUT/staged-files.tsv"
          test -s "$OUT/compatibility-headers.tsv"
          test -s "$OUT/source-adaptations.txt"
          test -s "$OUT/downstream-qsmmu-stage.patch"
          test -s "$OUT/resolved.config"
          test -s "$OUT/analysis-metadata.txt"
          test -s "$OUT/SHA256SUMS"
          grep -Fxq \
            'artifact_type=a52xq-gki-5.10-downstream-qsmmu-isolated-object-probe-not-flashable' \
            "$OUT/analysis-metadata.txt"
          grep -Fxq 'staging_policy=isolated-parallel-driver-no-replacement-of-gki-arm-smmu' \
            "$OUT/analysis-metadata.txt"
          grep -Fxq 'link_test=no' "$OUT/analysis-metadata.txt"
          grep -Fxq 'flashable=no' "$OUT/analysis-metadata.txt"
          ! find "$OUT" -type f \( -name Image -o -name boot.img -o -name '*.dtb' \) | grep -q .
          (cd "$OUT" && sha256sum -c SHA256SUMS)
          cat "$OUT/analysis-metadata.txt"
          sed -n '1,500p' "$OUT/PORTING-PROBE-REPORT.md"

      - name: Upload non-flashable isolated downstream QSMMU probe
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-downstream-qsmmu-object-probe-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-downstream-qsmmu-object-probe
          if-no-files-found: error
          retention-days: 30

      - name: Upload Workflow 66 failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-downstream-qsmmu-object-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-downstream-qsmmu-object-probe
            workspace/workflow66-compile-status.tsv
            workspace/gki-downstream-qsmmu-out/.config
          if-no-files-found: warn
          retention-days: 7
