name: 42 - A52 Linux 4.19.205 no-root bisect boot

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: a52-linux-4.19.205-no-root-bisect
  cancel-in-progress: true

env:
  JOBS: '4'
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build-repack:
    name: Build and repack Linux 4.19.205 no-root bisect candidate
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out kernel project branch
        uses: actions/checkout@v4
        with:
          ref: rebase/resukisu-linux-4.19.325

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils gzip zip unzip make gcc g++ bc bison flex ccache patch \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils file tar

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: a52xq-linux-4.19.205-no-root-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a52xq-linux-4.19.200-ccache-${{ runner.os }}-
            a52xq-linux-4.19.210-ccache-${{ runner.os }}-

      - name: Prepare exact touchGrass source through Linux 4.19.200
        run: |
          set -Eeuo pipefail
          chmod +x scripts/*.sh scripts/*.py
          ./scripts/01_prepare_source.sh
          ./scripts/03_apply_linux_4.19.153.sh
          ./scripts/04_apply_linux_4.19.154.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.154 4.19.159
          ./scripts/checkpoint_resolve_linux_4.19.159.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.159 4.19.164
          ./scripts/checkpoint_resolve_linux_4.19.164.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.164 4.19.180
          ./scripts/checkpoint_resolve_linux_4.19.180.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.180 4.19.200
          ./scripts/checkpoint_resolve_linux_4.19.200.sh
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200

      - name: Derive and apply official Linux 4.19.205 merge
        run: |
          set -Eeuo pipefail
          cp scripts/checkpoint_merge_linux_4.19.210.sh /tmp/checkpoint_merge_linux_4.19.205.sh
          sed -i \
            -e 's/TO_TAG=v4.19.210/TO_TAG=v4.19.205/' \
            -e '/^TARGET_COMMIT=/d' \
            -e '/test "$to_sha" = "$TARGET_COMMIT"/d' \
            /tmp/checkpoint_merge_linux_4.19.205.sh
          chmod +x /tmp/checkpoint_merge_linux_4.19.205.sh
          /tmp/checkpoint_merge_linux_4.19.205.sh
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.205

      - name: Apply conditional merge-shape repairs for 4.19.205
        run: |
          set -Eeuo pipefail
          cp scripts/checkpoint_fix_linux_4.19.210_compile.sh /tmp/checkpoint_fix_linux_4.19.205_compile.sh
          sed -i 's/TARGET_VERSION=4.19.210/TARGET_VERSION=4.19.205/' \
            /tmp/checkpoint_fix_linux_4.19.205_compile.sh
          chmod +x /tmp/checkpoint_fix_linux_4.19.205_compile.sh
          /tmp/checkpoint_fix_linux_4.19.205_compile.sh

      - name: Build full-hardware no-root Linux 4.19.205 kernel
        run: |
          set -Eeuo pipefail
          cp scripts/40_build_a52_p1_full_hardware_diag.sh /tmp/build-4.19.205-no-root.sh
          sed -i \
            -e 's/TARGET_VERSION=4.19.325/TARGET_VERSION=4.19.205/' \
            -e 's/a52xq-p1-full-hardware-diag-/a52xq-linux-4.19.205-no-root-bisect-/' \
            -e 's/-d TOUCHSCREEN_STM_FTS5CU56A/-d KSU -d KSU_SUSFS -d TOUCHSCREEN_STM_FTS5CU56A/' \
            /tmp/build-4.19.205-no-root.sh
          chmod +x /tmp/build-4.19.205-no-root.sh
          /tmp/build-4.19.205-no-root.sh

      - name: Enforce bisect invariants and no-root policy
        run: |
          set -Eeuo pipefail
          OUT=artifacts/p1-full-hardware-diag
          grep -Fxq '# CONFIG_TOUCHSCREEN_STM_FTS5CU56A is not set' "$OUT/final.config"
          grep -Fxq 'CONFIG_INPUT_TOUCHSCREEN=y' "$OUT/final.config"
          ! grep -Eq '^CONFIG_KSU(=|_)' "$OUT/final.config"
          grep -Fxq 'CONFIG_DRM=y' "$OUT/final.config"
          grep -Fxq 'CONFIG_QCOM_KGSL=y' "$OUT/final.config"
          grep -Fxq 'CONFIG_SCSI_UFS_QCOM=y' "$OUT/final.config"
          grep -Fxq 'CONFIG_PSTORE_RAM=y' "$OUT/final.config"
          printf 'known_good=4.19.200\ntest_version=4.19.205\nknown_bad=4.19.210\nroot_integration=none\n' \
            > "$OUT/bisect-state.txt"

      - name: Download and validate checksum-locked original boot image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p intake artifacts/a52xq-linux-4.19.205-no-root-boot
          ASSET_LINE="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=30" \
            --jq '.[] | .assets[] | select(.name | endswith(".img")) | [.id, .name, .created_at] | @tsv' | head -n 1)"
          test -n "$ASSET_LINE"
          IFS=$'\t' read -r ASSET_ID ASSET_NAME ASSET_CREATED <<< "$ASSET_LINE"
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/octet-stream' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" \
            --output intake/boot.img
          python3 scripts/37_validate_a52_p1_boot_source.py intake/boot.img \
            --lock projects/a52-p1-boot-image/boot-source.lock \
            --output artifacts/a52xq-linux-4.19.205-no-root-boot/source-validation.json

      - name: Repack and audit Linux 4.19.205 boot image
        run: |
          set -Eeuo pipefail
          KERNEL=artifacts/p1-full-hardware-diag/Image.gz
          OUT=artifacts/a52xq-linux-4.19.205-no-root-boot
          test -s "$KERNEL"
          python3 scripts/38_repack_a52_p1_boot.py \
            --source intake/boot.img \
            --kernel "$KERNEL" \
            --output "$OUT/boot.img" \
            --report "$OUT/repack-report.json"
          cp artifacts/p1-full-hardware-diag/final.config "$OUT/final.config"
          cp artifacts/p1-full-hardware-diag/bisect-state.txt "$OUT/bisect-state.txt"
          sha256sum "$OUT"/* > "$OUT/SHA256SUMS"
          cat > "$OUT/NOTICE.txt" <<'EOF'
          A52 LINUX 4.19.205 NO-ROOT BISECT CANDIDATE

          Known good: 4.19.200
          Known bad: 4.19.210
          This image changes the Linux stable patch level to 4.19.205 while preserving
          the original ramdisk, DTB, command line, boot header and partition size.
          It has not yet been validated on physical hardware.
          EOF

      - name: Upload hardware-test candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-linux-4.19.205-no-root-bisect-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-linux-4.19.205-no-root-boot
          if-no-files-found: error
          retention-days: 14

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-linux-4.19.205-no-root-diagnostics-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
