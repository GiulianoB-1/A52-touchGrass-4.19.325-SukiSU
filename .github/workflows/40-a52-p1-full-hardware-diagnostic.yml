name: 40 - A52 P1 full-hardware diagnostic kernel

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a52-p1-full-hardware-diag
  cancel-in-progress: true

env:
  JOBS: '4'
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G

jobs:
  diagnostic-build:
    name: Build full A52 stack with only FTS disabled
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out diagnostic kernel branch
        uses: actions/checkout@v4
        with:
          ref: diag/a52-p1-full-hardware

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils gzip zip unzip make gcc g++ bc bison flex ccache patch \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils file

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: a52xq-p1-full-hardware-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a52xq-linux-4.19.325-ccache-${{ runner.os }}-
            a52xq-p0-boot-probe-${{ runner.os }}-
            a52xq-p1-full-hardware-${{ runner.os }}-

      - name: Prepare verified touchGrass 4.19.325 source
        run: |
          set -Eeuo pipefail
          chmod +x scripts/*.sh scripts/*.py
          ./scripts/01_prepare_source.sh
          ./scripts/03_apply_linux_4.19.153.sh
          ./scripts/04_apply_linux_4.19.154.sh
          ./scripts/05_merge_linux_4.19.325.sh
          for repair in scripts/06*_linux_4.19.325*.sh; do
            printf 'Running %s\n' "$repair"
            "$repair"
          done

      - name: Apply verified optional callback repairs
        run: ./scripts/36_patch_a52_p0_optional_callbacks.py

      - name: Build and audit full-hardware diagnostic kernel
        run: ./scripts/40_build_a52_p1_full_hardware_diag.sh

      - name: Preserve build diagnostics
        if: always()
        run: |
          mkdir -p artifacts/p1-full-hardware-diag/diagnostics
          cp -a artifacts/logs/. artifacts/p1-full-hardware-diag/diagnostics/ 2>/dev/null || true
          cp workspace/touchgrass-a52xq/out/.config \
            artifacts/p1-full-hardware-diag/diagnostics/resolved.config 2>/dev/null || true
          cp workspace/touchgrass-a52xq/out/include/config/auto.conf \
            artifacts/p1-full-hardware-diag/diagnostics/auto.conf 2>/dev/null || true
          cp workspace/touchgrass-a52xq/out/.config.old \
            artifacts/p1-full-hardware-diag/diagnostics/config.old 2>/dev/null || true

      - name: Record runner state
        if: always()
        run: |
          mkdir -p artifacts/p1-full-hardware-diag/runner
          df -h > artifacts/p1-full-hardware-diag/runner/disk.txt
          free -h > artifacts/p1-full-hardware-diag/runner/memory.txt
          uname -a > artifacts/p1-full-hardware-diag/runner/uname.txt
          ccache --show-stats > artifacts/p1-full-hardware-diag/runner/ccache.txt 2>&1 || true

      - name: Upload non-flashable diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-p1-full-hardware-diag-${{ github.run_number }}-NON-FLASHABLE
          path: artifacts/p1-full-hardware-diag/
          if-no-files-found: error
          retention-days: 14
