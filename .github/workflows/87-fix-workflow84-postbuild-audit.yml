name: 87 - Fix Workflow 84 post-build audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/87-fix-workflow84-postbuild-audit.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch Workflow 84 security policy and audits
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/84-a52-recovery-ramoops-raw-exporter.yml')
          text = path.read_text()

          old_config = '''          # Preserve the source device defconfig. Only ensure the misc framework
          # remains available; the exporter itself is deliberately built-in.
          "$KERNEL_DIR/scripts/config" --file "$KERNEL_DIR/arch/arm64/configs/a52xq_defconfig" \\
            -e MISC_DEVICES -e IKCONFIG -e IKCONFIG_PROC \\
            -e PSTORE -e PSTORE_RAM -e PSTORE_CONSOLE -e PSTORE_PMSG
'''
          new_config = '''          # Match the live OrangeFox security policy. The exporter is linked
          # directly through drivers/misc/Makefile and does not depend on a
          # CONFIG_MISC_DEVICES symbol in this vendor tree.
          "$KERNEL_DIR/scripts/config" --file "$KERNEL_DIR/arch/arm64/configs/a52xq_defconfig" \\
            -e IKCONFIG -e IKCONFIG_PROC \\
            -e PSTORE -e PSTORE_RAM -e PSTORE_CONSOLE -e PSTORE_PMSG \\
            -d DEVMEM -d PROC_KCORE -d DEBUG_FS
'''
          if text.count(old_config) != 1:
              raise SystemExit('expected exactly one Workflow 84 config block')
          text = text.replace(old_config, new_config, 1)

          old_audit = '''          grep -aFq 'a52_ramoops_raw: captured 0x%llx-0x%llx before ramoops init' "$OUT/Image"
          grep -aFq '/dev/a52_ramoops_raw ready, size=%u' "$OUT/Image"
          grep -Fxq 'CONFIG_MISC_DEVICES=y' "$OUT/final.config"
          grep -Fxq 'CONFIG_PSTORE_RAM=y' "$OUT/final.config"
          grep -Fxq '# CONFIG_DEVMEM is not set' "$OUT/final.config"
          grep -Fxq '# CONFIG_PROC_KCORE is not set' "$OUT/final.config"
'''
          new_audit = '''          python3 - <<'PY_AUDIT'
          from pathlib import Path
          import json

          out = Path('artifacts/a52-recovery-ramoops-exporter')
          image = (out / 'Image').read_bytes()
          config = (out / 'final.config').read_text(errors='replace').splitlines()
          config_set = set(config)
          checks = {
              'snapshot_marker_in_image': b'a52_ramoops_raw: captured 0x%llx-0x%llx before ramoops init' in image,
              'device_marker_in_image': b'/dev/a52_ramoops_raw ready, size=%u' in image,
              'pstore_ram_builtin': 'CONFIG_PSTORE_RAM=y' in config_set,
              'devmem_disabled': '# CONFIG_DEVMEM is not set' in config_set,
              'proc_kcore_disabled': '# CONFIG_PROC_KCORE is not set' in config_set,
              'debugfs_disabled': '# CONFIG_DEBUG_FS is not set' in config_set,
          }
          for name, passed in checks.items():
              print(f'AUDIT {name}: {"PASS" if passed else "FAIL"}')
          (out / 'postbuild-audit.json').write_text(
              json.dumps({'checks': checks}, indent=2, sort_keys=True) + '\\n'
          )
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('post-build audit failed: ' + ', '.join(failed))
          PY_AUDIT
'''
          if text.count(old_audit) != 1:
              raise SystemExit('expected exactly one Workflow 84 audit block')
          text = text.replace(old_audit, new_audit, 1)
          path.write_text(text)
          PY

          git diff --check
          grep -Fq -- '-d DEVMEM -d PROC_KCORE -d DEBUG_FS' .github/workflows/84-a52-recovery-ramoops-raw-exporter.yml
          ! grep -Fq "grep -Fxq 'CONFIG_MISC_DEVICES=y'" .github/workflows/84-a52-recovery-ramoops-raw-exporter.yml
          grep -Fq 'postbuild-audit.json' .github/workflows/84-a52-recovery-ramoops-raw-exporter.yml

      - name: Commit corrected Workflow 84
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/84-a52-recovery-ramoops-raw-exporter.yml
          git commit -m 'Fix recovery exporter post-build audit'
          git push origin HEAD:main
