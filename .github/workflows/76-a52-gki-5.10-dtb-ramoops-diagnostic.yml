name: 76 - A52 GKI 5.10 DT-backed ramoops diagnostic

run-name: Build A52 GKI 5.10 DT-backed ramoops candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/76-a52-gki-5.10-dtb-ramoops-diagnostic.yml'
      - 'scripts/76_repack_a52_boot_with_dtb.py'
      - 'scripts/38_repack_a52_p1_boot.py'

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-dtb-ramoops-diagnostic
  cancel-in-progress: true

env:
  WORKFLOW75_ARTIFACT_ID: '8428249310'
  RAMOOPS_BASE: '0xB1B00000'
  RAMOOPS_SIZE: '0x00100000'
  RAMOOPS_ZONE_SIZE: '0x00040000'

jobs:
  build:
    name: Build DT-backed ramoops diagnostic boot image
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Publish run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 45 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 76 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Purpose: reuse the watchdog-validated 5.10 Image and add the exact OrangeFox ramoops reserved-memory node to the boot DTB.
          Commit: \`${GITHUB_SHA}\`"

      - name: Install DTB and audit tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl unzip python3 device-tree-compiler file

      - name: Download and verify Workflow 75 watchdog candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workflow75
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW75_ARTIFACT_ID}/zip" \
            --output workflow75/artifact.zip
          unzip -q workflow75/artifact.zip -d workflow75/extracted
          (cd workflow75/extracted && sha256sum -c SHA256SUMS)
          test -s workflow75/extracted/boot.img
          test -s workflow75/extracted/Image.gz
          test -s workflow75/extracted/diagnostic.config
          grep -Fxq 'CONFIG_QCOM_WDT=y' workflow75/extracted/diagnostic.config
          grep -Fxq 'CONFIG_PSTORE_CONSOLE=y' workflow75/extracted/diagnostic.config
          grep -Fxq 'CONFIG_PSTORE_RAM=y' workflow75/extracted/diagnostic.config

      - name: Extract and audit source DTB reservation map
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-dtb-ramoops"
          mkdir -p "$OUT"
          python3 - <<'PY'
          import collections
          import importlib.util
          import json
          import struct
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "a52_boot_repack", "scripts/38_repack_a52_p1_boot.py"
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          source = Path("workflow75/extracted/boot.img").read_bytes()
          boot = module.parse_boot(source)
          dtb = boot["dtb"]
          Path("artifacts/a52xq-gki-5.10-dtb-ramoops/original.dtb").write_bytes(dtb)

          header = struct.unpack_from(">10I", dtb, 0)
          magic, total, off_struct, off_strings, _, _, _, _, size_strings, size_struct = header
          if magic != 0xD00DFEED or total != len(dtb):
              raise SystemExit("invalid source DTB")
          strings = dtb[off_strings:off_strings + size_strings]
          pos = off_struct
          stack = []
          nodes = collections.OrderedDict()
          while pos < off_struct + size_struct:
              token = struct.unpack_from(">I", dtb, pos)[0]
              pos += 4
              if token == 1:
                  end = dtb.index(b"\0", pos)
                  name = dtb[pos:end].decode("ascii", "replace")
                  pos = (end + 4) & ~3
                  stack.append(name)
                  path = "/" + "/".join(x for x in stack if x)
                  nodes.setdefault(path, {})
              elif token == 2:
                  stack.pop()
              elif token == 3:
                  length, nameoff = struct.unpack_from(">II", dtb, pos)
                  pos += 8
                  value = dtb[pos:pos + length]
                  pos = (pos + length + 3) & ~3
                  end = strings.index(b"\0", nameoff)
                  prop = strings[nameoff:end].decode("ascii")
                  path = "/" + "/".join(x for x in stack if x)
                  nodes.setdefault(path, {})[prop] = value
              elif token == 4:
                  continue
              elif token == 9:
                  break
              else:
                  raise SystemExit(f"unexpected FDT token {token}")

          def cells(value):
              if len(value) % 4:
                  raise SystemExit("unaligned FDT cell property")
              return list(struct.unpack(">" + "I" * (len(value) // 4), value))

          parent = nodes.get("/reserved-memory")
          if parent is None:
              raise SystemExit("source DTB has no /reserved-memory node")
          if cells(parent.get("#address-cells", b"")) != [2]:
              raise SystemExit("unexpected reserved-memory #address-cells")
          if cells(parent.get("#size-cells", b"")) != [2]:
              raise SystemExit("unexpected reserved-memory #size-cells")

          target_start = 0xB1B00000
          target_end = target_start + 0x100000
          regions = []
          conflicts = []
          for path, props in nodes.items():
              if not path.startswith("/reserved-memory/") or path.count("/") != 2:
                  continue
              reg = props.get("reg")
              if not reg:
                  continue
              values = cells(reg)
              if len(values) != 4:
                  continue
              start = (values[0] << 32) | values[1]
              size = (values[2] << 32) | values[3]
              end = start + size
              row = {"path": path, "start": hex(start), "size": hex(size), "end_exclusive": hex(end)}
              regions.append(row)
              if start < target_end and target_start < end:
                  conflicts.append(row)

          if conflicts:
              raise SystemExit("ramoops range overlaps existing reserved-memory nodes: " + json.dumps(conflicts))
          if any("ramoops" in path.lower() for path in nodes):
              raise SystemExit("source DTB unexpectedly already contains ramoops")

          report = {
              "source_dtb_bytes": len(dtb),
              "reserved_memory_address_cells": 2,
              "reserved_memory_size_cells": 2,
              "target_start": hex(target_start),
              "target_size": hex(target_end - target_start),
              "target_conflicts": conflicts,
              "existing_regions": regions,
          }
          Path("artifacts/a52xq-gki-5.10-dtb-ramoops/reserved-memory-audit.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n"
          )
          PY

      - name: Inject exact OrangeFox ramoops node
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-dtb-ramoops"
          dtc -I dtb -O dtb -p 8192 -o "$OUT/patched.dtb" "$OUT/original.dtb" \
            2> "$OUT/dtc-roundtrip-warnings.txt"
          fdtput -c "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000
          fdtput -t s "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 compatible ramoops
          fdtput -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 reg \
            0x0 0xb1b00000 0x0 0x00100000
          fdtput -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 record-size 0x00040000
          fdtput -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 console-size 0x00040000
          fdtput -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 ftrace-size 0x00040000
          fdtput -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 pmsg-size 0x00040000
          dtc -I dtb -O dts -o "$OUT/patched.dts" "$OUT/patched.dtb" \
            2> "$OUT/dtc-patched-warnings.txt"

          test "$(fdtget -t s "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 compatible)" = ramoops
          test "$(fdtget -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 reg)" = \
            '0 b1b00000 0 100000'
          test "$(fdtget -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 record-size)" = 40000
          test "$(fdtget -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 console-size)" = 40000
          test "$(fdtget -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 ftrace-size)" = 40000
          test "$(fdtget -t x "$OUT/patched.dtb" /reserved-memory/ramoops@b1b00000 pmsg-size)" = 40000

      - name: Repack tested watchdog Image with patched DTB
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-dtb-ramoops"
          python3 scripts/76_repack_a52_boot_with_dtb.py \
            --source workflow75/extracted/boot.img \
            --kernel workflow75/extracted/Image.gz \
            --dtb "$OUT/patched.dtb" \
            --output "$OUT/boot.img" \
            --report "$OUT/repack-report.json"

          python3 - <<'PY'
          import importlib.util
          import json
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "a52_boot_repack", "scripts/38_repack_a52_p1_boot.py"
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          src = module.parse_boot(Path("workflow75/extracted/boot.img").read_bytes())
          new = module.parse_boot(Path("artifacts/a52xq-gki-5.10-dtb-ramoops/boot.img").read_bytes())
          checks = {
              "watchdog_image_unchanged": new["kernel"] == src["kernel"],
              "rom_ramdisk_unchanged": new["ramdisk"] == src["ramdisk"],
              "cmdline_unchanged": new["cmdline"] == src["cmdline"],
              "verbose_logging_present": "initcall_debug" in new["cmdline"],
              "pstore_uncompressed_requested": "pstore.compress=none" in new["cmdline"],
              "ramoops_compatible_present": b"ramoops\0" in new["dtb"],
              "ramoops_base_present": b"\x00\x00\x00\x00\xb1\xb0\x00\x00" in new["dtb"],
              "partition_size_preserved": len(Path("artifacts/a52xq-gki-5.10-dtb-ramoops/boot.img").read_bytes()) == len(Path("workflow75/extracted/boot.img").read_bytes()),
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit("final diagnostic audit failed: " + ", ".join(failed))
          Path("artifacts/a52xq-gki-5.10-dtb-ramoops/diagnostic-audit.json").write_text(
              json.dumps({"hardware_validated": False, "checks": checks}, indent=2, sort_keys=True) + "\n"
          )
          PY

      - name: Finalize audited diagnostic candidate
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-dtb-ramoops"
          cp workflow75/extracted/Image.gz "$OUT/Image.gz"
          cp workflow75/extracted/diagnostic.config "$OUT/diagnostic.config"
          cp workflow75/extracted/watchdog-bridge/qcom-wdt-a52.c "$OUT/qcom-wdt-a52.c"
          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 DT-BACKED RAMOOPS DIAGNOSTIC

          The previous watchdog-bridge candidate remained alive for about 75 seconds,
          proving that the former approximately 15-second hard watchdog reset was removed.
          Its preserved ROM DTB had no ramoops node, so no 5.10 console record was saved.

          This image keeps the exact tested watchdog kernel and ROM ramdisk, but replaces
          only the boot DTB with a semantically equivalent DTB plus:

            reserved-memory/ramoops@b1b00000
            base 0xB1B00000, size 1 MiB
            record/console/ftrace/pmsg zones: 256 KiB each

          It is still hardware-unvalidated. Test once, then boot OrangeFox and run the
          existing pstore collector immediately.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/candidate-status.tsv"
          printf 'previous-15-second-reset-removed\tyes-observed-75-seconds\n' >> "$OUT/candidate-status.tsv"
          printf 'tested-watchdog-image-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-ramdisk-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'ramoops-dtb-node-added\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'ramoops-base-0xB1B00000\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'ramoops-size-1MiB\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/candidate-status.tsv"
          printf 'flash-performed\tno\n' >> "$OUT/candidate-status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )
          test "$(stat -c %s "$OUT/boot.img")" = 100663296
          grep -Fxq $'ramoops-dtb-node-added\tyes' "$OUT/candidate-status.tsv"

      - name: Upload DT-backed ramoops candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-dtb-ramoops-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-gki-5.10-dtb-ramoops
          if-no-files-found: error
          retention-days: 14
