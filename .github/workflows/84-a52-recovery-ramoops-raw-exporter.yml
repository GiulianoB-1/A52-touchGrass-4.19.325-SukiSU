name: 84 - A52 recovery ramoops raw exporter

run-name: Build A52 4.19.206 recovery-only ramoops snapshot exporter

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/84-a52-recovery-ramoops-raw-exporter.yml'

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-recovery-ramoops-raw-exporter
  cancel-in-progress: true

env:
  JOBS: '4'
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build:
    name: Build 4.19.206 recovery raw ramoops exporter
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out kernel project branch
        uses: actions/checkout@v4
        with:
          ref: rebase/resukisu-linux-4.19.325

      - name: Publish directly traceable run status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY="Workflow 84 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Status: in_progress
          Conclusion: pending
          Head SHA: ${GITHUB_SHA}

          Purpose: build a recovery-only 4.19.206 kernel that snapshots 0xB1B00000-0xB1BFFFFF before ramoops init and exposes only the frozen copy through /dev/a52_ramoops_raw."
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/5010467537" \
            -f body="$BODY"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils gzip zip unzip make gcc g++ bc bison flex ccache patch \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils file tar

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: a52xq-recovery-ramoops-exporter-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a52xq-linux-4.19.206-no-root-${{ runner.os }}-
            a52xq-linux-4.19.200-ccache-${{ runner.os }}-

      - name: Prepare exact touchGrass source through Linux 4.19.200
        run: |
          set -Eeuo pipefail
          chmod +x scripts/*.sh scripts/*.py
          ./scripts/01_prepare_source.sh
          ./scripts/03_apply_linux_4.19.153.sh
          ./scripts/04_apply_linux_4.19.154.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.154 4.19.159
          ./scripts/checkpoint_resolve_linux_4.19.159.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.159 4.19.164
          ./scripts/checkpoint_resolve_linux_4.19.164.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.164 4.19.180
          ./scripts/checkpoint_resolve_linux_4.19.180.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.180 4.19.200
          ./scripts/checkpoint_resolve_linux_4.19.200.sh
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200

      - name: Derive and apply official Linux 4.19.206 merge
        run: |
          set -Eeuo pipefail
          cp scripts/checkpoint_merge_linux_4.19.210.sh scripts/checkpoint_merge_linux_4.19.206.generated.sh
          sed -i \
            -e 's/TO_TAG=v4.19.210/TO_TAG=v4.19.206/' \
            -e '/^TARGET_COMMIT=/d' \
            -e '/test "$to_sha" = "$TARGET_COMMIT"/d' \
            scripts/checkpoint_merge_linux_4.19.206.generated.sh
          chmod +x scripts/checkpoint_merge_linux_4.19.206.generated.sh
          ./scripts/checkpoint_merge_linux_4.19.206.generated.sh
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.206

      - name: Apply conditional merge-shape repairs for 4.19.206
        run: |
          set -Eeuo pipefail
          cp scripts/checkpoint_fix_linux_4.19.210_compile.sh scripts/checkpoint_fix_linux_4.19.206.generated.sh
          sed -i 's/TARGET_VERSION=4.19.210/TARGET_VERSION=4.19.206/' \
            scripts/checkpoint_fix_linux_4.19.206.generated.sh
          chmod +x scripts/checkpoint_fix_linux_4.19.206.generated.sh
          ./scripts/checkpoint_fix_linux_4.19.206.generated.sh

          python3 - <<'PY'
          from pathlib import Path

          root = Path('workspace/touchgrass-a52xq')

          header = (root / 'include/linux/timerqueue.h').read_text()
          path = root / 'drivers/soc/qcom/event_timer.c'
          text = path.read_text()
          newer = '''static DEFINE_PER_CPU(struct timerqueue_head, timer_head) = {
          \t.rb_root = RB_ROOT_CACHED,
          };
          '''
          older = '''static DEFINE_PER_CPU(struct timerqueue_head, timer_head) = {
          \t.head = RB_ROOT,
          \t.next = NULL,
          };
          '''
          wants_newer = 'struct rb_root_cached rb_root;' in header
          desired = newer if wants_newer else older
          obsolete = older if wants_newer else newer
          if desired not in text:
              if obsolete not in text:
                  raise SystemExit('event_timer initializer shape is unrecognized')
              path.write_text(text.replace(obsolete, desired, 1))

          path = root / 'kernel/sched/cpufreq_schedutil.c'
          text = path.read_text()
          call = 'sugov_clear_global_tunables();'
          definition = 'static void sugov_clear_global_tunables(void)'
          anchor = 'static void sugov_exit('
          if call in text and definition not in text:
              if anchor not in text:
                  raise SystemExit('schedutil exit anchor missing')
              helper = '''static void sugov_clear_global_tunables(void)
          {
          \tif (!have_governor_per_policy())
          \t\tglobal_tunables = NULL;
          }

          '''
              path.write_text(text.replace(anchor, helper + anchor, 1))
          elif call not in text:
              raise SystemExit('schedutil cleanup call missing after generic repair')
          PY

      - name: Add pure-initcall ramoops snapshot exporter
        run: |
          set -Eeuo pipefail
          KERNEL=workspace/touchgrass-a52xq
          OUT=artifacts/a52-recovery-ramoops-exporter
          mkdir -p "$OUT"

          cat > "$KERNEL/drivers/misc/a52_ramoops_raw.c" <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          /*
           * Recovery-only A52 ramoops snapshot exporter.
           *
           * Capture the exact 1 MiB persistent RAM range before the normal
           * ramoops postcore initcall can validate, zap, or rewrite zones.
           * Userspace can read only the frozen snapshot from the misc device.
           */
          #include <linux/capability.h>
          #include <linux/fs.h>
          #include <linux/init.h>
          #include <linux/io.h>
          #include <linux/miscdevice.h>
          #include <linux/module.h>
          #include <linux/sizes.h>
          #include <linux/uaccess.h>
          #include <linux/vmalloc.h>

          #define A52_RAMOOPS_PHYS 0xB1B00000ULL
          #define A52_RAMOOPS_SIZE SZ_1M

          static u8 *a52_ramoops_snapshot;
          static int a52_snapshot_error = -ENODATA;

          static int __init a52_ramoops_snapshot_init(void)
          {
          	void __iomem *mapping;

          	a52_ramoops_snapshot = vmalloc(A52_RAMOOPS_SIZE);
          	if (!a52_ramoops_snapshot) {
          		a52_snapshot_error = -ENOMEM;
          		pr_err("a52_ramoops_raw: snapshot allocation failed\n");
          		return 0;
          	}

          	mapping = ioremap_wc(A52_RAMOOPS_PHYS, A52_RAMOOPS_SIZE);
          	if (!mapping)
          		mapping = ioremap(A52_RAMOOPS_PHYS, A52_RAMOOPS_SIZE);
          	if (!mapping) {
          		vfree(a52_ramoops_snapshot);
          		a52_ramoops_snapshot = NULL;
          		a52_snapshot_error = -EIO;
          		pr_err("a52_ramoops_raw: physical mapping failed\n");
          		return 0;
          	}

          	memcpy_fromio(a52_ramoops_snapshot, mapping, A52_RAMOOPS_SIZE);
          	iounmap(mapping);
          	a52_snapshot_error = 0;
          	pr_info("a52_ramoops_raw: captured 0x%llx-0x%llx before ramoops init\n",
          		(unsigned long long)A52_RAMOOPS_PHYS,
          		(unsigned long long)(A52_RAMOOPS_PHYS + A52_RAMOOPS_SIZE - 1));
          	return 0;
          }
          pure_initcall(a52_ramoops_snapshot_init);

          static int a52_ramoops_open(struct inode *inode, struct file *file)
          {
          	if (!capable(CAP_SYS_RAWIO) && !capable(CAP_SYS_ADMIN))
          		return -EPERM;
          	return a52_snapshot_error;
          }

          static ssize_t a52_ramoops_read(struct file *file, char __user *buf,
          				 size_t count, loff_t *ppos)
          {
          	size_t remaining;

          	if (!a52_ramoops_snapshot)
          		return a52_snapshot_error ? a52_snapshot_error : -ENODATA;
          	if (*ppos < 0)
          		return -EINVAL;
          	if (*ppos >= A52_RAMOOPS_SIZE)
          		return 0;

          	remaining = A52_RAMOOPS_SIZE - (size_t)*ppos;
          	if (count > remaining)
          		count = remaining;
          	if (copy_to_user(buf, a52_ramoops_snapshot + *ppos, count))
          		return -EFAULT;
          	*ppos += count;
          	return count;
          }

          static const struct file_operations a52_ramoops_fops = {
          	.owner = THIS_MODULE,
          	.open = a52_ramoops_open,
          	.read = a52_ramoops_read,
          	.llseek = default_llseek,
          };

          static struct miscdevice a52_ramoops_miscdev = {
          	.minor = MISC_DYNAMIC_MINOR,
          	.name = "a52_ramoops_raw",
          	.fops = &a52_ramoops_fops,
          	.mode = 0400,
          };

          static int __init a52_ramoops_device_init(void)
          {
          	int ret = misc_register(&a52_ramoops_miscdev);

          	if (ret)
          		pr_err("a52_ramoops_raw: misc device registration failed: %d\n", ret);
          	else
          		pr_info("a52_ramoops_raw: /dev/a52_ramoops_raw ready, size=%u\n",
          			(unsigned int)A52_RAMOOPS_SIZE);
          	return ret;
          }
          device_initcall(a52_ramoops_device_init);

          MODULE_DESCRIPTION("A52 recovery-only frozen ramoops raw exporter");
          MODULE_LICENSE("GPL v2");
          EOF
          sed -i 's/^          //' "$KERNEL/drivers/misc/a52_ramoops_raw.c"

          printf '\n# A52 recovery-only frozen ramoops exporter\nobj-y += a52_ramoops_raw.o\n' \
            >> "$KERNEL/drivers/misc/Makefile"

          grep -Fq 'pure_initcall(a52_ramoops_snapshot_init);' "$KERNEL/drivers/misc/a52_ramoops_raw.c"
          grep -Fq 'device_initcall(a52_ramoops_device_init);' "$KERNEL/drivers/misc/a52_ramoops_raw.c"
          grep -Fq 'A52_RAMOOPS_PHYS 0xB1B00000ULL' "$KERNEL/drivers/misc/a52_ramoops_raw.c"
          grep -Fq 'obj-y += a52_ramoops_raw.o' "$KERNEL/drivers/misc/Makefile"
          cp "$KERNEL/drivers/misc/a52_ramoops_raw.c" "$OUT/a52_ramoops_raw.c"
          git -C "$KERNEL" diff --check
          git -C "$KERNEL" diff --binary --no-ext-diff > "$OUT/recovery-raw-exporter.patch"

      - name: Build recovery exporter kernel
        run: |
          set -Eeuo pipefail
          source scripts/common.sh
          LABEL=a52xq-recovery-ramoops-exporter-4.19.206
          OUT=artifacts/a52-recovery-ramoops-exporter

          # Preserve the source device defconfig. Only ensure the misc framework
          # remains available; the exporter itself is deliberately built-in.
          "$KERNEL_DIR/scripts/config" --file "$KERNEL_DIR/arch/arm64/configs/a52xq_defconfig" \
            -e MISC_DEVICES -e IKCONFIG -e IKCONFIG_PROC \
            -e PSTORE -e PSTORE_RAM -e PSTORE_CONSOLE -e PSTORE_PMSG

          build_kernel "$LABEL"
          cp "$ARTIFACTS_DIR/config-$LABEL" "$OUT/final.config"
          cp "$ARTIFACTS_DIR/Image-$LABEL" "$OUT/Image"
          gzip -n -9 -c "$OUT/Image" > "$OUT/Image.gz"
          gzip -t "$OUT/Image.gz"

          grep -aFq 'a52_ramoops_raw: captured 0x%llx-0x%llx before ramoops init' "$OUT/Image"
          grep -aFq '/dev/a52_ramoops_raw ready, size=%u' "$OUT/Image"
          grep -Fxq 'CONFIG_MISC_DEVICES=y' "$OUT/final.config"
          grep -Fxq 'CONFIG_PSTORE_RAM=y' "$OUT/final.config"
          grep -Fxq '# CONFIG_DEVMEM is not set' "$OUT/final.config"
          grep -Fxq '# CONFIG_PROC_KCORE is not set' "$OUT/final.config"

          cp "$KERNEL_DIR/out/System.map" "$OUT/System.map"
          cp "$KERNEL_DIR/out/vmlinux" "$OUT/vmlinux"
          cp "$KERNEL_DIR/out/Module.symvers" "$OUT/Module.symvers" 2>/dev/null || true

      - name: Finalize audited recovery-kernel artifact
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52-recovery-ramoops-exporter
          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G RECOVERY-ONLY RAMOOPS RAW SNAPSHOT EXPORTER

          This is a kernel component, not a complete recovery image.

          Behavior:
            - pure_initcall snapshots physical 0xB1B00000-0xB1BFFFFF
            - snapshot occurs before normal ramoops postcore initialization
            - device_initcall exposes the frozen bytes at /dev/a52_ramoops_raw
            - access requires CAP_SYS_RAWIO or CAP_SYS_ADMIN
            - /dev/mem, /proc/kcore and debugfs remain disabled
            - no write operation is implemented

          The Image.gz must be repacked into the exact live OrangeFox recovery
          image while preserving its ramdisk, recovery_dtbo and DTB.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/status.tsv"
          printf 'kernel-version\t4.19.206\n' >> "$OUT/status.tsv"
          printf 'snapshot-before-ramoops\tyes\n' >> "$OUT/status.tsv"
          printf 'frozen-one-mib-only\tyes\n' >> "$OUT/status.tsv"
          printf 'read-only-device\tyes\n' >> "$OUT/status.tsv"
          printf 'devmem-remains-disabled\tyes\n' >> "$OUT/status.tsv"
          printf 'proc-kcore-remains-disabled\tyes\n' >> "$OUT/status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Upload recovery exporter kernel
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-recovery-ramoops-raw-exporter-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52-recovery-ramoops-exporter
          if-no-files-found: error
          retention-days: 14

      - name: Publish final run status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_STATUS: ${{ job.status }}
        run: |
          BODY="Workflow 84 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Status: completed
          Conclusion: ${FINAL_STATUS}
          Head SHA: ${GITHUB_SHA}

          Purpose: build a recovery-only 4.19.206 kernel that snapshots 0xB1B00000-0xB1BFFFFF before ramoops init and exposes only the frozen copy through /dev/a52_ramoops_raw."
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/5010467537" \
            -f body="$BODY"
