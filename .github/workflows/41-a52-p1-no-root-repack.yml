name: 41 - A52 P1 no-root diagnostic boot repack

run-name: Build audited A52 P1 full-hardware boot image without KernelSU

"on":
  workflow_dispatch:

permissions:
  contents: read

env:
  JOBS: '4'
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build-repack:
    name: Build full hardware kernel and repack original boot image
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out diagnostic kernel branch
        uses: actions/checkout@v4
        with:
          ref: diag/a52-p1-full-hardware
          path: kernel

      - name: Check out boot-image tooling from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: tools

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils gzip zip unzip make gcc g++ bc bison flex ccache patch \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils file gh

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: a52xq-p1-no-root-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a52xq-p1-full-hardware-${{ runner.os }}-
            a52xq-linux-4.19.325-ccache-${{ runner.os }}-

      - name: Prepare verified touchGrass 4.19.325 source
        working-directory: kernel
        run: |
          set -Eeuo pipefail
          chmod +x scripts/*.sh scripts/*.py
          ./scripts/01_prepare_source.sh
          ./scripts/03_apply_linux_4.19.153.sh
          ./scripts/04_apply_linux_4.19.154.sh
          ./scripts/05_merge_linux_4.19.325.sh
          for repair in scripts/06*_linux_4.19.325*.sh; do
            printf 'Running %s\n' "$repair"
            "$repair"
          done

      - name: Apply verified optional callback repairs
        working-directory: kernel
        run: ./scripts/36_patch_a52_p0_optional_callbacks.py

      - name: Build and audit full-hardware no-root kernel
        working-directory: kernel
        run: ./scripts/40_build_a52_p1_full_hardware_diag.sh

      - name: Enforce no KernelSU or ReSukiSU
        run: |
          set -Eeuo pipefail
          CONFIG=kernel/artifacts/p1-full-hardware-diag/final.config
          test -s "$CONFIG"
          if grep -Eq '^CONFIG_(KSU|KSU_SUSFS|SUSFS)=' "$CONFIG"; then
            echo '::error::KernelSU/ReSukiSU symbols unexpectedly enabled'
            grep -E '^CONFIG_(KSU|KSU_SUSFS|SUSFS)=' "$CONFIG" || true
            exit 1
          fi
          {
            echo 'root_framework=none'
            echo 'CONFIG_KSU=absent-or-disabled'
            echo 'CONFIG_KSU_SUSFS=absent-or-disabled'
          } > kernel/artifacts/p1-full-hardware-diag/no-root-audit.txt

      - name: Download checksum-locked original boot image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p intake output
          ASSET_LINE="$({
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=30" \
              --jq '.[] | .assets[] | select(.name | endswith(".img")) | [.id, .name, .created_at] | @tsv'
          } | head -n 1)"
          test -n "$ASSET_LINE" || { echo '::error::No .img release asset found'; exit 1; }
          IFS=$'\t' read -r ASSET_ID ASSET_NAME ASSET_CREATED <<< "$ASSET_LINE"
          echo "Using source asset: $ASSET_NAME ($ASSET_CREATED)"
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" \
            --output intake/boot.img
          test -s intake/boot.img

      - name: Validate source boot image
        run: |
          set -Eeuo pipefail
          python3 tools/scripts/37_validate_a52_p1_boot_source.py \
            intake/boot.img \
            --lock tools/projects/a52-p1-boot-image/boot-source.lock \
            --output output/source-validation.json

      - name: Repack and audit complete boot image
        run: |
          set -Eeuo pipefail
          KERNEL=kernel/artifacts/p1-full-hardware-diag/Image.gz
          test -s "$KERNEL"
          grep '  ./Image.gz$' kernel/artifacts/p1-full-hardware-diag/SHA256SUMS \
            | sed 's#  ./#  kernel/artifacts/p1-full-hardware-diag/#' \
            | sha256sum --check --strict

          python3 tools/scripts/38_repack_a52_p1_boot.py \
            --source intake/boot.img \
            --kernel "$KERNEL" \
            --output output/boot.img \
            --report output/repack-report.json

          cp kernel/artifacts/p1-full-hardware-diag/final.config output/final.config
          cp kernel/artifacts/p1-full-hardware-diag/System.map output/System.map
          cp kernel/artifacts/p1-full-hardware-diag/no-root-audit.txt output/no-root-audit.txt
          cp kernel/artifacts/p1-full-hardware-diag/touchscreen-audit.txt output/touchscreen-audit.txt

          sha256sum output/boot.img output/repack-report.json output/final.config \
            output/System.map output/no-root-audit.txt output/touchscreen-audit.txt \
            > output/SHA256SUMS

          cat > output/NOTICE.txt <<'EOF'
          A52 P1 FULL-HARDWARE DIAGNOSTIC BOOT IMAGE, NO ROOT FRAMEWORK

          This boot.img preserves the checksum-locked original ramdisk, DTB,
          command line and Android boot header while replacing only the kernel.

          KernelSU, ReSukiSU and SUSFS are not integrated.
          The active STMicroelectronics FTS touchscreen driver is disabled.
          This image passed automated structural audits but is not hardware validated.
          EOF

      - name: Upload audited no-root boot image
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-p1-no-root-full-hardware-boot-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: output
          if-no-files-found: error
          retention-days: 14
