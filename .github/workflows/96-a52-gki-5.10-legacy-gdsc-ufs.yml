name: 96 - A52 GKI 5.10 legacy GDSC UFS provider

run-name: Build A52 GKI 5.10 legacy GDSC UFS regulator candidate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/96-a52-gki-5.10-legacy-gdsc-ufs.yml'
      - 'scripts/96_stage_a52xq_legacy_gdsc_regulator.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/96-a52-gki-5.10-legacy-gdsc-ufs.yml'
      - 'scripts/96_stage_a52xq_legacy_gdsc_regulator.py'

permissions:
  contents: read
  actions: read

concurrency:
  group: a52-gki-5.10-legacy-gdsc-ufs
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  WORKFLOW95_ARTIFACT_ID: '8567975569'

jobs:
  build:
    name: Build legacy GDSC UFS regulator boot image
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out diagnostic project
        uses: actions/checkout@v4

      - name: Prepare runner
        run: |
          set -Eeuo pipefail
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio gzip file dwarves device-tree-compiler

      - name: Restore pinned GKI source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Download and verify Workflow 95 candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workflow95/extracted
          curl --fail --location --retry 5 --retry-all-errors \
            --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW95_ARTIFACT_ID}/zip" \
            --output workflow95/artifact.zip
          unzip -q workflow95/artifact.zip -d workflow95/extracted
          (cd workflow95/extracted && sha256sum -c SHA256SUMS)
          test -s workflow95/extracted/full-integrated-ufs-bridge-flight-recorder.patch
          test -s workflow95/extracted/diagnostic.config
          test -s workflow95/extracted/boot.img

      - name: Replay audited Workflow 95 source patch
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

          PATCH="$PWD/workflow95/extracted/full-integrated-ufs-bridge-flight-recorder.patch"
          git -C gki/common apply --check "$PATCH"
          git -C gki/common apply "$PATCH"

      - name: Stage legacy GDSC regulator bridge
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-legacy-gdsc-ufs
          mkdir -p "$OUT/logs" "$OUT/gdsc-regulator-bridge"

          python3 scripts/96_stage_a52xq_legacy_gdsc_regulator.py \
            --gki gki/common --output "$OUT/gdsc-regulator-bridge"

          git -C gki/common diff --check
          grep -Fq 'compatible = "qcom,gdsc"' \
            gki/common/drivers/regulator/a52-legacy-gdsc-regulator.c
          grep -Fq 'strcmp(name, "gcc_ufs_phy_gdsc")' \
            gki/common/drivers/regulator/a52-legacy-gdsc-regulator.c
          grep -Fq 'A52GDSC PROBE' \
            gki/common/drivers/regulator/a52-legacy-gdsc-regulator.c
          grep -Fq 'A52GDSC ENABLE' \
            gki/common/drivers/regulator/a52-legacy-gdsc-regulator.c
          grep -Fq 'a52-legacy-gdsc-regulator.o' \
            gki/common/drivers/regulator/Makefile

          git -C gki/common diff --binary --no-ext-diff \
            > "$OUT/full-integrated-legacy-gdsc-ufs.patch"
          test -s "$OUT/full-integrated-legacy-gdsc-ufs.patch"

      - name: Configure diagnostic kernel
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-legacy-gdsc-ufs"
          BUILD="$PWD/workspace/gki-legacy-gdsc-ufs-out"
          mkdir -p "$BUILD"
          cp workflow95/extracted/diagnostic.config "$BUILD/.config"

          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            2>&1 | tee "$OUT/logs/olddefconfig.log"
          cp "$BUILD/.config" "$OUT/diagnostic.config"

          grep -Fxq 'CONFIG_REGULATOR=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_SCSI_UFS_QCOM=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_SCSI_UFSHCD_PLATFORM=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_BLK_DEV_SD=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_PHY_QCOM_QMP=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_PSTORE_RAM=y' "$BUILD/.config"

      - name: Build legacy GDSC UFS Image
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-legacy-gdsc-ufs"
          BUILD="$PWD/workspace/gki-legacy-gdsc-ufs-out"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          "$CLANG" --version | tee "$OUT/logs/toolchain.log"
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            KCFLAGS=-Wno-error=frame-larger-than Image \
            2>&1 | tee "$OUT/logs/Image.log"

          test -s "$BUILD/arch/arm64/boot/Image"
          cp "$BUILD/arch/arm64/boot/Image" "$OUT/Image"
          grep -aFq 'A52GDSC PROBE' "$OUT/Image"
          grep -aFq 'A52GDSC ENABLE' "$OUT/Image"
          grep -aFq 'A52GDSC DISABLE_KEEP_ON' "$OUT/Image"
          grep -aFq 'A52UFS copy=1 PROBE_BEGIN' "$OUT/Image"
          grep -aFq 'A52UFS copy=1 CORE stage=link_startup' "$OUT/Image"
          grep -aFq 'A52UFS copy=1 SD stage=device_add_disk' "$OUT/Image"
          grep -aFq 'A52PHY copy=1 MATCH' "$OUT/Image"
          gzip -n -9 -c "$OUT/Image" > "$OUT/Image.gz"
          gzip -t "$OUT/Image.gz"

      - name: Repack and audit legacy GDSC UFS boot image
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-legacy-gdsc-ufs
          python3 scripts/38_repack_a52_p1_boot.py \
            --source workflow95/extracted/boot.img \
            --kernel "$OUT/Image.gz" \
            --output "$OUT/boot.img" \
            --report "$OUT/repack-report.json"

          python3 - <<'PY'
          import hashlib
          import importlib.util
          import json
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "a52_boot_repack", "scripts/38_repack_a52_p1_boot.py"
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          source_path = Path("workflow95/extracted/boot.img")
          output = Path("artifacts/a52xq-gki-5.10-legacy-gdsc-ufs")
          output_path = output / "boot.img"
          image_path = output / "Image.gz"
          src = module.parse_boot(source_path.read_bytes())
          new = module.parse_boot(output_path.read_bytes())

          checks = {
              "partition_size_preserved": (
                  output_path.stat().st_size
                  == source_path.stat().st_size
                  == 100663296
              ),
              "replacement_kernel_used": (
                  hashlib.sha256(new["kernel"]).digest()
                  == hashlib.sha256(image_path.read_bytes()).digest()
              ),
              "rom_ramdisk_preserved": new["ramdisk"] == src["ramdisk"],
              "second_preserved": new["second"] == src["second"],
              "reserved_dtb_preserved": new["dtb"] == src["dtb"],
              "diagnostic_cmdline_preserved": new["cmdline"] == src["cmdline"],
              "reservation_node_present": (
                  b"a52-ramoops-reserved@b1b00000" in new["dtb"]
              ),
              "ufs_host_node_present": b"ufshc@1d84000" in new["dtb"],
              "ufs_phy_node_present": b"ufsphy_mem@1d87000" in new["dtb"],
              "legacy_gdsc_node_present": (
                  b"gcc_ufs_phy_gdsc" in new["dtb"]
              ),
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit("final audit failed: " + ", ".join(failed))

          (output / "final-audit.json").write_text(
              json.dumps(
                  {
                      "status": "legacy-gdsc-ufs-repacked-audited",
                      "hardware_validated": False,
                      "root_cause": (
                          "stock runtime data shows UFS vdd-hba is supplied by "
                          "the standalone qcom,gdsc regulator gcc_ufs_phy_gdsc"
                      ),
                      "compatibility_bridge": (
                          "qcom,gdsc regulator provider scoped to "
                          "gcc_ufs_phy_gdsc"
                      ),
                      "checks": checks,
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Finalize audited candidate
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-legacy-gdsc-ufs

          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 LEGACY GDSC UFS REGULATOR BRIDGE

          The stock 4.19 runtime exposes gcc_ufs_phy_gdsc as a regulator and the
          UFS host consumes it as vdd-hba. The prior 5.10 candidate had no driver
          bound to the standalone qcom,gdsc node, so devm_regulator_get("vdd-hba")
          deferred forever and Android reached PID 1 with no block devices.

          This candidate adds a deliberately narrow qcom,gdsc regulator provider
          for gcc_ufs_phy_gdsc. It enables the HLOS software vote, records probe
          and enable state in persistent diagnostics, and keeps the boot-critical
          domain on rather than introducing runtime-collapse behavior in the first
          hardware test.

          This image is not hardware-validated.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/candidate-status.tsv"
          printf 'legacy-qcom-gdsc-provider\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'provider-scope-gcc-ufs-phy-gdsc-only\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'persistent-gdsc-probe-enable-trace\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'boot-critical-disable-guard\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'workflow95-ufs-flight-recorder-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-ramdisk-and-dtb-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/candidate-status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | \
              xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )
          test "$(stat -c %s "$OUT/boot.img")" = 100663296

      - name: Upload legacy GDSC UFS candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-legacy-gdsc-ufs-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-gki-5.10-legacy-gdsc-ufs
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostic logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-legacy-gdsc-ufs-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-legacy-gdsc-ufs
            workspace/gki-legacy-gdsc-ufs-out/.config
          if-no-files-found: warn
          retention-days: 14

  report:
    name: Report Workflow 96 status
    if: always()
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      issues: write
      actions: read
    steps:
      - name: Post run status to issue 45
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ needs.build.result }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          python3 - <<'PY' > payload.json
          import json
          import os

          body = (
              f"Workflow 96 run: {os.environ['RUN_URL']}\n\n"
              f"Status: completed\n"
              f"Conclusion: {os.environ['RESULT']}\n"
              f"Head SHA: {os.environ['HEAD_SHA']}\n\n"
              "Purpose: register Samsung's standalone gcc_ufs_phy_gdsc node "
              "as the UFS vdd-hba regulator provider and rebuild the full "
              "Workflow 95 storage flight-recorder candidate."
          )
          print(json.dumps({"body": body}))
          PY
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'Content-Type: application/json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/45/comments" \
            --data-binary @payload.json
