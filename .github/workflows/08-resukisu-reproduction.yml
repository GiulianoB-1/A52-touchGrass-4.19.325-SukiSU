name: 08 - Reproduce touchGrass ReSukiSU v4.1.0 (NON-FLASHABLE)

on:
  pull_request:
    paths:
      - '.github/workflows/08-resukisu-reproduction.yml'
      - 'reference/tgk-v1.5.1-a52xq-resukisu.txt'
      - 'scripts/common.sh'
      - 'scripts/01_prepare_source.sh'
      - 'scripts/07_reproduce_resukisu_4.1.0.sh'
      - 'sources.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a52-resukisu-reproduction-${{ github.ref }}
  cancel-in-progress: true

env:
  JOBS: '4'

jobs:
  reproduce-release-source-build:
    name: Reproduce touchGrass 4.19.152 + ReSukiSU v4.1.0
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils zip unzip make gcc g++ bc bison flex \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils

      - name: Prepare exact touchGrass v1.5.1 source baseline
        run: |
          chmod +x scripts/*.sh
          ./scripts/01_prepare_source.sh

      - name: Integrate exact ReSukiSU and reproduce released source build
        run: ./scripts/07_reproduce_resukisu_4.1.0.sh

      - name: Record runner and source state
        if: always()
        run: |
          mkdir -p artifacts
          df -h > artifacts/runner-disk.txt
          free -h > artifacts/runner-memory.txt
          uname -a > artifacts/runner-uname.txt
          git --version > artifacts/tool-versions.txt
          make --version | head -n 1 >> artifacts/tool-versions.txt
          if [ -d workspace/touchgrass-a52xq/.git ]; then
            git -C workspace/touchgrass-a52xq status --short > artifacts/kernel-source-status.txt || true
            git -C workspace/touchgrass-a52xq diff --stat > artifacts/kernel-source-diff.stat.txt || true
          fi
          if [ -d workspace/touchgrass-a52xq/KernelSU/.git ]; then
            git -C workspace/touchgrass-a52xq/KernelSU status --short > artifacts/resukisu-source-status.txt || true
            git -C workspace/touchgrass-a52xq/KernelSU rev-parse HEAD > artifacts/resukisu-head.txt || true
          fi

      - name: Upload reproduction build and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-touchgrass-resukisu-v4.1.0-reproduction-${{ github.run_number }}-NON-FLASHABLE
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
