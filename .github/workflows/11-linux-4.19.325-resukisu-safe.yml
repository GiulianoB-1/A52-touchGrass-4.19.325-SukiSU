name: 11 - Linux 4.19.325 + safe ReSukiSU checkpoint (NON-FLASHABLE)

on:
  pull_request:
    paths:
      - '.github/workflows/11-linux-4.19.325-resukisu-safe.yml'
      - 'scripts/common.sh'
      - 'scripts/01_prepare_source.sh'
      - 'scripts/03_apply_linux_4.19.153.sh'
      - 'scripts/04_apply_linux_4.19.154.sh'
      - 'scripts/05_merge_linux_4.19.325.sh'
      - 'scripts/05_merge_linux_4.19.325.py'
      - 'scripts/06*.sh'
      - 'scripts/07_patch_resukisu_exec_hook.sh'
      - 'scripts/08_build_linux_4.19.153_resukisu_safe.sh'
      - 'scripts/08_build_resukisu_safe_checkpoint.sh'
      - 'sources.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a52-linux-4.19.325-resukisu-safe-${{ github.ref }}
  cancel-in-progress: true

env:
  JOBS: '4'
  MAKE_KEEP_GOING: '1'
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build-checkpoint:
    name: Direct merge and build Linux 4.19.325 + ReSukiSU
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils zip unzip make gcc g++ bc bison flex ccache \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils file

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: a52xq-linux-4.19.325-ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a52xq-linux-4.19.325-ccache-${{ runner.os }}-

      - name: Prepare exact touchGrass v1.5.1 source
        run: |
          chmod +x scripts/*.sh
          ./scripts/01_prepare_source.sh

      - name: Apply and resolve official Linux 4.19.153 update
        run: ./scripts/03_apply_linux_4.19.153.sh

      - name: Apply and resolve official Linux 4.19.154 update
        run: ./scripts/04_apply_linux_4.19.154.sh

      - name: Three-way merge directly to Linux 4.19.325
        run: |
          set -o pipefail
          ./scripts/05_merge_linux_4.19.325.sh 2>&1 | tee artifacts/direct-merge-linux-4.19.325.log

      - name: Apply ordered Linux 4.19.325 compatibility repairs
        run: |
          set -Eeuo pipefail
          for repair in scripts/06*_linux_4.19.325*.sh; do
            printf 'Running %s\n' "$repair"
            "$repair"
          done

      - name: Replace legacy exec dispatch with ReSukiSU manual hook
        run: ./scripts/07_patch_resukisu_exec_hook.sh

      - name: Integrate safe ReSukiSU and build Linux 4.19.325
        run: |
          set -o pipefail
          ./scripts/08_build_resukisu_safe_checkpoint.sh 4.19.325 2>&1 | tee artifacts/linux-4.19.325-resukisu-safe.log

      - name: Collect same-version ABI and device-tree inventory
        run: |
          set -Eeuo pipefail
          KERNEL_DIR="$GITHUB_WORKSPACE/workspace/touchgrass-a52xq"
          OUT_DIR="$KERNEL_DIR/out"
          DEST="$GITHUB_WORKSPACE/artifacts/touchgrass-4.19.325-abi"
          mkdir -p "$DEST"

          test -s "$OUT_DIR/.config"
          test -s "$OUT_DIR/arch/arm64/boot/Image"
          test -s "$OUT_DIR/Module.symvers"

          cp "$OUT_DIR/.config" "$DEST/config"
          cp "$OUT_DIR/arch/arm64/boot/Image" "$DEST/Image"
          cp "$OUT_DIR/Module.symvers" "$DEST/Module.symvers"
          test ! -s "$OUT_DIR/System.map" || cp "$OUT_DIR/System.map" "$DEST/System.map"

          find "$OUT_DIR" -type f -name '*.ko' -printf '%P\n' | sort > "$DEST/modules.list"
          find "$OUT_DIR/arch/arm64/boot" -type f \( -name '*.dtb' -o -name '*.dtbo' \) \
            -printf '%P\n' | sort > "$DEST/device-trees.list"

          make -s -C "$KERNEL_DIR" O="$OUT_DIR" ARCH=arm64 kernelrelease > "$DEST/kernel-release.txt"
          {
            echo "kernel_release=$(cat "$DEST/kernel-release.txt")"
            echo "image_bytes=$(stat -c %s "$DEST/Image")"
            echo "exported_symbol_count=$(wc -l < "$DEST/Module.symvers")"
            echo "module_count=$(wc -l < "$DEST/modules.list")"
            echo "device_tree_count=$(wc -l < "$DEST/device-trees.list")"
            echo "flashable=no"
          } > "$DEST/metadata.txt"

          cat > "$DEST/NOTICE.txt" <<'EOF'
This artifact is an ABI and source-comparison input. It is not a flashable kernel package.
EOF

          (
            cd "$DEST"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          )

      - name: Record runner and source state
        if: always()
        run: |
          mkdir -p artifacts
          df -h > artifacts/runner-disk.txt
          free -h > artifacts/runner-memory.txt
          uname -a > artifacts/runner-uname.txt
          git --version > artifacts/tool-versions.txt
          make --version | head -n 1 >> artifacts/tool-versions.txt
          ccache --version | head -n 1 >> artifacts/tool-versions.txt || true
          ccache --show-stats > artifacts/ccache-final.txt 2>&1 || true
          if [ -d workspace/touchgrass-a52xq/.git ]; then
            git -C workspace/touchgrass-a52xq status --short > artifacts/kernel-source-status.txt || true
            git -C workspace/touchgrass-a52xq diff --stat > artifacts/kernel-source-diff.stat.txt || true
          fi
          if [ -d workspace/touchgrass-a52xq/KernelSU/.git ]; then
            git -C workspace/touchgrass-a52xq/KernelSU status --short > artifacts/resukisu-source-status.txt || true
            git -C workspace/touchgrass-a52xq/KernelSU rev-parse HEAD > artifacts/resukisu-head.txt || true
          fi

      - name: Upload direct-merge build and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-linux-4.19.325-resukisu-safe-${{ github.run_number }}-NON-FLASHABLE
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
