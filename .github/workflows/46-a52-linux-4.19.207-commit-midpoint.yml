name: 46 - A52 Linux 4.19.207 commit midpoint bisect

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: a52-linux-4.19.207-commit-midpoint
  cancel-in-progress: true

env:
  JOBS: '4'
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build-repack:
    name: Build midpoint of upstream commits added by Linux 4.19.207
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out kernel project branch
        uses: actions/checkout@v4
        with:
          ref: rebase/resukisu-linux-4.19.325

      - name: Hydrate pinned bisect, diagnostic and repack helpers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p scripts projects/a52-p1-boot-image
          fetch_file() {
            local ref="$1"
            local path="$2"
            gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${ref}" \
              --jq '.content' | tr -d '\n' | base64 --decode > "$path"
            test -s "$path"
          }
          fetch_file 'diag/a52-p1-full-hardware' 'scripts/40_build_a52_p1_full_hardware_diag.sh'
          fetch_file 'main' 'scripts/37_validate_a52_p1_boot_source.py'
          fetch_file 'main' 'scripts/38_repack_a52_p1_boot.py'
          fetch_file 'main' 'scripts/46_build_a52_linux_4.19.207_midpoint.py'
          fetch_file 'main' 'projects/a52-p1-boot-image/boot-source.lock'
          chmod +x scripts/40_build_a52_p1_full_hardware_diag.sh \
            scripts/37_validate_a52_p1_boot_source.py \
            scripts/38_repack_a52_p1_boot.py \
            scripts/46_build_a52_linux_4.19.207_midpoint.py

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils gzip zip unzip make gcc g++ bc bison flex ccache patch \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils file tar

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: a52xq-linux-4.19.207-commit-midpoint-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a52xq-linux-4.19.206-no-root-${{ runner.os }}-
            a52xq-linux-4.19.207-no-root-${{ runner.os }}-
            a52xq-linux-4.19.205-no-root-${{ runner.os }}-

      - name: Prepare exact touchGrass source through Linux 4.19.200
        run: |
          set -Eeuo pipefail
          chmod +x scripts/*.sh scripts/*.py
          ./scripts/01_prepare_source.sh
          ./scripts/03_apply_linux_4.19.153.sh
          ./scripts/04_apply_linux_4.19.154.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.154 4.19.159
          ./scripts/checkpoint_resolve_linux_4.19.159.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.159 4.19.164
          ./scripts/checkpoint_resolve_linux_4.19.164.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.164 4.19.180
          ./scripts/checkpoint_resolve_linux_4.19.180.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.180 4.19.200
          ./scripts/checkpoint_resolve_linux_4.19.200.sh
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200

      - name: Prepare hardware-tested good Linux 4.19.206 tree
        run: |
          set -Eeuo pipefail
          cp scripts/checkpoint_merge_linux_4.19.210.sh scripts/checkpoint_merge_linux_4.19.206.generated.sh
          sed -i \
            -e 's/TO_TAG=v4.19.210/TO_TAG=v4.19.206/' \
            -e '/^TARGET_COMMIT=/d' \
            -e '/test "$to_sha" = "$TARGET_COMMIT"/d' \
            scripts/checkpoint_merge_linux_4.19.206.generated.sh
          chmod +x scripts/checkpoint_merge_linux_4.19.206.generated.sh
          ./scripts/checkpoint_merge_linux_4.19.206.generated.sh
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.206

          cp scripts/checkpoint_fix_linux_4.19.210_compile.sh scripts/checkpoint_fix_linux_4.19.206.generated.sh
          sed -i 's/TARGET_VERSION=4.19.210/TARGET_VERSION=4.19.206/' \
            scripts/checkpoint_fix_linux_4.19.206.generated.sh
          chmod +x scripts/checkpoint_fix_linux_4.19.206.generated.sh
          ./scripts/checkpoint_fix_linux_4.19.206.generated.sh

          python3 - <<'PY'
          from pathlib import Path
          root = Path('workspace/touchgrass-a52xq')
          header = (root / 'include/linux/timerqueue.h').read_text()
          path = root / 'drivers/soc/qcom/event_timer.c'
          text = path.read_text()
          newer = '''static DEFINE_PER_CPU(struct timerqueue_head, timer_head) = {
          \t.rb_root = RB_ROOT_CACHED,
          };
          '''
          older = '''static DEFINE_PER_CPU(struct timerqueue_head, timer_head) = {
          \t.head = RB_ROOT,
          \t.next = NULL,
          };
          '''
          wants_newer = 'struct rb_root_cached rb_root;' in header
          desired = newer if wants_newer else older
          obsolete = older if wants_newer else newer
          if desired not in text:
              if obsolete not in text:
                  raise SystemExit('event_timer initializer shape is unrecognized')
              path.write_text(text.replace(obsolete, desired, 1))

          path = root / 'kernel/sched/cpufreq_schedutil.c'
          text = path.read_text()
          call = 'sugov_clear_global_tunables();'
          definition = 'static void sugov_clear_global_tunables(void)'
          anchor = 'static void sugov_exit('
          if call in text and definition not in text:
              if anchor not in text:
                  raise SystemExit('schedutil exit anchor missing')
              helper = '''static void sugov_clear_global_tunables(void)
          {
          \tif (!have_governor_per_policy())
          \t\tglobal_tunables = NULL;
          }

          '''
              path.write_text(text.replace(anchor, helper + anchor, 1))
          elif call not in text:
              raise SystemExit('schedutil cleanup call missing after generic repair')
          PY

      - name: Select, merge and build the 4.19.207 commit midpoint
        run: |
          set -Eeuo pipefail
          python3 scripts/46_build_a52_linux_4.19.207_midpoint.py

      - name: Enforce midpoint bisect invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/p1-full-hardware-diag
          test -s "$OUT/Image.gz"
          test -s "$OUT/commit-bisect-state.txt"
          grep -Fxq '# CONFIG_TOUCHSCREEN_STM_FTS5CU56A is not set' "$OUT/final.config"
          grep -Fxq 'CONFIG_INPUT_TOUCHSCREEN=y' "$OUT/final.config"
          ! grep -Eq '^CONFIG_KSU(=|_)' "$OUT/final.config"
          grep -Fxq 'CONFIG_DRM=y' "$OUT/final.config"
          grep -Fxq 'CONFIG_QCOM_KGSL=y' "$OUT/final.config"
          grep -Fxq 'CONFIG_SCSI_UFS_QCOM=y' "$OUT/final.config"
          grep -Fxq 'CONFIG_PSTORE_RAM=y' "$OUT/final.config"
          grep -Eq '^test_commit=[0-9a-f]{40}$' "$OUT/commit-bisect-state.txt"
          grep -Eq '^test_applied_commits=[0-9]+$' "$OUT/commit-bisect-state.txt"
          cat "$OUT/commit-bisect-state.txt"

      - name: Download and validate checksum-locked original boot image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p intake artifacts/a52xq-linux-4.19.207-commit-midpoint-no-root-boot
          ASSET_LINE="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=30" \
            --jq '.[] | .assets[] | select(.name | endswith(".img")) | [.id, .name, .created_at] | @tsv' | head -n 1)"
          test -n "$ASSET_LINE"
          IFS=$'\t' read -r ASSET_ID ASSET_NAME ASSET_CREATED <<< "$ASSET_LINE"
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/octet-stream' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" \
            --output intake/boot.img
          python3 scripts/37_validate_a52_p1_boot_source.py intake/boot.img \
            --lock projects/a52-p1-boot-image/boot-source.lock \
            --output artifacts/a52xq-linux-4.19.207-commit-midpoint-no-root-boot/source-validation.json

      - name: Repack and audit commit midpoint boot image
        run: |
          set -Eeuo pipefail
          KERNEL=artifacts/p1-full-hardware-diag/Image.gz
          OUT=artifacts/a52xq-linux-4.19.207-commit-midpoint-no-root-boot
          test -s "$KERNEL"
          python3 scripts/38_repack_a52_p1_boot.py \
            --source intake/boot.img \
            --kernel "$KERNEL" \
            --output "$OUT/boot.img" \
            --report "$OUT/repack-report.json"
          cp artifacts/p1-full-hardware-diag/final.config "$OUT/final.config"
          cp artifacts/p1-full-hardware-diag/commit-bisect-state.txt "$OUT/commit-bisect-state.txt"
          cp artifacts/linux-4.19.207-commit-list.tsv "$OUT/linux-4.19.207-commit-list.tsv"
          sha256sum "$OUT"/* > "$OUT/SHA256SUMS"
          cat > "$OUT/NOTICE.txt" <<'EOF'
          A52 LINUX 4.19.207 UPSTREAM COMMIT MIDPOINT CANDIDATE

          This is not the complete Linux 4.19.207 release. It applies the first half
          of the official stable commits between the hardware-tested good v4.19.206
          tag and the hardware-tested bad v4.19.207 tag.

          Read commit-bisect-state.txt for the exact commit SHA and position.
          The STM FTS touchscreen driver remains disabled for controlled comparison.
          This image has not yet been validated on physical hardware.
          EOF

      - name: Upload hardware-test midpoint candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-linux-4.19.207-commit-midpoint-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-linux-4.19.207-commit-midpoint-no-root-boot
          if-no-files-found: error
          retention-days: 14

      - name: Upload midpoint build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-linux-4.19.207-commit-midpoint-diagnostics-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
