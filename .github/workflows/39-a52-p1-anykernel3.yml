name: 39 - A52 P1 AnyKernel3 package

run-name: Build audited A52 P1 AnyKernel3 recovery ZIP

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/39-a52-p1-anykernel3.yml'

permissions:
  contents: read
  actions: read

jobs:
  build-anykernel3:
    name: Build and audit AnyKernel3 package
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download successful P0 kernel artifact
        env:
          GH_TOKEN: ${{ github.token }}
          P0_ARTIFACT_ID: '8361922486'
        run: |
          set -Eeuo pipefail
          mkdir -p work/p0
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${P0_ARTIFACT_ID}/zip" \
            -o work/p0.zip
          unzip -q work/p0.zip -d work/p0
          KERNEL="$(find work/p0 -type f -name Image.gz -print -quit)"
          test -n "$KERNEL" || { echo '::error::Image.gz not found in P0 artifact'; exit 1; }
          cp "$KERNEL" work/Image.gz
          test -s work/Image.gz
          gzip -t work/Image.gz
          sha256sum work/Image.gz | tee work/P0-IMAGE-GZ-SHA256SUMS

      - name: Fetch official AnyKernel3 template
        run: |
          set -Eeuo pipefail
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git work/AnyKernel3
          git -C work/AnyKernel3 rev-parse HEAD | tee work/ANYKERNEL3-UPSTREAM-COMMIT
          rm -rf work/AnyKernel3/.git work/AnyKernel3/.github

      - name: Configure A52 AnyKernel3 installer
        run: |
          set -Eeuo pipefail
          AK=work/AnyKernel3
          rm -f "$AK"/Image "$AK"/Image.gz "$AK"/Image.gz-dtb "$AK"/zImage
          rm -rf "$AK"/modules "$AK"/ramdisk "$AK"/patch "$AK"/vendor_ramdisk "$AK"/vendor_patch
          cp work/Image.gz "$AK"/Image.gz

          cat > "$AK"/anykernel.sh <<'EOF'
          # AnyKernel3 Ramdisk Mod Script
          # A52 5G a52xq P1 kernel test package

          properties() { '
          kernel.string=A52 touchGrass P1 SukiSU test kernel
          do.devicecheck=1
          do.modules=0
          do.systemless=0
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=a52xq
          supported.versions=
          supported.patchlevels=
          supported.vendorpatchlevels=
          '; }

          block=auto;
          is_slot_device=0;
          ramdisk_compression=auto;
          patch_vbmeta_flag=0;

          BLOCK=auto;
          IS_SLOT_DEVICE=0;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=0;
          NO_VBMETA_PARTITION_PATCH=1;

          . tools/ak3-core.sh;

          ui_print " ";
          ui_print "A52 touchGrass P1 kernel test";
          ui_print "Target device: a52xq";
          ui_print "Preserving current ramdisk and DTB";
          ui_print "No modules or vbmeta partition changes";
          ui_print " ";

          dump_boot;
          write_boot;
          EOF

          chmod 755 "$AK"/anykernel.sh

          cat > "$AK"/A52-P1-NOTICE.txt <<'EOF'
          A52 P1 ANYKERNEL3 TEST PACKAGE

          Target: Samsung Galaxy A52 5G, device codename a52xq.
          This package replaces only the kernel using AnyKernel3.
          It preserves the currently installed boot ramdisk and existing DTB sections.
          It does not install modules and does not patch the vbmeta partition.

          NOT HARDWARE VALIDATED.
          Keep a known-good original boot image and Download Mode recovery path available.
          EOF

          cp work/ANYKERNEL3-UPSTREAM-COMMIT "$AK"/ANYKERNEL3-UPSTREAM-COMMIT
          cp work/P0-IMAGE-GZ-SHA256SUMS "$AK"/P0-IMAGE-GZ-SHA256SUMS

      - name: Build recovery flash ZIP
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts
          cd work/AnyKernel3
          zip -r9 ../../artifacts/a52xq-p1-anykernel3-NOT-HARDWARE-VALIDATED.zip . \
            -x 'README.md' '.git/*' '.github/*' '*placeholder*'
          cd ../..
          sha256sum artifacts/a52xq-p1-anykernel3-NOT-HARDWARE-VALIDATED.zip \
            > artifacts/SHA256SUMS

      - name: Audit AnyKernel3 package
        run: |
          set -Eeuo pipefail
          ZIP=artifacts/a52xq-p1-anykernel3-NOT-HARDWARE-VALIDATED.zip
          LIST=artifacts/ZIP-CONTENTS.txt
          unzip -l "$ZIP" | tee "$LIST"

          for required in \
            anykernel.sh \
            Image.gz \
            LICENSE \
            META-INF/com/google/android/update-binary \
            tools/ak3-core.sh \
            tools/magiskboot \
            A52-P1-NOTICE.txt \
            ANYKERNEL3-UPSTREAM-COMMIT \
            P0-IMAGE-GZ-SHA256SUMS; do
            unzip -Z1 "$ZIP" | grep -Fx "$required" >/dev/null || {
              echo "::error::Missing required AnyKernel3 entry: $required"
              exit 1
            }
          done

          if unzip -Z1 "$ZIP" | grep -Eq '(^|/)boot\.img$'; then
            echo '::error::AnyKernel3 ZIP must not contain a prebuilt boot.img'
            exit 1
          fi

          unzip -p "$ZIP" anykernel.sh | grep -F 'device.name1=a52xq' >/dev/null
          unzip -p "$ZIP" anykernel.sh | grep -F 'BLOCK=auto' >/dev/null
          unzip -p "$ZIP" anykernel.sh | grep -F 'IS_SLOT_DEVICE=0' >/dev/null
          unzip -p "$ZIP" anykernel.sh | grep -F 'PATCH_VBMETA_FLAG=0' >/dev/null
          unzip -p "$ZIP" anykernel.sh | grep -F 'NO_VBMETA_PARTITION_PATCH=1' >/dev/null
          unzip -p "$ZIP" anykernel.sh | grep -F 'dump_boot;' >/dev/null
          unzip -p "$ZIP" anykernel.sh | grep -F 'write_boot;' >/dev/null

          unzip -p "$ZIP" Image.gz > artifacts/Image.gz
          gzip -t artifacts/Image.gz
          test "$(sha256sum artifacts/Image.gz | awk '{print $1}')" = \
               "$(awk '{print $1}' work/P0-IMAGE-GZ-SHA256SUMS)"

          cat > artifacts/AUDIT-REPORT.txt <<EOF
          status=audited-anykernel3-package
          target_device=a52xq
          kernel_payload=Image.gz
          ramdisk_policy=preserve-current
          dtb_policy=preserve-existing-when-not-supplied
          modules=disabled
          slot_device=0
          boot_partition=auto
          patch_vbmeta_flag=0
          vbmeta_partition_patch=disabled
          hardware_validated=false
          anykernel3_commit=$(cat work/ANYKERNEL3-UPSTREAM-COMMIT)
          kernel_sha256=$(awk '{print $1}' work/P0-IMAGE-GZ-SHA256SUMS)
          zip_sha256=$(awk '{print $1}' artifacts/SHA256SUMS)
          EOF

          rm -f artifacts/Image.gz

      - name: Upload AnyKernel3 package
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-p1-anykernel3-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: |
            artifacts/a52xq-p1-anykernel3-NOT-HARDWARE-VALIDATED.zip
            artifacts/SHA256SUMS
            artifacts/AUDIT-REPORT.txt
            artifacts/ZIP-CONTENTS.txt
          if-no-files-found: error
          retention-days: 14
