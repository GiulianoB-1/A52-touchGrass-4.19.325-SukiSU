name: 69 - A52 GKI 5.10 audited boot repack

run-name: Build audited A52 GKI 5.10 boot candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/69-a52-gki-5.10-audited-boot-repack.yml'
      - 'scripts/37_validate_a52_p1_boot_source.py'
      - 'scripts/38_repack_a52_p1_boot.py'
      - 'projects/a52-p1-boot-image/boot-source.lock'

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-audited-boot-repack
  cancel-in-progress: true

env:
  WORKFLOW68_RUN_ID: '29635636415'
  WORKFLOW68_ARTIFACT_ID: '8427146475'
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  TOUCHGRASS_COMMIT: 6bf351bdf18bdb228db79e66f14a7a9c0178e5d7

jobs:
  repack:
    name: Repack checksum-locked A52 boot image with GKI 5.10
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 45 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 69 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Install audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl unzip gzip file binutils python3

      - name: Download checksum-locked A52 boot source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p intake artifacts/a52xq-gki-5.10-boot-candidate

          ASSET_LINE="$({
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=30" \
              --jq '.[] | .assets[] | select(.name | endswith(".img")) | [.id, .name, .created_at] | @tsv'
          } | head -n 1)"

          if [[ -z "$ASSET_LINE" ]]; then
            echo "::error::No .img release asset was found"
            exit 1
          fi

          IFS=$'\t' read -r ASSET_ID ASSET_NAME ASSET_CREATED <<< "$ASSET_LINE"
          printf 'source_asset_id=%s\nsource_asset_name=%s\nsource_asset_created=%s\n' \
            "$ASSET_ID" "$ASSET_NAME" "$ASSET_CREATED" \
            > artifacts/a52xq-gki-5.10-boot-candidate/source-asset.txt

          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" \
            --output intake/boot.img
          test -s intake/boot.img

      - name: Validate source boot image contract
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-boot-candidate
          python3 scripts/37_validate_a52_p1_boot_source.py \
            intake/boot.img \
            --lock projects/a52-p1-boot-image/boot-source.lock \
            --output "$OUT/source-validation.json"

          python3 - <<'PY'
          import importlib.util
          import json
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "a52_boot_repack", "scripts/38_repack_a52_p1_boot.py"
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          parsed = module.parse_boot(Path("intake/boot.img").read_bytes())
          Path("intake/source-boot.dtb").write_bytes(parsed["dtb"])
          Path("artifacts/a52xq-gki-5.10-boot-candidate/source-components.json").write_text(
              json.dumps({
                  "kernel_size": parsed["kernel_size"],
                  "ramdisk_size": parsed["ramdisk_size"],
                  "dtb_size": parsed["dtb_size"],
                  "dtb_addr": parsed["dtb_addr"],
                  "header_version": parsed["header_version"],
                  "page_size": parsed["page_size"],
                  "board": parsed["board"],
              }, indent=2, sort_keys=True) + "\n"
          )
          PY

          test -s intake/source-boot.dtb
          strings intake/source-boot.dtb | grep -Fq 'qcom,qsmmu-v500'
          strings intake/source-boot.dtb | grep -Fq 'qcom,skip-init'
          strings intake/source-boot.dtb | grep -Fq 'qcom,use-3-lvl-tables'
          strings intake/source-boot.dtb | grep -Fq 'qcom,qsmmuv500-tbu'

      - name: Download validated Workflow 68 GKI Image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workflow68
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW68_ARTIFACT_ID}/zip" \
            --output workflow68/artifact.zip
          unzip -q workflow68/artifact.zip -d workflow68/extracted

          (
            cd workflow68/extracted
            sha256sum -c SHA256SUMS
          )

          test -s workflow68/extracted/Image-NOT-FLASHABLE
          test -s workflow68/extracted/lagoon-earlyboot-qsmmuv500-NOT-FLASHABLE.dtb
          awk -F '\t' '$1 == "Image" && $2 == "built" && $3 == "0" {ok=1} END {exit !ok}' \
            workflow68/extracted/build-status.tsv
          awk -F '\t' '$1 == "Lagoon-DTB" && $2 == "compiled" && $3 == "0" {ok=1} END {exit !ok}' \
            workflow68/extracted/build-status.tsv

          python3 - <<'PY'
          from pathlib import Path
          source = Path("workflow68/extracted/qsmmuv500-contract-status.tsv")
          target = Path("workflow68/contract-status.normalized.tsv")
          target.write_text(source.read_text().replace(r"\t", "\t"))
          PY

          for check in \
            image-compatible image-skip-init image-three-level-tables \
            dt-parent-compatible dt-skip-init dt-three-level-tables; do
            grep -Fxq "${check}"$'\t''yes' workflow68/contract-status.normalized.tsv
          done
          grep -Fxq $'dt-tbu-child-count\t7' workflow68/contract-status.normalized.tsv

      - name: Compress and audit GKI Image
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-boot-candidate
          gzip -n -9 -c workflow68/extracted/Image-NOT-FLASHABLE > "$OUT/Image.gz"
          gzip -t "$OUT/Image.gz"
          gzip -dc "$OUT/Image.gz" | cmp - workflow68/extracted/Image-NOT-FLASHABLE

          raw_bytes="$(stat -c %s workflow68/extracted/Image-NOT-FLASHABLE)"
          gzip_bytes="$(stat -c %s "$OUT/Image.gz")"
          printf 'component\tbytes\nImage\t%s\nImage.gz\t%s\n' \
            "$raw_bytes" "$gzip_bytes" > "$OUT/kernel-sizes.tsv"

          strings workflow68/extracted/Image-NOT-FLASHABLE | grep -Fxq 'qcom,qsmmu-v500'
          strings workflow68/extracted/Image-NOT-FLASHABLE | grep -Fxq 'qcom,skip-init'
          strings workflow68/extracted/Image-NOT-FLASHABLE | grep -Fxq 'qcom,use-3-lvl-tables'

      - name: Repack and audit boot candidate
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-boot-candidate
          python3 scripts/38_repack_a52_p1_boot.py \
            --source intake/boot.img \
            --kernel "$OUT/Image.gz" \
            --output "$OUT/boot.img" \
            --report "$OUT/repack-report.json"

          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path(
              "artifacts/a52xq-gki-5.10-boot-candidate/repack-report.json"
          ).read_text())
          failed = [name for name, passed in report["invariants"].items() if not passed]
          if failed:
              raise SystemExit("failed repack invariants: " + ", ".join(failed))
          if report["hardware_validated"] is not False:
              raise SystemExit("candidate must remain explicitly not hardware validated")
          if report["output_bytes"] != 100663296:
              raise SystemExit("unexpected output partition size")
          PY

          python3 - <<'PY'
          import importlib.util
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "a52_boot_repack", "scripts/38_repack_a52_p1_boot.py"
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          source = module.parse_boot(Path("intake/boot.img").read_bytes())
          rebuilt = module.parse_boot(Path(
              "artifacts/a52xq-gki-5.10-boot-candidate/boot.img"
          ).read_bytes())
          if source["dtb"] != rebuilt["dtb"]:
              raise SystemExit("source ROM DTB was not preserved byte-for-byte")
          if source["ramdisk"] != rebuilt["ramdisk"]:
              raise SystemExit("source ROM ramdisk was not preserved byte-for-byte")
          PY

      - name: Finalize candidate audit artifact
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-boot-candidate

          printf 'check\tresult\n' > "$OUT/candidate-status.tsv"
          printf 'source-boot-checksum-locked\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'source-dtb-qsmmuv500-contract\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'workflow68-image-built\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'workflow68-lagoon-dtb-built\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'gki-image-gzip-roundtrip\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-ramdisk-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-dtb-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'partition-size-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/candidate-status.tsv"
          printf 'flash-performed\tno\n' >> "$OUT/candidate-status.tsv"

          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 BOOT CANDIDATE

          This boot image passed automated source-lock, header, component,
          checksum, QSMMUv500-contract, compression, and repack audits.

          It has NOT been boot-tested on the phone.
          No flashing was performed by this workflow.

          Before any device test, prepare a verified recovery path and retain
          the known-working boot image. Review repack-report.json and all
          candidate-status.tsv checks first.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          cat > "$OUT/analysis-metadata.txt" <<EOF
          artifact_type=a52xq-gki-5.10-audited-boot-candidate-not-hardware-validated
          workflow68_run_id=${WORKFLOW68_RUN_ID}
          workflow68_artifact_id=${WORKFLOW68_ARTIFACT_ID}
          gki_commit=${GKI_COMMON_SHA}
          touchgrass_commit=${TOUCHGRASS_COMMIT}
          boot_source_policy=checksum-locked-user-dump
          boot_header_version=2
          rom_ramdisk=preserved-byte-for-byte
          rom_dtb=preserved-byte-for-byte
          kernel_source=workflow68-integrated-native-qsmmuv500
          boot_test=no
          flash_performed=no
          hardware_validated=no
          EOF
          sed -i 's/^          //' "$OUT/analysis-metadata.txt"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Enforce audited candidate result
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-boot-candidate
          for check in \
            source-boot-checksum-locked source-dtb-qsmmuv500-contract \
            workflow68-image-built workflow68-lagoon-dtb-built \
            gki-image-gzip-roundtrip rom-ramdisk-preserved \
            rom-dtb-preserved partition-size-preserved; do
            grep -Fxq "${check}"$'\t''yes' "$OUT/candidate-status.tsv"
          done
          grep -Fxq $'hardware-validated\tno' "$OUT/candidate-status.tsv"
          grep -Fxq $'flash-performed\tno' "$OUT/candidate-status.tsv"
          test -s "$OUT/boot.img"
          test "$(stat -c %s "$OUT/boot.img")" = 100663296
          grep -Fxq 'boot_test=no' "$OUT/analysis-metadata.txt"
          grep -Fxq 'flash_performed=no' "$OUT/analysis-metadata.txt"
          grep -Fxq 'hardware_validated=no' "$OUT/analysis-metadata.txt"
          (cd "$OUT" && sha256sum -c SHA256SUMS)

      - name: Upload audited GKI boot candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-boot-candidate-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-gki-5.10-boot-candidate
          if-no-files-found: error
          retention-days: 14
