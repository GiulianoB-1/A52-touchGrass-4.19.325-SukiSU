name: 90 - A52 recovery ramoops exporter fixed

run-name: Build corrected A52 4.19.206 recovery ramoops exporter

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/90-a52-recovery-ramoops-exporter-fixed.yml'
      - 'scripts/90_stage_a52_recovery_ramoops_exporter.py'

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-recovery-ramoops-exporter-fixed
  cancel-in-progress: true

env:
  JOBS: '4'
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G

jobs:
  build:
    name: Build corrected 4.19.206 recovery exporter
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out kernel project branch
        uses: actions/checkout@v4
        with:
          ref: rebase/resukisu-linux-4.19.325

      - name: Hydrate fixed staging script from main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p scripts
          gh api "repos/${GITHUB_REPOSITORY}/contents/scripts/90_stage_a52_recovery_ramoops_exporter.py?ref=main" \
            --jq '.content' | tr -d '\n' | base64 --decode \
            > scripts/90_stage_a52_recovery_ramoops_exporter.py
          chmod +x scripts/90_stage_a52_recovery_ramoops_exporter.py
          python3 -m py_compile scripts/90_stage_a52_recovery_ramoops_exporter.py

      - name: Publish directly traceable run status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY="Workflow 90 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Status: in_progress
          Conclusion: pending
          Head SHA: ${GITHUB_SHA}

          Purpose: rebuild the recovery-only 4.19.206 frozen ramoops exporter with the false CONFIG_MISC_DEVICES assertion removed and the live recovery security policy enforced."
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/5010467537" \
            -f body="$BODY"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils gzip zip unzip make gcc g++ bc bison flex ccache patch \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils file tar

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: a52xq-recovery-ramoops-exporter-fixed-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a52xq-recovery-ramoops-exporter-${{ runner.os }}-
            a52xq-linux-4.19.206-no-root-${{ runner.os }}-
            a52xq-linux-4.19.200-ccache-${{ runner.os }}-

      - name: Prepare exact touchGrass source through Linux 4.19.200
        run: |
          set -Eeuo pipefail
          chmod +x scripts/*.sh scripts/*.py
          ./scripts/01_prepare_source.sh
          ./scripts/03_apply_linux_4.19.153.sh
          ./scripts/04_apply_linux_4.19.154.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.154 4.19.159
          ./scripts/checkpoint_resolve_linux_4.19.159.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.159 4.19.164
          ./scripts/checkpoint_resolve_linux_4.19.164.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.164 4.19.180
          ./scripts/checkpoint_resolve_linux_4.19.180.sh
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.180 4.19.200
          ./scripts/checkpoint_resolve_linux_4.19.200.sh
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200

      - name: Derive and apply official Linux 4.19.206 merge
        run: |
          set -Eeuo pipefail
          cp scripts/checkpoint_merge_linux_4.19.210.sh scripts/checkpoint_merge_linux_4.19.206.generated.sh
          sed -i \
            -e 's/TO_TAG=v4.19.210/TO_TAG=v4.19.206/' \
            -e '/^TARGET_COMMIT=/d' \
            -e '/test "$to_sha" = "$TARGET_COMMIT"/d' \
            scripts/checkpoint_merge_linux_4.19.206.generated.sh
          chmod +x scripts/checkpoint_merge_linux_4.19.206.generated.sh
          ./scripts/checkpoint_merge_linux_4.19.206.generated.sh
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.206

      - name: Apply conditional merge-shape repairs for 4.19.206
        run: |
          set -Eeuo pipefail
          cp scripts/checkpoint_fix_linux_4.19.210_compile.sh scripts/checkpoint_fix_linux_4.19.206.generated.sh
          sed -i 's/TARGET_VERSION=4.19.210/TARGET_VERSION=4.19.206/' \
            scripts/checkpoint_fix_linux_4.19.206.generated.sh
          chmod +x scripts/checkpoint_fix_linux_4.19.206.generated.sh
          ./scripts/checkpoint_fix_linux_4.19.206.generated.sh

          python3 - <<'PY'
          from pathlib import Path

          root = Path('workspace/touchgrass-a52xq')

          header = (root / 'include/linux/timerqueue.h').read_text()
          path = root / 'drivers/soc/qcom/event_timer.c'
          text = path.read_text()
          newer = '''static DEFINE_PER_CPU(struct timerqueue_head, timer_head) = {
          \t.rb_root = RB_ROOT_CACHED,
          };
          '''
          older = '''static DEFINE_PER_CPU(struct timerqueue_head, timer_head) = {
          \t.head = RB_ROOT,
          \t.next = NULL,
          };
          '''
          wants_newer = 'struct rb_root_cached rb_root;' in header
          desired = newer if wants_newer else older
          obsolete = older if wants_newer else newer
          if desired not in text:
              if obsolete not in text:
                  raise SystemExit('event_timer initializer shape is unrecognized')
              path.write_text(text.replace(obsolete, desired, 1))

          path = root / 'kernel/sched/cpufreq_schedutil.c'
          text = path.read_text()
          call = 'sugov_clear_global_tunables();'
          definition = 'static void sugov_clear_global_tunables(void)'
          anchor = 'static void sugov_exit('
          if call in text and definition not in text:
              if anchor not in text:
                  raise SystemExit('schedutil exit anchor missing')
              helper = '''static void sugov_clear_global_tunables(void)
          {
          \tif (!have_governor_per_policy())
          \t\tglobal_tunables = NULL;
          }

          '''
              path.write_text(text.replace(anchor, helper + anchor, 1))
          elif call not in text:
              raise SystemExit('schedutil cleanup call missing after generic repair')
          PY

      - name: Stage read-only early ramoops snapshot exporter
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52-recovery-ramoops-exporter-fixed
          mkdir -p "$OUT"
          python3 scripts/90_stage_a52_recovery_ramoops_exporter.py \
            --kernel workspace/touchgrass-a52xq \
            --output "$OUT"
          git -C workspace/touchgrass-a52xq diff --check
          git -C workspace/touchgrass-a52xq diff --binary --no-ext-diff \
            > "$OUT/recovery-raw-exporter.patch"
          test -s "$OUT/recovery-raw-exporter.patch"

      - name: Configure live recovery security policy
        run: |
          set -Eeuo pipefail
          KERNEL=workspace/touchgrass-a52xq
          CONFIG="$KERNEL/arch/arm64/configs/a52xq_defconfig"
          "$KERNEL/scripts/config" --file "$CONFIG" \
            -e IKCONFIG -e IKCONFIG_PROC \
            -e PSTORE -e PSTORE_RAM -e PSTORE_CONSOLE -e PSTORE_PMSG \
            -d DEVMEM -d PROC_KCORE -d DEBUG_FS

      - name: Build corrected recovery exporter kernel
        run: |
          set -Eeuo pipefail
          source scripts/common.sh
          LABEL=a52xq-recovery-ramoops-exporter-fixed-4.19.206
          OUT=artifacts/a52-recovery-ramoops-exporter-fixed

          build_kernel "$LABEL"
          cp "$ARTIFACTS_DIR/config-$LABEL" "$OUT/final.config"
          cp "$ARTIFACTS_DIR/Image-$LABEL" "$OUT/Image"
          gzip -n -9 -c "$OUT/Image" > "$OUT/Image.gz"
          gzip -t "$OUT/Image.gz"
          cp "$KERNEL_DIR/out/System.map" "$OUT/System.map"
          cp "$KERNEL_DIR/out/vmlinux" "$OUT/vmlinux"
          cp "$KERNEL_DIR/out/Module.symvers" "$OUT/Module.symvers" 2>/dev/null || true

      - name: Audit compiled Image and recovery security policy
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52-recovery-ramoops-exporter-fixed
          python3 - <<'PY'
          from pathlib import Path
          import json

          out = Path('artifacts/a52-recovery-ramoops-exporter-fixed')
          image = (out / 'Image').read_bytes()
          config = set((out / 'final.config').read_text(errors='replace').splitlines())
          checks = {
              'snapshot_marker_in_image': b'a52_ramoops_raw: captured 0x%llx-0x%llx before ramoops init' in image,
              'device_marker_in_image': b'/dev/a52_ramoops_raw ready, size=%u' in image,
              'pstore_ram_builtin': 'CONFIG_PSTORE_RAM=y' in config,
              'devmem_disabled': '# CONFIG_DEVMEM is not set' in config,
              'proc_kcore_disabled': '# CONFIG_PROC_KCORE is not set' in config,
              'debugfs_disabled': '# CONFIG_DEBUG_FS is not set' in config,
          }
          for name, passed in checks.items():
              print(f'AUDIT {name}: {"PASS" if passed else "FAIL"}')
          (out / 'postbuild-audit.json').write_text(
              json.dumps({'status': 'passed' if all(checks.values()) else 'failed', 'checks': checks},
                         indent=2, sort_keys=True) + '\n'
          )
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('post-build audit failed: ' + ', '.join(failed))
          PY

      - name: Finalize audited recovery-kernel artifact
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52-recovery-ramoops-exporter-fixed
          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G RECOVERY-ONLY RAMOOPS RAW SNAPSHOT EXPORTER

          This is a kernel component, not a complete recovery image.

          It snapshots physical 0xB1B00000-0xB1BFFFFF during pure_initcall,
          before normal ramoops registration, and exposes only the frozen copy
          through the root-read-only /dev/a52_ramoops_raw device.

          /dev/mem, /proc/kcore and debugfs remain disabled.
          No write operation is implemented.
          Hardware validation has not yet been performed.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/status.tsv"
          printf 'kernel-version\t4.19.206\n' >> "$OUT/status.tsv"
          printf 'snapshot-before-ramoops\tyes\n' >> "$OUT/status.tsv"
          printf 'frozen-one-mib-only\tyes\n' >> "$OUT/status.tsv"
          printf 'read-only-device\tyes\n' >> "$OUT/status.tsv"
          printf 'devmem-remains-disabled\tyes\n' >> "$OUT/status.tsv"
          printf 'proc-kcore-remains-disabled\tyes\n' >> "$OUT/status.tsv"
          printf 'debugfs-remains-disabled\tyes\n' >> "$OUT/status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Upload corrected recovery exporter kernel
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-recovery-ramoops-raw-exporter-fixed-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52-recovery-ramoops-exporter-fixed
          if-no-files-found: error
          retention-days: 14

      - name: Publish final run status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_STATUS: ${{ job.status }}
        run: |
          BODY="Workflow 90 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Status: completed
          Conclusion: ${FINAL_STATUS}
          Head SHA: ${GITHUB_SHA}

          Purpose: rebuild the recovery-only 4.19.206 frozen ramoops exporter with the false CONFIG_MISC_DEVICES assertion removed and the live recovery security policy enforced."
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/5010467537" \
            -f body="$BODY"
