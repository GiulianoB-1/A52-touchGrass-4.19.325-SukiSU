name: 04 - Integrate and build SukiSU Ultra

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/04-sukisu-ultra.yml'
      - 'scripts/common.sh'
      - 'scripts/01_prepare_source.sh'
      - 'scripts/03_apply_linux_4.19.153.sh'
      - 'scripts/05_repair_bpf_verifier.sh'
      - 'scripts/07_integrate_sukisu.sh'
      - 'scripts/07_fix_sukisu_kconfig.sh'
      - 'scripts/07_patch_sukisu_4.19_compat.sh'
      - 'scripts/07_patch_sukisu_4.19_file_wrapper.sh'
      - 'scripts/07_patch_sukisu_4.19_manager_policy.sh'
      - 'scripts/07_patch_sukisu_4.19_runtime_selinux.sh'
      - 'scripts/07_patch_sukisu_4.19_legacy_sepolicy.sh'
      - 'scripts/07_normalize_sukisu_4.19_legacy_sepolicy.sh'
      - 'scripts/07_fix_sukisu_4.19_filename_trans_bitmap.sh'
      - 'scripts/07_patch_sukisu_4.19_supercall.sh'
      - 'scripts/08_audit_and_build_sukisu.sh'
      - 'sources.lock'

permissions:
  contents: read

concurrency:
  group: a52-sukisu-ultra-${{ github.ref }}
  cancel-in-progress: false

env:
  JOBS: '4'

jobs:
  integrate-audit-build:
    name: Build Linux 4.19.153 with pinned SukiSU and unmount disabled
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils zip unzip make gcc g++ bc bison flex \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils

      - name: Prepare exact touchGrass baseline source
        run: |
          chmod +x scripts/*.sh
          ./scripts/01_prepare_source.sh

      - name: Apply and resolve official Linux 4.19.153 delta
        run: ./scripts/03_apply_linux_4.19.153.sh

      - name: Repair known BPF verifier inconsistencies
        run: ./scripts/05_repair_bpf_verifier.sh

      - name: Integrate exact pinned SukiSU Ultra safely
        run: ./scripts/07_integrate_sukisu.sh

      - name: Correct SukiSU Kconfig menu placement
        run: ./scripts/07_fix_sukisu_kconfig.sh

      - name: Apply SukiSU Linux 4.19 compatibility patch
        run: ./scripts/07_patch_sukisu_4.19_compat.sh

      - name: Apply SukiSU Linux 4.19 file-wrapper compatibility patch
        run: ./scripts/07_patch_sukisu_4.19_file_wrapper.sh

      - name: Apply SukiSU Linux 4.19 manager and allowlist compatibility patch
        run: ./scripts/07_patch_sukisu_4.19_manager_policy.sh

      - name: Apply SukiSU Linux 4.19 runtime and SELinux compatibility patch
        run: ./scripts/07_patch_sukisu_4.19_runtime_selinux.sh

      - name: Convert and normalize SukiSU for the legacy Linux 4.19 SELinux policydb
        run: ./scripts/07_normalize_sukisu_4.19_legacy_sepolicy.sh

      - name: Correct legacy SELinux filename-transition bitmap index
        run: ./scripts/07_fix_sukisu_4.19_filename_trans_bitmap.sh

      - name: Apply SukiSU Linux 4.19 supercall compatibility patch
        run: ./scripts/07_patch_sukisu_4.19_supercall.sh

      - name: Audit BPF and SukiSU objects, then build full kernel
        run: ./scripts/08_audit_and_build_sukisu.sh

      - name: Record runner state
        if: always()
        run: |
          mkdir -p artifacts
          df -h > artifacts/runner-disk.txt
          free -h > artifacts/runner-memory.txt
          uname -a > artifacts/runner-uname.txt
          git --version > artifacts/tool-versions.txt
          make --version | head -n 1 >> artifacts/tool-versions.txt
          bison --version | head -n 1 >> artifacts/tool-versions.txt
          flex --version >> artifacts/tool-versions.txt

      - name: Upload SukiSU integration, audits, kernel, logs, and checksums
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-sukisu-ultra-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
