name: 98 - A52 GKI 5.10 complete UFS dependency audit

run-name: Build A52 GKI 5.10 complete UFS dependency audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/98-a52-gki-5.10-ufs-dependency-audit.yml'
      - 'scripts/98_stage_a52xq_ufs_dependency_audit.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/98-a52-gki-5.10-ufs-dependency-audit.yml'
      - 'scripts/98_stage_a52xq_ufs_dependency_audit.py'

permissions:
  contents: read
  actions: read

concurrency:
  group: a52-gki-5.10-ufs-dependency-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  WORKFLOW97_ARTIFACT_ID: '8575374792'

jobs:
  build:
    name: Build complete UFS dependency audit candidate
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out diagnostic project
        uses: actions/checkout@v4

      - name: Prepare runner
        run: |
          set -Eeuo pipefail
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio gzip file dwarves device-tree-compiler

      - name: Restore pinned GKI source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Download and verify Workflow 97 candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workflow97/extracted
          curl --fail --location --retry 5 --retry-all-errors \
            --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW97_ARTIFACT_ID}/zip" \
            --output workflow97/artifact.zip
          unzip -q workflow97/artifact.zip -d workflow97/extracted
          (cd workflow97/extracted && sha256sum -c SHA256SUMS)
          test -s workflow97/extracted/full-integrated-ufs-ice-safe.patch
          test -s workflow97/extracted/diagnostic.config
          test -s workflow97/extracted/boot.img
          grep -Fq 'diff --git a/drivers/pinctrl/qcom/pinctrl-lagoon.c' \
            workflow97/extracted/full-integrated-ufs-ice-safe.patch
          grep -Fq 'diff --git a/drivers/scsi/ufs/a52-ufs-live-trace.c' \
            workflow97/extracted/full-integrated-ufs-ice-safe.patch

      - name: Replay exact Workflow 97 source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

          PATCH="$PWD/workflow97/extracted/full-integrated-ufs-ice-safe.patch"
          git -C gki/common apply --check "$PATCH"
          git -C gki/common apply "$PATCH"

          test -s gki/common/drivers/pinctrl/qcom/pinctrl-lagoon.c
          test -s gki/common/drivers/clk/qcom/gcc-lagoon.c
          test -s gki/common/drivers/regulator/a52-legacy-gdsc-regulator.c
          test -s gki/common/drivers/regulator/a52-rpmh-regulator-downstream.c
          test -s gki/common/drivers/scsi/ufs/a52-ufs-live-trace.c
          grep -Fq 'A52_UFS_ICE_SAFE_BRINGUP' \
            gki/common/drivers/scsi/ufs/ufs-qcom-ice.c

      - name: Stage complete dependency audit
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-ufs-dependency-audit
          mkdir -p "$OUT/logs" "$OUT/dependency-audit" "$OUT/symbols"

          python3 scripts/98_stage_a52xq_ufs_dependency_audit.py \
            --gki gki/common \
            --output "$OUT/dependency-audit"

          git -C gki/common diff --check
          grep -Fq 'A52UFSDEP copy=1 HBA_STAGE name=init_hba_vreg' \
            gki/common/drivers/scsi/ufs/ufshcd.c
          grep -Fq 'A52UFSDEP copy=1 VREG_GET_END' \
            gki/common/drivers/scsi/ufs/ufshcd.c
          grep -Fq 'A52UFSDEP copy=1 SUPPLY' \
            gki/common/drivers/scsi/ufs/ufshcd.c
          grep -Fq 'A52UFSDEP copy=1 PROVIDER' \
            gki/common/drivers/scsi/ufs/ufshcd.c
          grep -Fq 'A52UFSDEP copy=1 CLK_TOGGLE' \
            gki/common/drivers/scsi/ufs/ufshcd.c

          while IFS= read -r -d '' file; do
            git -C gki/common add -N -- "$file"
          done < <(git -C gki/common ls-files --others --exclude-standard -z)
          git -C gki/common diff --binary --no-ext-diff \
            > "$OUT/full-integrated-ufs-dependency-audit.patch"
          test -s "$OUT/full-integrated-ufs-dependency-audit.patch"
          grep -Fq 'A52UFSDEP copy=1 HBA_STAGE' \
            "$OUT/full-integrated-ufs-dependency-audit.patch"

      - name: Configure diagnostic kernel
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-ufs-dependency-audit"
          BUILD="$PWD/workspace/gki-ufs-dependency-audit-out"
          mkdir -p "$BUILD"
          cp workflow97/extracted/diagnostic.config "$BUILD/.config"

          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            2>&1 | tee "$OUT/logs/olddefconfig.log"
          cp "$BUILD/.config" "$OUT/diagnostic.config"

          grep -Fxq 'CONFIG_SCSI_UFSHCD=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_SCSI_UFS_QCOM=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_REGULATOR=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_REGULATOR_QCOM_RPMH=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_COMMON_CLK=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_PINCTRL_LAGOON=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_PHY_QCOM_QMP=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_BLK_DEV_SD=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_PSTORE_RAM=y' "$BUILD/.config"

          grep -E '^(CONFIG_SCSI_UFS|CONFIG_REGULATOR|CONFIG_COMMON_CLK|CONFIG_CLK_QCOM|CONFIG_PINCTRL_LAGOON|CONFIG_PHY_QCOM|CONFIG_QCOM_SCM|CONFIG_ARM_SMMU)=' \
            "$BUILD/.config" > "$OUT/dependency-config-matrix.txt" || true

      - name: Build Image and symbolized UFS core
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-ufs-dependency-audit"
          BUILD="$PWD/workspace/gki-ufs-dependency-audit-out"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          "$CLANG" --version | tee "$OUT/logs/toolchain.log"
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            KCFLAGS=-Wno-error=frame-larger-than Image \
            2>&1 | tee "$OUT/logs/Image.log"

          test -s "$BUILD/arch/arm64/boot/Image"
          test -s "$BUILD/vmlinux"
          test -s "$BUILD/System.map"
          test -s "$BUILD/drivers/scsi/ufs/ufshcd.o"
          test -s "$BUILD/drivers/scsi/ufs/ufs-qcom.o"
          test -s "$BUILD/drivers/scsi/ufs/ufs-qcom-ice.o"

          cp "$BUILD/arch/arm64/boot/Image" "$OUT/Image"
          cp "$BUILD/vmlinux" "$OUT/symbols/vmlinux"
          cp "$BUILD/System.map" "$OUT/symbols/System.map"
          cp "$BUILD/drivers/scsi/ufs/ufshcd.o" "$OUT/symbols/ufshcd.o"
          cp "$BUILD/drivers/scsi/ufs/ufs-qcom.o" "$OUT/symbols/ufs-qcom.o"
          cp "$BUILD/drivers/scsi/ufs/ufs-qcom-ice.o" "$OUT/symbols/ufs-qcom-ice.o"

          llvm-nm -n "$BUILD/vmlinux" | \
            grep -E ' (ufshcd_hba_init|ufshcd_get_vreg|ufshcd_init_vreg|ufshcd_setup_vreg|ufshcd_init_clocks|ufshcd_setup_clocks|ufs_qcom_init|ufs_qcom_ice_init)$' \
            > "$OUT/symbols/ufs-dependency-symbols.txt"
          llvm-objdump -dr "$BUILD/drivers/scsi/ufs/ufshcd.o" \
            > "$OUT/symbols/ufshcd.disassembly.txt"
          llvm-objdump -dr "$BUILD/drivers/scsi/ufs/ufs-qcom.o" \
            > "$OUT/symbols/ufs-qcom.disassembly.txt"

          grep -aFq 'A52UFSDEP copy=1 HBA_STAGE name=init_hba_vreg' "$OUT/Image"
          grep -aFq 'A52UFSDEP copy=1 VREG_GET_END' "$OUT/Image"
          grep -aFq 'A52UFSDEP copy=1 PROVIDER' "$OUT/Image"
          grep -aFq 'A52UFSDEP copy=1 CLK_TOGGLE' "$OUT/Image"
          grep -aFq 'A52ICE copy=1 SAFE_BYPASS' "$OUT/Image"
          gzip -n -9 -c "$OUT/Image" > "$OUT/Image.gz"
          gzip -t "$OUT/Image.gz"

      - name: Repack and audit boot image
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-ufs-dependency-audit
          python3 scripts/38_repack_a52_p1_boot.py \
            --source workflow97/extracted/boot.img \
            --kernel "$OUT/Image.gz" \
            --output "$OUT/boot.img" \
            --report "$OUT/repack-report.json"

          python3 - <<'PY'
          import hashlib
          import importlib.util
          import json
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              'a52_boot_repack', 'scripts/38_repack_a52_p1_boot.py'
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          source_path = Path('workflow97/extracted/boot.img')
          output = Path('artifacts/a52xq-gki-5.10-ufs-dependency-audit')
          output_path = output / 'boot.img'
          image_path = output / 'Image.gz'
          src = module.parse_boot(source_path.read_bytes())
          new = module.parse_boot(output_path.read_bytes())

          checks = {
              'partition_size_preserved': (
                  output_path.stat().st_size
                  == source_path.stat().st_size
                  == 100663296
              ),
              'replacement_kernel_used': (
                  hashlib.sha256(new['kernel']).digest()
                  == hashlib.sha256(image_path.read_bytes()).digest()
              ),
              'workflow97_ramdisk_preserved': new['ramdisk'] == src['ramdisk'],
              'second_preserved': new['second'] == src['second'],
              'reserved_dtb_preserved': new['dtb'] == src['dtb'],
              'diagnostic_cmdline_preserved': new['cmdline'] == src['cmdline'],
              'ramoops_reservation_present': (
                  b'a52-ramoops-reserved@b1b00000' in new['dtb']
              ),
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('final audit failed: ' + ', '.join(failed))

          (output / 'final-audit.json').write_text(
              json.dumps(
                  {
                      'status': 'ufs-complete-dependency-audit-candidate',
                      'hardware_validated': False,
                      'input': 'successful Workflow 97 run 2 artifact',
                      'behavior_change': (
                          'no additional regulator, clock, PHY, reset or ICE bypass; '
                          'diagnostic instrumentation only'
                      ),
                      'checks': checks,
                  },
                  indent=2,
                  sort_keys=True,
              )
              + '\n',
              encoding='utf-8',
          )
          PY

      - name: Finalize audited candidate
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-ufs-dependency-audit

          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 COMPLETE UFS DEPENDENCY AUDIT

          Workflow 97 returned -EPROBE_DEFER from ufshcd_hba_init before the
          Qualcomm variant and ICE-safe path were reached. This candidate does
          not bypass another rail. It records the exact return value of every
          host-power, clock, device-power and variant stage.

          For vdd-hba, vcc, vccq and vccq2 it also resolves the live merged-DT
          supply phandle, supplier path, compatible, regulator-name, availability,
          nearest platform-provider node, device and bound driver. Every decisive
          record is written three times to tolerate retained-RAM bit corruption.

          This image is not hardware-validated.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/candidate-status.tsv"
          printf 'workflow97-source-replayed\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'all-hba-init-stages-traced\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'all-ufs-supply-phandles-resolved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'provider-ancestry-and-driver-traced\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'per-clock-get-and-enable-traced\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'additional-power-bypass\tno\n' >> "$OUT/candidate-status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/candidate-status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 | sort -z | \
              xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )
          test "$(stat -c %s "$OUT/boot.img")" = 100663296

      - name: Upload complete dependency audit candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-ufs-dependency-audit-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-gki-5.10-ufs-dependency-audit
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-ufs-dependency-audit-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-ufs-dependency-audit
            workspace/gki-ufs-dependency-audit-out/.config
          if-no-files-found: warn
          retention-days: 14

  report:
    name: Report Workflow 98 status
    if: always()
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      issues: write
      actions: read
    steps:
      - name: Post run status to issue 45
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ needs.build.result }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          python3 - <<'PY' > payload.json
          import json
          import os

          body = (
              f"Workflow 98 run: {os.environ['RUN_URL']}\n\n"
              f"Status: completed\n"
              f"Conclusion: {os.environ['RESULT']}\n"
              f"Head SHA: {os.environ['HEAD_SHA']}\n\n"
              "Purpose: trace every ufshcd_hba_init power and clock stage, "
              "resolve all live UFS supply phandles and provider drivers, and "
              "identify the exact pre-variant -EPROBE_DEFER without adding "
              "another hardware bypass."
          )
          print(json.dumps({'body': body}))
          PY
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'Content-Type: application/json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/45/comments" \
            --data-binary @payload.json
