name: 72 - A52 GKI 5.10 QCOM watchdog diagnostic boot

run-name: Build corrected A52 GKI QCOM watchdog diagnostic candidate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/72-a52-gki-5.10-qcom-wdt-diagnostic-boot.yml'
      - 'scripts/37_validate_a52_p1_boot_source.py'
      - 'scripts/38_repack_a52_p1_boot.py'
      - 'projects/a52-p1-boot-image/boot-source.lock'

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-qcom-wdt-diagnostic-boot-v2
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  WORKFLOW68_ARTIFACT_ID: '8427146475'
  DIAG_CMDLINE: >-
    panic=0 loglevel=8 ignore_loglevel initcall_debug printk.time=1
    pstore.compress=none

jobs:
  build:
    name: Build corrected QCOM-WDT diagnostic boot image
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 45 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 72 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Purpose: corrected CONFIG_QCOM_WDT diagnostic build with the proven SMMU verification path.
          Commit: \`${GITHUB_SHA}\`"

      - name: Prepare runner
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio gzip file dwarves

      - name: Restore pinned GKI source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate source and replay integrated port
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

          mkdir -p workflow68
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${WORKFLOW68_ARTIFACT_ID}/zip" \
            --output workflow68/artifact.zip
          unzip -q workflow68/artifact.zip -d workflow68/extracted
          (cd workflow68/extracted && sha256sum -c SHA256SUMS)
          test -s workflow68/extracted/integrated-port.patch
          test -s workflow68/extracted/integrated.config

          git -C gki/common apply --check "$PWD/workflow68/extracted/integrated-port.patch"
          git -C gki/common apply "$PWD/workflow68/extracted/integrated-port.patch"
          git -C gki/common diff --check
          grep -Fq 'qcom,qsmmu-v500' \
            gki/common/drivers/iommu/arm/arm-smmu/arm-smmu-impl.c
          grep -Fq 'qcom,qsmmu-v500' \
            gki/common/drivers/iommu/arm/arm-smmu/arm-smmu.c

      - name: Configure and build watchdog-enabled Image
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-qcom-wdt-diagnostic"
          BUILD="$PWD/workspace/gki-qcom-wdt-diagnostic-out"
          mkdir -p "$OUT/logs" "$BUILD"
          cp workflow68/extracted/integrated.config "$BUILD/.config"

          gki/common/scripts/config --file "$BUILD/.config" --enable WATCHDOG
          gki/common/scripts/config --file "$BUILD/.config" --enable WATCHDOG_CORE
          gki/common/scripts/config --file "$BUILD/.config" --enable WATCHDOG_HANDLE_BOOT_ENABLED
          gki/common/scripts/config --file "$BUILD/.config" --enable WATCHDOG_SYSFS
          gki/common/scripts/config --file "$BUILD/.config" --enable QCOM_WDT
          gki/common/scripts/config --file "$BUILD/.config" --enable PRINTK_TIME
          gki/common/scripts/config --file "$BUILD/.config" --enable PSTORE
          gki/common/scripts/config --file "$BUILD/.config" --enable PSTORE_CONSOLE
          gki/common/scripts/config --file "$BUILD/.config" --enable PSTORE_PMSG
          gki/common/scripts/config --file "$BUILD/.config" --enable PSTORE_RAM
          gki/common/scripts/config --file "$BUILD/.config" --disable PSTORE_COMPRESS
          for symbol in \
            PSTORE_DEFLATE_COMPRESS PSTORE_LZO_COMPRESS \
            PSTORE_LZ4_COMPRESS PSTORE_LZ4HC_COMPRESS \
            PSTORE_842_COMPRESS PSTORE_ZSTD_COMPRESS; do
            gki/common/scripts/config --file "$BUILD/.config" --disable "$symbol"
          done
          gki/common/scripts/config --file "$BUILD/.config" --disable TRIM_UNUSED_KSYMS
          gki/common/scripts/config --file "$BUILD/.config" --set-str UNUSED_KSYMS_WHITELIST ''

          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            > "$OUT/logs/olddefconfig.log" 2>&1
          cp "$BUILD/.config" "$OUT/diagnostic.config"

          grep -Fxq 'CONFIG_WATCHDOG_HANDLE_BOOT_ENABLED=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_QCOM_WDT=y' "$BUILD/.config"
          grep -Fxq 'CONFIG_PSTORE_CONSOLE=y' "$BUILD/.config"
          grep -Fxq '# CONFIG_PSTORE_COMPRESS is not set' "$BUILD/.config"

          "$CLANG" --version | tee "$OUT/logs/toolchain.log"
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            KCFLAGS=-Wno-error=frame-larger-than Image \
            > "$OUT/logs/Image.log" 2>&1
          test -s "$BUILD/arch/arm64/boot/Image"
          cp "$BUILD/arch/arm64/boot/Image" "$OUT/Image"
          grep -aFq 'qcom,msm-watchdog' "$OUT/Image"
          grep -aFq 'qcom,qsmmu-v500' "$OUT/Image"
          gzip -n -9 -c "$OUT/Image" > "$OUT/Image.gz"
          gzip -t "$OUT/Image.gz"
          gzip -dc "$OUT/Image.gz" | cmp - "$OUT/Image"

      - name: Download and validate checksum-locked boot source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p intake
          ASSET_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=30" \
            --jq '[.[] | .assets[] | select(.name | endswith(".img"))][0].id')"
          test -n "$ASSET_ID"
          test "$ASSET_ID" != null
          curl --fail --location --retry 3 --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/octet-stream' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" \
            --output intake/boot.img
          python3 scripts/37_validate_a52_p1_boot_source.py \
            intake/boot.img \
            --lock projects/a52-p1-boot-image/boot-source.lock \
            --output artifacts/a52xq-gki-5.10-qcom-wdt-diagnostic/source-validation.json

      - name: Repack and audit diagnostic boot image
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-qcom-wdt-diagnostic
          python3 scripts/38_repack_a52_p1_boot.py \
            --source intake/boot.img \
            --kernel "$OUT/Image.gz" \
            --output "$OUT/boot.img" \
            --report "$OUT/base-repack-report.json"

          python3 - <<'PY'
          import importlib.util
          import json
          import os
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "a52_boot_repack", "scripts/38_repack_a52_p1_boot.py"
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          source_path = Path("intake/boot.img")
          output = Path("artifacts/a52xq-gki-5.10-qcom-wdt-diagnostic/boot.img")
          data = bytearray(output.read_bytes())
          before = module.parse_boot(bytes(data))
          addition = os.environ["DIAG_CMDLINE"].strip()
          cmdline = (before["cmdline"] + " " + addition).strip()
          encoded = cmdline.encode("ascii")
          if len(encoded) > 1534:
              raise SystemExit(f"diagnostic command line too long: {len(encoded)}")
          data[64:576] = b"\0" * 512
          data[608:1632] = b"\0" * 1024
          first = encoded[:511]
          second = encoded[511:]
          data[64:64 + len(first)] = first
          data[608:608 + len(second)] = second
          output.write_bytes(data)

          source = module.parse_boot(source_path.read_bytes())
          rebuilt = module.parse_boot(output.read_bytes())
          checks = {
              "partition_size_preserved": output.stat().st_size == source_path.stat().st_size,
              "header_version_preserved": rebuilt["header_version"] == source["header_version"],
              "page_size_preserved": rebuilt["page_size"] == source["page_size"],
              "board_preserved": rebuilt["board"] == source["board"],
              "kernel_addr_preserved": rebuilt["kernel_addr"] == source["kernel_addr"],
              "ramdisk_addr_preserved": rebuilt["ramdisk_addr"] == source["ramdisk_addr"],
              "tags_addr_preserved": rebuilt["tags_addr"] == source["tags_addr"],
              "ramdisk_preserved": rebuilt["ramdisk"] == source["ramdisk"],
              "second_preserved": rebuilt["second"] == source["second"],
              "dtb_preserved": rebuilt["dtb"] == source["dtb"],
              "diagnostic_cmdline_present": addition in rebuilt["cmdline"],
              "watchdog_not_disabled": "nowatchdog" not in rebuilt["cmdline"],
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit("diagnostic audit failed: " + ", ".join(failed))
          Path("artifacts/a52xq-gki-5.10-qcom-wdt-diagnostic/diagnostic-report.json").write_text(
              json.dumps({
                  "status": "qcom-wdt-diagnostic-repacked-audited",
                  "hardware_validated": False,
                  "previous_observation": "Samsung logo for about 15 seconds followed by hard PS_HOLD reset",
                  "hypothesis": "bootloader watchdog remained enabled because CONFIG_QCOM_WDT was disabled",
                  "source_cmdline": source["cmdline"],
                  "diagnostic_cmdline": rebuilt["cmdline"],
                  "checks": checks,
              }, indent=2, sort_keys=True) + "\n"
          )
          PY

      - name: Finalize artifact
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-qcom-wdt-diagnostic
          cat > "$OUT/README-FIRST.txt" <<'EOF'
          A52 5G GKI 5.10 QCOM WATCHDOG DIAGNOSTIC CANDIDATE

          This candidate enables CONFIG_QCOM_WDT as built-in, retains watchdog
          boot handoff support, disables pstore compression, and adds verbose
          initcall logging. It is not yet hardware validated. Keep OrangeFox and
          the known-working boot image ready before testing.
          EOF
          sed -i 's/^          //' "$OUT/README-FIRST.txt"

          printf 'check\tresult\n' > "$OUT/candidate-status.tsv"
          printf 'qcom-watchdog-built-in\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'boot-watchdog-handling-enabled\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'pstore-console-built-in\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'pstore-compression-disabled\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'diagnostic-cmdline-present\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-ramdisk-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'rom-dtb-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'partition-size-preserved\tyes\n' >> "$OUT/candidate-status.tsv"
          printf 'hardware-validated\tno\n' >> "$OUT/candidate-status.tsv"
          printf 'flash-performed\tno\n' >> "$OUT/candidate-status.tsv"

          test "$(stat -c %s "$OUT/boot.img")" = 100663296
          grep -Fxq 'CONFIG_QCOM_WDT=y' "$OUT/diagnostic.config"
          grep -Fxq '# CONFIG_PSTORE_COMPRESS is not set' "$OUT/diagnostic.config"
          grep -Fxq $'qcom-watchdog-built-in\tyes' "$OUT/candidate-status.tsv"
          grep -Fxq $'hardware-validated\tno' "$OUT/candidate-status.tsv"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Upload corrected diagnostic candidate
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-qcom-wdt-diagnostic-${{ github.run_number }}-NOT-HARDWARE-VALIDATED
          path: artifacts/a52xq-gki-5.10-qcom-wdt-diagnostic
          if-no-files-found: error
          retention-days: 14
