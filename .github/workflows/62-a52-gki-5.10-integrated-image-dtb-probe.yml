name: 62 - A52 GKI 5.10 integrated Image and DTB probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/62-a52-gki-5.10-integrated-image-dtb-probe.yml
      - scripts/53_probe_a52xq_lagoon_phase1.py
      - scripts/54_probe_a52xq_lagoon_clocks_phase2.py
      - scripts/55_probe_a52xq_lagoon_remaining_clocks.py
      - scripts/56_probe_a52xq_lagoon_earlyboot_dt.py
      - scripts/59_probe_a52xq_sm6350_interconnect.py
      - scripts/62_build_a52xq_integrated_probe.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-integrated-image-dtb-probe
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  TOUCHGRASS_COMMIT: 6bf351bdf18bdb228db79e66f14a7a9c0178e5d7
  UPSTREAM_LINUX_SHA: 830b3c68c1fb1e9176028d02ef86f3cf76aa2476
  SEED_ARTIFACT_ID: '8413697551'
  SEED_CONFIG_SHA256: b4da88c027cb7d3efad948b0f0986ee24d968dedcf14499d360f4e0c623cf01a

jobs:
  build:
    name: Build integrated non-flashable Image and Lagoon DTB
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 38 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 62 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install integrated-build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio lz4 file dwarves device-tree-compiler

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate and clean GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          test -x gki/common/scripts/config
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

      - name: Restore pinned touchGrass source
        id: touchgrass-cache
        uses: actions/cache/restore@v4
        with:
          path: workspace/touchgrass-a52xq
          key: a52xq-touchgrass-linux-4.19.200-main-v2-${{ runner.os }}-${{ env.TOUCHGRASS_COMMIT }}

      - name: Validate touchGrass source
        run: |
          set -Eeuo pipefail
          test '${{ steps.touchgrass-cache.outputs.cache-hit }}' = true
          test -d workspace/touchgrass-a52xq/.git
          test "$(git -C workspace/touchgrass-a52xq rev-parse HEAD)" = "${TOUCHGRASS_COMMIT}"
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200

      - name: Obtain Workflow 52 resolved configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workspace/workflow52-seed
          ZIP=workspace/workflow52-seed/seed.zip
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o "$ZIP" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SEED_ARTIFACT_ID}/zip"
          unzip -p "$ZIP" a52xq-5.10-resolved.config \
            > workspace/workflow52-seed/a52xq-5.10-resolved.config
          printf '%s  %s\n' "$SEED_CONFIG_SHA256" \
            workspace/workflow52-seed/a52xq-5.10-resolved.config | sha256sum -c -

      - name: Download pinned Linux 6.1 SM6350 provider sources
        run: |
          set -Eeuo pipefail
          UP="$PWD/workspace/linux-v6.1-sm6350"
          BASE="https://raw.githubusercontent.com/torvalds/linux/${UPSTREAM_LINUX_SHA}"
          rm -rf "$UP"
          mkdir -p "$UP/drivers/interconnect/qcom" "$UP/include/dt-bindings/interconnect"
          curl -fL --retry 3 --retry-all-errors -o "$UP/drivers/interconnect/qcom/sm6350.c" \
            "$BASE/drivers/interconnect/qcom/sm6350.c"
          curl -fL --retry 3 --retry-all-errors -o "$UP/drivers/interconnect/qcom/sm6350.h" \
            "$BASE/drivers/interconnect/qcom/sm6350.h"
          curl -fL --retry 3 --retry-all-errors -o "$UP/include/dt-bindings/interconnect/qcom,sm6350.h" \
            "$BASE/include/dt-bindings/interconnect/qcom,sm6350.h"

      - name: Replay every proven source-port phase
        run: |
          set -Eeuo pipefail
          TG=workspace/touchgrass-a52xq
          SEED=workspace/workflow52-seed/a52xq-5.10-resolved.config
          rm -rf workspace/workflow62-stage
          mkdir -p workspace/workflow62-stage
          python3 scripts/53_probe_a52xq_lagoon_phase1.py stage \
            --gki gki/common --touchgrass "$TG" --seed-config "$SEED" \
            --output workspace/workflow62-stage/phase1
          python3 scripts/54_probe_a52xq_lagoon_clocks_phase2.py stage \
            --gki gki/common --touchgrass "$TG" \
            --output workspace/workflow62-stage/phase2
          python3 scripts/55_probe_a52xq_lagoon_remaining_clocks.py stage \
            --gki gki/common --touchgrass "$TG" \
            --output workspace/workflow62-stage/phase3
          python3 scripts/56_probe_a52xq_lagoon_earlyboot_dt.py stage \
            --gki gki/common --touchgrass "$TG" \
            --output workspace/workflow62-stage/device-tree
          python3 scripts/59_probe_a52xq_sm6350_interconnect.py stage \
            --gki gki/common --upstream workspace/linux-v6.1-sm6350 \
            --output workspace/workflow62-stage/interconnect
          git -C gki/common diff --check > workspace/workflow62-stage/diff-check.log 2>&1 || true

      - name: Resolve and audit integrated configuration
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-integrated-image-dtb-probe"
          BUILD="$PWD/workspace/gki-integrated-out"
          SEED="$PWD/workspace/workflow52-seed/a52xq-5.10-resolved.config"
          rm -rf "$OUT" "$BUILD"
          mkdir -p "$OUT/logs" "$BUILD"
          cp "$SEED" "$BUILD/.config"

          while read -r symbol; do
            test -z "$symbol" && continue
            gki/common/scripts/config --file "$BUILD/.config" --enable "${symbol#CONFIG_}"
          done <<'SYMBOLS'
          CONFIG_ARCH_QCOM
          CONFIG_OF
          CONFIG_GPIOLIB
          CONFIG_COMMON_CLK_QCOM
          CONFIG_QCOM_GDSC
          CONFIG_PINCTRL_MSM
          CONFIG_DEBUG_FS
          CONFIG_SDM_GCC_LAGOON
          CONFIG_PINCTRL_LAGOON
          CONFIG_QCOM_LLCC
          CONFIG_CAM_CC_LAGOON
          CONFIG_DISP_CC_LAGOON
          CONFIG_GPU_CC_LAGOON
          CONFIG_VIDEO_CC_LAGOON
          CONFIG_NPU_CC_LAGOON
          CONFIG_QCOM_CLK_DEBUG
          CONFIG_DEBUG_CC_LAGOON
          CONFIG_QCOM_SCM
          CONFIG_HWSPINLOCK
          CONFIG_QCOM_SMEM
          CONFIG_OF_RESERVED_MEM
          CONFIG_QCOM_COMMAND_DB
          CONFIG_QCOM_RPMH
          CONFIG_MAILBOX
          CONFIG_PM
          CONFIG_QCOM_AOSS_QMP
          CONFIG_QCOM_GENI_SE
          CONFIG_INTERCONNECT
          CONFIG_INTERCONNECT_QCOM
          CONFIG_INTERCONNECT_QCOM_RPMH_POSSIBLE
          CONFIG_INTERCONNECT_QCOM_SM6350
          CONFIG_IOMMU_SUPPORT
          CONFIG_ARM_SMMU
          CONFIG_REGULATOR
          CONFIG_REGULATOR_QCOM_RPMH
          CONFIG_GENERIC_PHY
          CONFIG_PHY_QCOM_QMP
          CONFIG_SCSI
          CONFIG_SCSI_DMA
          CONFIG_SCSI_UFSHCD
          CONFIG_SCSI_UFSHCD_PLATFORM
          CONFIG_SCSI_UFS_QCOM
          CONFIG_BLK_INLINE_ENCRYPTION
          CONFIG_SCSI_UFS_CRYPTO
          CONFIG_EROFS_FS
          CONFIG_EROFS_FS_XATTR
          CONFIG_EROFS_FS_ZIP
          CONFIG_F2FS_FS
          CONFIG_F2FS_FS_XATTR
          CONFIG_F2FS_FS_POSIX_ACL
          CONFIG_F2FS_FS_COMPRESSION
          CONFIG_FS_ENCRYPTION
          CONFIG_FS_ENCRYPTION_INLINE_CRYPT
          CONFIG_FS_VERITY
          CONFIG_BLOCK
          CONFIG_BLK_DEV_DM
          CONFIG_BLK_DEV_DM_BUILTIN
          CONFIG_DM_INIT
          CONFIG_DM_UEVENT
          CONFIG_DM_VERITY
          CONFIG_DM_VERITY_FEC
          CONFIG_CRYPTO
          CONFIG_DM_CRYPT
          CONFIG_DM_DEFAULT_KEY
          CONFIG_CGROUPS
          CONFIG_CGROUP_FREEZER
          CONFIG_BLK_CGROUP
          CONFIG_BLK_CGROUP_RWSTAT
          CONFIG_TTY
          CONFIG_SERIAL_CORE
          CONFIG_SERIAL_EARLYCON
          CONFIG_SERIAL_QCOM_GENI
          CONFIG_SERIAL_QCOM_GENI_CONSOLE
          CONFIG_PSTORE
          CONFIG_PSTORE_CONSOLE
          CONFIG_PSTORE_PMSG
          CONFIG_PSTORE_RAM
          SYMBOLS

          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            > "$OUT/logs/olddefconfig.log" 2>&1
          python3 scripts/62_build_a52xq_integrated_probe.py audit \
            --config "$BUILD/.config" --output "$OUT"
          gki/common/scripts/diffconfig "$SEED" "$BUILD/.config" \
            > "$OUT/integrated-config-diff.txt" || true
          git -C gki/common diff --binary --no-ext-diff \
            > "$OUT/integrated-port.patch"
          test -s "$OUT/integrated-port.patch"

      - name: Build integrated Image and Lagoon DTB
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-integrated-image-dtb-probe"
          BUILD="$PWD/workspace/gki-integrated-out"
          STATUS="$PWD/workspace/workflow62-build-status.tsv"
          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          "$CLANG" --version | tee "$OUT/logs/toolchain.log"
          printf 'target\tresult\texit_code\tbytes\n' > "$STATUS"

          set +e
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            KCFLAGS=-Wno-error=frame-larger-than Image \
            > "$OUT/logs/Image.log" 2>&1
          image_rc=$?
          set -e
          image_result=failed
          image_bytes=0
          if test "$image_rc" -eq 0 && test -s "$BUILD/arch/arm64/boot/Image"; then
            image_result=built
            image_bytes="$(stat -c %s "$BUILD/arch/arm64/boot/Image")"
            cp "$BUILD/arch/arm64/boot/Image" "$OUT/Image-NOT-FLASHABLE"
          fi
          printf 'Image\t%s\t%s\t%s\n' "$image_result" "$image_rc" "$image_bytes" >> "$STATUS"

          SOURCE="$PWD/gki/common/arch/arm64/boot/dts/qcom/lagoon-earlyboot-probe.dts"
          PREPROCESSED="$BUILD/lagoon-earlyboot-probe.preprocessed.dts"
          DTB="$BUILD/lagoon-earlyboot-probe.dtb"
          set +e
          cpp -nostdinc -undef -D__DTS__ -x assembler-with-cpp \
            -I "$PWD/gki/common/arch/arm64/boot/dts/qcom" \
            -I "$PWD/gki/common/include" \
            -I "$PWD/gki/common/scripts/dtc/include-prefixes" \
            "$SOURCE" "$PREPROCESSED" > "$OUT/logs/Lagoon-DTB.log" 2>&1
          cpp_rc=$?
          dtb_rc=$cpp_rc
          if test "$cpp_rc" -eq 0; then
            dtc -I dts -O dtb -@ -o "$DTB" "$PREPROCESSED" \
              >> "$OUT/logs/Lagoon-DTB.log" 2>&1
            dtb_rc=$?
          fi
          set -e
          dtb_result=failed
          dtb_bytes=0
          if test "$dtb_rc" -eq 0 && test -s "$DTB"; then
            dtb_result=compiled
            dtb_bytes="$(stat -c %s "$DTB")"
            cp "$DTB" "$OUT/lagoon-earlyboot-probe-NOT-FLASHABLE.dtb"
          fi
          printf 'Lagoon-DTB\t%s\t%s\t%s\n' "$dtb_result" "$dtb_rc" "$dtb_bytes" >> "$STATUS"

          python3 scripts/62_build_a52xq_integrated_probe.py finalize \
            --output "$OUT" --status-file "$STATUS"
          cat "$STATUS"

      - name: Enforce integrated build invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-integrated-image-dtb-probe
          test -s "$OUT/INTEGRATED-BUILD-REPORT.md"
          test -s "$OUT/build-status.tsv"
          test -s "$OUT/integrated.config"
          test -s "$OUT/integrated-config-status.tsv"
          test -s "$OUT/integrated-port.patch"
          test -s "$OUT/analysis-metadata.txt"
          test -s "$OUT/SHA256SUMS"
          grep -Fqx $'Image\tbuilt\t0' <(cut -f1-3 "$OUT/build-status.tsv")
          grep -Fqx $'Lagoon-DTB\tcompiled\t0' <(cut -f1-3 "$OUT/build-status.tsv")
          test -s "$OUT/Image-NOT-FLASHABLE"
          test -s "$OUT/lagoon-earlyboot-probe-NOT-FLASHABLE.dtb"
          ! find "$OUT" -type f \( -name boot.img -o -name vendor_boot.img -o -name recovery.img \) | grep -q .
          (cd "$OUT" && sha256sum -c SHA256SUMS)
          cat "$OUT/analysis-metadata.txt"
          sed -n '1,360p' "$OUT/INTEGRATED-BUILD-REPORT.md"

      - name: Upload integrated non-flashable Image and DTB probe
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-integrated-image-dtb-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-integrated-image-dtb-probe
          if-no-files-found: error
          retention-days: 30

      - name: Upload Workflow 62 failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-integrated-image-dtb-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-integrated-image-dtb-probe/
            workspace/workflow62-build-status.tsv
            workspace/gki-integrated-out/.config
          if-no-files-found: warn
          retention-days: 7
