name: 88 - Fix Workflow 84 linewise

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/88-fix-workflow84-linewise.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply minimal linewise patch
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/84-a52-recovery-ramoops-raw-exporter.yml')
          lines = path.read_text().splitlines()
          out = []
          removed_misc_assert = False
          changed_config = False
          added_debugfs_assert = False

          for line in lines:
              if line.strip() == '-e MISC_DEVICES -e IKCONFIG -e IKCONFIG_PROC \\':
                  out.append(line.replace('-e MISC_DEVICES ', ''))
                  changed_config = True
                  continue

              if line.strip() == '-e PSTORE -e PSTORE_RAM -e PSTORE_CONSOLE -e PSTORE_PMSG':
                  out.append(line + ' \\')
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(indent + '-d DEVMEM -d PROC_KCORE -d DEBUG_FS')
                  changed_config = True
                  continue

              if "grep -Fxq 'CONFIG_MISC_DEVICES=y'" in line:
                  removed_misc_assert = True
                  continue

              out.append(line)
              if "grep -Fxq '# CONFIG_PROC_KCORE is not set'" in line:
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(indent + "grep -Fxq '# CONFIG_DEBUG_FS is not set' \"$OUT/final.config\"")
                  added_debugfs_assert = True

          if not changed_config:
              raise SystemExit('config lines were not changed')
          if not removed_misc_assert:
              raise SystemExit('CONFIG_MISC_DEVICES assertion was not found')
          if not added_debugfs_assert:
              raise SystemExit('DEBUG_FS assertion was not added')

          text = '\n'.join(out) + '\n'
          path.write_text(text)
          PY

          git diff --check
          grep -Fq -- '-d DEVMEM -d PROC_KCORE -d DEBUG_FS' .github/workflows/84-a52-recovery-ramoops-raw-exporter.yml
          ! grep -Fq "CONFIG_MISC_DEVICES=y" .github/workflows/84-a52-recovery-ramoops-raw-exporter.yml
          grep -Fq "# CONFIG_DEBUG_FS is not set" .github/workflows/84-a52-recovery-ramoops-raw-exporter.yml

      - name: Commit Workflow 84 fix
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/84-a52-recovery-ramoops-raw-exporter.yml
          git commit -m 'Fix recovery exporter audit assertions'
          git push origin HEAD:main
