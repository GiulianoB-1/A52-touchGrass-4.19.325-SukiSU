name: 67 - A52 GKI 5.10 native QSMMUv500 object probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/67-a52-gki-5.10-native-qsmmuv500-object-probe.yml
      - scripts/67_stage_a52xq_native_qsmmuv500.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-native-qsmmuv500-object-probe
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  SEED_ARTIFACT_ID: '8413697551'
  SEED_CONFIG_SHA256: b4da88c027cb7d3efad948b0f0986ee24d968dedcf14499d360f4e0c623cf01a

jobs:
  probe:
    name: Compile GKI-native A52 QSMMUv500 objects
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 43 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 67 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install compile-probe dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc g++ python3 bc bison flex \
            clang lld llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev rsync cpio lz4 file dwarves

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate and clean GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          test -x gki/common/scripts/config
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

      - name: Obtain Workflow 52 resolved configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workspace/workflow52-seed
          ZIP=workspace/workflow52-seed/seed.zip
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o "$ZIP" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SEED_ARTIFACT_ID}/zip"
          unzip -p "$ZIP" a52xq-5.10-resolved.config \
            > workspace/workflow52-seed/a52xq-5.10-resolved.config
          printf '%s  %s\n' "$SEED_CONFIG_SHA256" \
            workspace/workflow52-seed/a52xq-5.10-resolved.config | sha256sum -c -

      - name: Stage native GKI QSMMUv500 support
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-native-qsmmuv500-object-probe
          rm -rf "$OUT" workspace/gki-native-qsmmuv500-out
          mkdir -p "$OUT/logs" workspace/gki-native-qsmmuv500-out
          python3 scripts/67_stage_a52xq_native_qsmmuv500.py \
            --gki gki/common \
            --output "$OUT"
          test -s "$OUT/native-qsmmuv500.patch"
          test -s "$OUT/analysis-metadata.txt"
          test -s "$OUT/PORTING-PROBE-REPORT.md"
          git -C gki/common diff --check
          grep -Fq 'qcom,qsmmu-v500' \
            gki/common/drivers/iommu/arm/arm-smmu/arm-smmu.c
          grep -Fq 'qcom,qsmmu-v500' \
            gki/common/drivers/iommu/arm/arm-smmu/arm-smmu-impl.c

      - name: Compile native ARM-SMMU object set
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-native-qsmmuv500-object-probe"
          BUILD="$PWD/workspace/gki-native-qsmmuv500-out"
          BASE="$PWD/workspace/workflow52-seed/a52xq-5.10-resolved.config"
          STATUS="$OUT/compile-status.tsv"
          TARGETS=(
            drivers/iommu/arm/arm-smmu/arm-smmu.o
            drivers/iommu/arm/arm-smmu/arm-smmu-impl.o
            drivers/iommu/arm/arm-smmu/arm-smmu-qcom.o
          )

          cp "$BASE" "$BUILD/.config"
          for symbol in \
            ARCH_QCOM OF IOMMU_SUPPORT ARM_SMMU ARM_SMMU_IMPL \
            QCOM_SCM QCOM_SMEM INTERCONNECT PCI ACPI DEBUG_FS; do
            gki/common/scripts/config --file "$BUILD/.config" --enable "$symbol"
          done
          gki/common/scripts/config --file "$BUILD/.config" --disable TRIM_UNUSED_KSYMS
          gki/common/scripts/config --file "$BUILD/.config" --set-str UNUSED_KSYMS_WHITELIST ''

          CLANG="$(readlink -f "$(command -v clang)")"
          export PATH="$(dirname "$CLANG"):$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          "$CLANG" --version | tee "$OUT/logs/toolchain.log"

          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig \
            > "$OUT/logs/olddefconfig.log" 2>&1
          cp "$BUILD/.config" "$OUT/resolved.config"

          rc=0
          make -C gki/common O="$BUILD" ARCH=arm64 LLVM=1 LLVM_IAS=1 -j4 \
            "${TARGETS[@]}" > "$OUT/logs/native-qsmmuv500.log" 2>&1 || rc=$?

          result=compile-failed
          objects_produced=no
          compatible_in_objects=no
          qcom_impl_selector_in_objects=no

          if test "$rc" -eq 0; then
            objects_produced=yes
            for target in "${TARGETS[@]}"; do
              test -s "$BUILD/$target" || objects_produced=no
            done
          fi

          if test "$objects_produced" = yes; then
            if strings "$BUILD/${TARGETS[0]}" | grep -Fxq 'qcom,qsmmu-v500'; then
              compatible_in_objects=yes
            fi
            if strings "$BUILD/${TARGETS[1]}" | grep -Fxq 'qcom,qsmmu-v500'; then
              qcom_impl_selector_in_objects=yes
            fi
          fi

          if test "$rc" -eq 0 \
             && test "$objects_produced" = yes \
             && test "$compatible_in_objects" = yes \
             && test "$qcom_impl_selector_in_objects" = yes; then
            result=compiled
          fi

          printf 'result\texit_code\tobjects_produced\tcompatible_in_objects\tqcom_impl_selector_in_objects\n%s\t%s\t%s\t%s\t%s\n' \
            "$result" "$rc" "$objects_produced" "$compatible_in_objects" \
            "$qcom_impl_selector_in_objects" > "$STATUS"
          cat "$STATUS"

          {
            echo '## Compile result'
            echo
            echo "- Result: \`$result\`"
            echo "- Exit code: \`$rc\`"
            echo "- Objects produced: \`$objects_produced\`"
            echo "- Compatible present in ARM-SMMU object: \`$compatible_in_objects\`"
            echo "- Qualcomm implementation selector present: \`$qcom_impl_selector_in_objects\`"
            echo
            echo '## First diagnostics'
            echo
            grep -E 'error:|fatal error:|warning:' "$OUT/logs/native-qsmmuv500.log" \
              | head -80 | sed 's/^/- `/' | sed 's/$/`/' || true
          } >> "$OUT/PORTING-PROBE-REPORT.md"

          {
            echo "compile_result=$result"
            echo "compile_exit_code=$rc"
            echo "objects_produced=$objects_produced"
            echo "compatible_in_objects=$compatible_in_objects"
            echo "qcom_impl_selector_in_objects=$qcom_impl_selector_in_objects"
          } >> "$OUT/analysis-metadata.txt"

          (
            cd "$OUT"
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )

      - name: Validate native QSMMUv500 probe artifact
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-native-qsmmuv500-object-probe
          test -s "$OUT/PORTING-PROBE-REPORT.md"
          test -s "$OUT/native-qsmmuv500.patch"
          test -s "$OUT/compile-status.tsv"
          test -s "$OUT/resolved.config"
          test -s "$OUT/analysis-metadata.txt"
          test -s "$OUT/SHA256SUMS"
          grep -Fxq \
            'artifact_type=a52xq-gki-5.10-native-qsmmuv500-object-probe-not-flashable' \
            "$OUT/analysis-metadata.txt"
          grep -Fxq \
            'source_strategy=extend-native-gki-arm-smmu-not-transplant-legacy-driver' \
            "$OUT/analysis-metadata.txt"
          grep -Fxq 'image_build=no' "$OUT/analysis-metadata.txt"
          grep -Fxq 'boot_test=no' "$OUT/analysis-metadata.txt"
          grep -Fxq 'flashable=no' "$OUT/analysis-metadata.txt"
          ! find "$OUT" -type f \( -name Image -o -name boot.img -o -name '*.dtb' \) | grep -q .
          (cd "$OUT" && sha256sum -c SHA256SUMS)
          sed -n '1,400p' "$OUT/PORTING-PROBE-REPORT.md"

      - name: Upload native QSMMUv500 probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-native-qsmmuv500-object-probe-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-native-qsmmuv500-object-probe
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce native QSMMUv500 compile result
        run: |
          set -Eeuo pipefail
          STATUS=artifacts/a52xq-gki-5.10-native-qsmmuv500-object-probe/compile-status.tsv
          test "$(awk -F '\t' 'NR == 2 {print $1}' "$STATUS")" = compiled
          test "$(awk -F '\t' 'NR == 2 {print $3}' "$STATUS")" = yes
          test "$(awk -F '\t' 'NR == 2 {print $4}' "$STATUS")" = yes
          test "$(awk -F '\t' 'NR == 2 {print $5}' "$STATUS")" = yes
