name: 56 - A52 GKI 5.10 Lagoon early-boot DT compile probe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/56-a52-gki-5.10-lagoon-earlyboot-dt-probe.yml
      - scripts/53_probe_a52xq_lagoon_phase1.py
      - scripts/54_probe_a52xq_lagoon_clocks_phase2.py
      - scripts/55_probe_a52xq_lagoon_remaining_clocks.py
      - scripts/56_probe_a52xq_lagoon_earlyboot_dt.py

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: a52-gki-5.10-lagoon-earlyboot-dt-probe
  cancel-in-progress: true

env:
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd
  TOUCHGRASS_COMMIT: 6bf351bdf18bdb228db79e66f14a7a9c0178e5d7
  SEED_ARTIFACT_ID: '8413697551'
  SEED_CONFIG_SHA256: b4da88c027cb7d3efad948b0f0986ee24d968dedcf14499d360f4e0c623cf01a

jobs:
  probe:
    name: Compile-probe minimal Lagoon early-boot device tree
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Publish direct run link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 30 --repo "$GITHUB_REPOSITORY" --body \
            "Workflow 56 run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Commit: \`${GITHUB_SHA}\`
          Event: \`${GITHUB_EVENT_NAME}\`"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install device-tree probe dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl ca-certificates unzip make gcc python3 \
            device-tree-compiler bc bison flex libssl-dev libelf-dev rsync cpio lz4 file

      - name: Restore pinned official GKI 5.10 source
        id: gki-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-android12-5.10-2026-04_r1-${{ env.GKI_COMMON_SHA }}

      - name: Validate and clean GKI source
        run: |
          set -Eeuo pipefail
          test '${{ steps.gki-cache.outputs.cache-hit }}' = true
          test -d gki/common/.git
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          test "$(make -s -C gki/common kernelversion)" = 5.10.252
          git -C gki/common reset --hard "${GKI_COMMON_SHA}"
          git -C gki/common clean -fd

      - name: Restore working touchGrass Linux 4.19.200 source
        id: touchgrass-cache
        uses: actions/cache/restore@v4
        with:
          path: workspace/touchgrass-a52xq
          key: a52xq-touchgrass-linux-4.19.200-main-v2-${{ runner.os }}-${{ env.TOUCHGRASS_COMMIT }}

      - name: Validate touchGrass source
        run: |
          set -Eeuo pipefail
          test '${{ steps.touchgrass-cache.outputs.cache-hit }}' = true
          test -d workspace/touchgrass-a52xq/.git
          test "$(git -C workspace/touchgrass-a52xq rev-parse HEAD)" = "${TOUCHGRASS_COMMIT}"
          test "$(make -s -C workspace/touchgrass-a52xq kernelversion)" = 4.19.200
          test -s workspace/touchgrass-a52xq/arch/arm64/boot/dts/vendor/qcom/lagoon.dtsi

      - name: Obtain Workflow 52 resolved configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p workspace/workflow52-seed artifacts/logs
          ZIP=workspace/workflow52-seed/seed.zip
          curl -fL --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o "$ZIP" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SEED_ARTIFACT_ID}/zip"
          unzip -p "$ZIP" a52xq-5.10-resolved.config \
            > workspace/workflow52-seed/a52xq-5.10-resolved.config
          printf '%s  %s\n' "$SEED_CONFIG_SHA256" \
            workspace/workflow52-seed/a52xq-5.10-resolved.config | sha256sum -c -

      - name: Stage completed Lagoon clock and pinctrl phases
        run: |
          set -Eeuo pipefail
          rm -rf workspace/workflow56-phase1 workspace/workflow56-phase2 workspace/workflow56-phase3
          python3 scripts/53_probe_a52xq_lagoon_phase1.py stage \
            --gki gki/common \
            --touchgrass workspace/touchgrass-a52xq \
            --seed-config workspace/workflow52-seed/a52xq-5.10-resolved.config \
            --output workspace/workflow56-phase1
          python3 scripts/54_probe_a52xq_lagoon_clocks_phase2.py stage \
            --gki gki/common \
            --touchgrass workspace/touchgrass-a52xq \
            --output workspace/workflow56-phase2
          python3 scripts/55_probe_a52xq_lagoon_remaining_clocks.py stage \
            --gki gki/common \
            --touchgrass workspace/touchgrass-a52xq \
            --output workspace/workflow56-phase3

      - name: Stage minimal Lagoon base device tree
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-lagoon-earlyboot-dt-probe
          rm -rf "$OUT" workspace/gki-lagoon-earlyboot-dt-out
          mkdir -p "$OUT/logs" workspace/gki-lagoon-earlyboot-dt-out
          python3 scripts/56_probe_a52xq_lagoon_earlyboot_dt.py stage \
            --gki gki/common \
            --touchgrass workspace/touchgrass-a52xq \
            --output "$OUT"
          git -C gki/common diff --check > "$OUT/logs/port-diff-check.log" 2>&1 || true
          test -s "$OUT/lagoon-earlyboot-dt-port.patch"
          test -s "$OUT/local-include-graph.tsv"
          test -s "$OUT/binding-resolution.tsv"
          test -s "$OUT/analysis-metadata.txt"

      - name: Preprocess and compile minimal Lagoon base DT
        run: |
          set -Eeuo pipefail
          OUT="$PWD/artifacts/a52xq-gki-5.10-lagoon-earlyboot-dt-probe"
          WORK="$PWD/workspace/gki-lagoon-earlyboot-dt-out"
          SOURCE="$PWD/gki/common/arch/arm64/boot/dts/qcom/lagoon-earlyboot-probe.dts"
          PREPROCESSED="$WORK/lagoon-earlyboot-probe.preprocessed.dts"
          DTB="$WORK/lagoon-earlyboot-probe.dtb"
          LOG="$OUT/logs/lagoon-base-dt.log"
          STATUS="$PWD/workspace/workflow56-compile-status.tsv"

          printf 'probe\tpreprocess_result\tdtc_result\texit_code\tpreprocessed_bytes\tdtb_bytes\n' > "$STATUS"

          set +e
          cpp -nostdinc -undef -D__DTS__ -x assembler-with-cpp \
            -I "$PWD/gki/common/arch/arm64/boot/dts/qcom" \
            -I "$PWD/gki/common/include" \
            -I "$PWD/gki/common/scripts/dtc/include-prefixes" \
            "$SOURCE" "$PREPROCESSED" > "$LOG" 2>&1
          cpp_rc=$?
          set -e

          preprocess_result=failed
          dtc_result=skipped
          rc=$cpp_rc
          if test "$cpp_rc" -eq 0 && test -s "$PREPROCESSED"; then
            preprocess_result=passed
            cp "$PREPROCESSED" "$OUT/lagoon-earlyboot-probe.preprocessed.dts"
            set +e
            dtc -I dts -O dtb -@ -o "$DTB" "$PREPROCESSED" >> "$LOG" 2>&1
            dtc_rc=$?
            set -e
            rc=$dtc_rc
            if test "$dtc_rc" -eq 0 && test -s "$DTB"; then
              dtc_result=compiled
              cp "$DTB" "$OUT/lagoon-earlyboot-probe.dtb"
            else
              dtc_result=failed
            fi
          fi

          preprocessed_bytes=0
          dtb_bytes=0
          test ! -f "$PREPROCESSED" || preprocessed_bytes="$(stat -c %s "$PREPROCESSED")"
          test ! -f "$DTB" || dtb_bytes="$(stat -c %s "$DTB")"
          printf 'lagoon-base-dt\t%s\t%s\t%s\t%s\t%s\n' \
            "$preprocess_result" "$dtc_result" "$rc" \
            "$preprocessed_bytes" "$dtb_bytes" >> "$STATUS"

          python3 scripts/56_probe_a52xq_lagoon_earlyboot_dt.py finalize \
            --output "$OUT" --status-file "$STATUS"
          cat "$STATUS"

      - name: Enforce device-tree probe invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/a52xq-gki-5.10-lagoon-earlyboot-dt-probe
          test -s "$OUT/PORTING-PROBE-REPORT.md"
          test -s "$OUT/compile-status.tsv"
          test -s "$OUT/lagoon-earlyboot-dt-port.patch"
          test -s "$OUT/binding-resolution.tsv"
          test -s "$OUT/analysis-metadata.txt"
          test -s "$OUT/SHA256SUMS"
          test "$(tail -n +2 "$OUT/compile-status.tsv" | wc -l)" -eq 1
          grep -Fxq \
            'artifact_type=a52xq-gki-5.10-lagoon-earlyboot-dt-compile-probe-not-flashable' \
            "$OUT/analysis-metadata.txt"
          ! find "$OUT" -type f \( -name Image -o -name boot.img \) | grep -q .
          (cd "$OUT" && sha256sum -c SHA256SUMS)
          cat "$OUT/analysis-metadata.txt"
          sed -n '1,320p' "$OUT/PORTING-PROBE-REPORT.md"

      - name: Upload non-flashable Lagoon early-boot DT probe
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-lagoon-earlyboot-dt-probe-${{ github.run_number }}-NOT-FLASHABLE
          path: artifacts/a52xq-gki-5.10-lagoon-earlyboot-dt-probe
          if-no-files-found: error
          retention-days: 30

      - name: Upload Workflow 56 failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-gki-5.10-lagoon-earlyboot-dt-failure-${{ github.run_number }}
          path: |
            artifacts/a52xq-gki-5.10-lagoon-earlyboot-dt-probe/
            workspace/workflow56-compile-status.tsv
            workspace/gki-lagoon-earlyboot-dt-out/
          if-no-files-found: warn
          retention-days: 7
