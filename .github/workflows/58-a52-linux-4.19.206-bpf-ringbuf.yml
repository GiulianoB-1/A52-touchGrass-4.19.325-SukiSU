name: 58 - A52 Linux 4.19.206 BPF ring-buffer backport

on:
  pull_request:
    paths:
      - '.github/workflows/58-a52-linux-4.19.206-bpf-ringbuf.yml'
      - 'scripts/58_*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a52-4.19.206-bpf-ringbuf-${{ github.ref }}
  cancel-in-progress: true

env:
  JOBS: '4'
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G
  ANYKERNEL_COMMIT: 1c9a500dd4aa8081952523126e97eb155aed941b
  LABEL: touchgrass-4.19.206-resukisu-v4.1.0-susfs-v1.4.2-manual-core

jobs:
  build:
    name: Backport, audit and build BPF ring-buffer support
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl xz-utils zip unzip make gcc g++ bc bison flex ccache patch \
            libssl-dev libelf-dev python3 rsync cpio lz4 binutils file tar

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: a52xq-4.19.206-bpf-ringbuf-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a52xq-4.19.206-manual-susfs-detection-${{ runner.os }}-
            a52xq-4.19.200-manual-susfs-core-${{ runner.os }}-

      - name: Prepare exact touchGrass source
        run: |
          chmod +x scripts/*.sh scripts/*.py
          ./scripts/01_prepare_source.sh

      - name: Apply reviewed Linux 4.19.153 update
        run: ./scripts/03_apply_linux_4.19.153.sh

      - name: Apply reviewed Linux 4.19.154 update
        run: ./scripts/04_apply_linux_4.19.154.sh

      - name: Apply and resolve Linux 4.19.154 to 4.19.159
        run: |
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.154 4.19.159
          ./scripts/checkpoint_resolve_linux_4.19.159.sh

      - name: Apply and resolve Linux 4.19.159 to 4.19.164
        run: |
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.159 4.19.164
          ./scripts/checkpoint_resolve_linux_4.19.164.sh

      - name: Apply and resolve Linux 4.19.164 to 4.19.180
        run: |
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.164 4.19.180
          ./scripts/checkpoint_resolve_linux_4.19.180.sh

      - name: Apply and resolve Linux 4.19.180 to 4.19.200
        run: |
          ./scripts/05a_diagnose_linux_checkpoint.sh 4.19.180 4.19.200
          ./scripts/checkpoint_resolve_linux_4.19.200.sh

      - name: Update Linux 4.19.200 to 4.19.206
        run: ./scripts/57_update_linux_4.19.200_to_4.19.206.sh

      - name: Backport Android 4.19 BPF ring-buffer ABI
        run: ./scripts/58_backport_bpf_ringbuf.sh

      - name: Apply latest Android 4.19 reservation-overrun fix
        run: ./scripts/58_apply_ringbuf_overrun_fix.sh

      - name: Replace legacy exec dispatch with working manual hook
        run: ./scripts/07_patch_resukisu_exec_hook.sh

      - name: Build ReSukiSU, SUSFS detection and BPF ring buffer
        run: |
          set -o pipefail
          ./scripts/57_build_resukisu_susfs_manual_detection.sh \
            2>&1 | tee artifacts/linux-4.19.206-bpf-ringbuf-build.log

      - name: Compare final config with hardware-tested baseline
        run: |
          python3 scripts/56_compare_config_to_working_baseline.py \
            "artifacts/config-${LABEL}" \
            artifacts/bpf-ringbuf-config-comparison.txt
          cat artifacts/bpf-ringbuf-config-comparison.txt

      - name: Audit compiled ring-buffer symbols and ABI
        run: |
          set -Eeuo pipefail
          KERNEL=workspace/touchgrass-a52xq
          VMLINUX="$KERNEL/out/vmlinux"
          test -s "$VMLINUX"
          nm -n "$VMLINUX" | grep -E ' [Tt] bpf_ringbuf_(output|reserve|submit|discard|query)' \
            | tee artifacts/bpf-ringbuf-vmlinux-symbols.txt
          grep -Fq 'BPF_MAP_TYPE_RINGBUF' "$KERNEL/include/uapi/linux/bpf.h"
          for helper in ringbuf_output ringbuf_reserve ringbuf_submit ringbuf_discard ringbuf_query; do
            grep -Fq "FN(${helper})" "$KERNEL/include/uapi/linux/bpf.h"
          done
          grep -Fq 'const struct bpf_map_ops ringbuf_map_ops' "$KERNEL/kernel/bpf/ringbuf.c"
          grep -Fq 'unsigned long pending_pos;' "$KERNEL/kernel/bpf/ringbuf.c"
          grep -Fq 'new_prod_pos - pend_pos' "$KERNEL/kernel/bpf/ringbuf.c"
          {
            echo 'compiled_ringbuf_symbols=passed'
            echo 'uapi_map_type=passed'
            echo 'uapi_five_helpers=passed'
            echo 'reservation_overrun_fix=passed'
            echo 'hardware_validated=no'
          } | tee artifacts/bpf-ringbuf-compiled-audit.txt

      - name: Check out pinned AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          ref: ${{ env.ANYKERNEL_COMMIT }}
          path: packaging/AnyKernel3
          fetch-depth: 1

      - name: Package rollback-friendly hardware-test ZIP
        run: |
          cp scripts/09_package_a52xq_anykernel.sh scripts/.package-bpf-ringbuf.sh
          sed -i "s/grep -Fxq '# CONFIG_KSU_SUSFS is not set'/grep -Fxq 'CONFIG_KSU_SUSFS=y'/" scripts/.package-bpf-ringbuf.sh
          sed -i 's/SUSFS must remain disabled for this package/Kernel config does not enable SUSFS core/' scripts/.package-bpf-ringbuf.sh
          sed -i 's/susfs=disabled/susfs=core-only-manual-hooks-detection-api; bpf-ringbuf=enabled/' scripts/.package-bpf-ringbuf.sh
          sed -i 's/SUSFS: disabled/SUSFS: v1.4.2 core with detection API; BPF ring buffer: backported/' scripts/.package-bpf-ringbuf.sh
          sed -i 's/ReSukiSU-v4.1.0-BUILD-VERIFIED-FLASHABLE.zip/ReSukiSU-v4.1.0-SUSFS-v1.4.2-BPF-RINGBUF-TEST.zip/' scripts/.package-bpf-ringbuf.sh
          sed -i 's/kernel.string=touchGrass A52xq Linux \$TARGET_VERSION + ReSukiSU v4.1.0/kernel.string=touchGrass A52xq Linux \$TARGET_VERSION + ReSukiSU v4.1.0 + SUSFS detection + BPF ringbuf/' scripts/.package-bpf-ringbuf.sh
          chmod +x scripts/.package-bpf-ringbuf.sh
          ./scripts/.package-bpf-ringbuf.sh \
            4.19.206 \
            "artifacts/Image-${LABEL}" \
            packaging/AnyKernel3 \
            release
          rm -f scripts/.package-bpf-ringbuf.sh

      - name: Record source diagnostics
        if: always()
        run: |
          mkdir -p artifacts
          df -h > artifacts/runner-disk.txt
          free -h > artifacts/runner-memory.txt
          uname -a > artifacts/runner-uname.txt
          ccache --show-stats > artifacts/ccache-final.txt 2>&1 || true
          if [ -d workspace/touchgrass-a52xq/.git ]; then
            git -C workspace/touchgrass-a52xq status --short > artifacts/kernel-source-status.txt || true
            git -C workspace/touchgrass-a52xq diff --stat > artifacts/kernel-source-diff.stat.txt || true
            git -C workspace/touchgrass-a52xq diff --check > artifacts/kernel-source-diff-check.txt 2>&1 || true
            git -C workspace/touchgrass-a52xq log --oneline -15 > artifacts/kernel-source-log.txt || true
          fi

      - name: Upload BPF ring-buffer hardware-test ZIP
        uses: actions/upload-artifact@v4
        with:
          name: A52XQ-4.19.206-ReSukiSU-SUSFS-BPF-RINGBUF-TEST-${{ github.run_number }}
          path: release/
          if-no-files-found: error
          retention-days: 14

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a52xq-4.19.206-bpf-ringbuf-${{ github.run_number }}-diagnostics
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
