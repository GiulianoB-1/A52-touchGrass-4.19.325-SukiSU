name: 85 - Inspect Workflow 84 failure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/85-inspect-workflow84-failure.yml'

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-22.04
    steps:
      - name: Download and summarize failed job log
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          JOB_ID: '88107053852'
        run: |
          set -Eeuo pipefail
          gh api "repos/${REPO}/actions/jobs/${JOB_ID}/logs" > workflow84-job.log
          python3 - <<'PY'
          from pathlib import Path
          import re

          lines = Path('workflow84-job.log').read_text(errors='replace').splitlines()
          patterns = [
              re.compile(r'error:', re.I),
              re.compile(r'undefined reference', re.I),
              re.compile(r'no rule to make target', re.I),
              re.compile(r'build failed', re.I),
              re.compile(r'command failed', re.I),
              re.compile(r'Process completed with exit code', re.I),
              re.compile(r'FAILED:', re.I),
          ]
          hits = []
          for i, line in enumerate(lines):
              if any(p.search(line) for p in patterns):
                  hits.append(i)
          selected = []
          seen = set()
          for i in hits:
              for j in range(max(0, i - 5), min(len(lines), i + 6)):
                  if j not in seen:
                      seen.add(j)
                      selected.append((j + 1, lines[j]))
          selected.sort()
          if not selected:
              selected = list(enumerate(lines[-120:], start=max(1, len(lines)-119)))
          text = '\n'.join(f'{n}: {line}' for n, line in selected[-220:])
          Path('workflow84-failure-summary.txt').write_text(text + '\n')
          print(text)
          PY

      - name: Publish concise failure summary
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          BODY="Workflow 84 concise failure summary

\`\`\`
$(tail -n 220 workflow84-failure-summary.txt)
\`\`\`"
          gh api --method PATCH \
            "repos/${REPO}/issues/comments/5010467537" \
            -f body="$BODY"

      - uses: actions/upload-artifact@v4
        with:
          name: workflow84-failure-summary
          path: workflow84-failure-summary.txt
          if-no-files-found: error
          retention-days: 7
