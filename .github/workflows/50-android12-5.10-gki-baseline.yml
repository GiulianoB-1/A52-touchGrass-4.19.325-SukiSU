name: 50 - Android 12 GKI 5.10 baseline

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: android12-5.10-gki-baseline
  cancel-in-progress: true

env:
  JOBS: '4'
  GKI_MANIFEST_BRANCH: common-android12-5.10-2026-04
  GKI_COMMON_TAG: android12-5.10-2026-04_r1
  GKI_COMMON_SHA: f960ed27302b1ff8e61e152fc202554d778deccd

jobs:
  build:
    name: Build pinned official arm64 GKI 5.10 reference
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            repo git curl ca-certificates python3 make bc bison flex rsync cpio \
            libssl-dev libelf-dev lz4 zstd xz-utils gzip zip unzip dwarves file

      - name: Restore pinned GKI source cache
        id: gki-source-cache
        uses: actions/cache/restore@v4
        with:
          path: gki
          key: android12-5.10-gki-source-v1-${{ runner.os }}-${{ env.GKI_COMMON_TAG }}-${{ env.GKI_COMMON_SHA }}

      - name: Sync official GKI source on cache miss
        if: steps.gki-source-cache.outputs.cache-hit != 'true'
        run: |
          set -Eeuo pipefail
          rm -rf gki
          mkdir -p gki
          cd gki
          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b "${GKI_MANIFEST_BRANCH}" \
            --depth=1
          repo sync -c -j"${JOBS}" --no-tags --fail-fast
          git -C common fetch --depth=1 \
            https://android.googlesource.com/kernel/common \
            "refs/tags/${GKI_COMMON_TAG}"
          git -C common checkout --detach FETCH_HEAD
          test "$(git -C common rev-parse HEAD)" = "${GKI_COMMON_SHA}"

      - name: Validate cached or synced GKI source
        run: |
          set -Eeuo pipefail
          test -d gki/common/.git
          test -x gki/build/build.sh
          test "$(git -C gki/common rev-parse HEAD)" = "${GKI_COMMON_SHA}"
          git -C gki/common diff --check
          git -C gki/common show -s --format='common_commit=%H%ncommon_subject=%s%ncommon_date=%cI'

      - name: Save pinned GKI source cache
        if: steps.gki-source-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: gki
          key: ${{ steps.gki-source-cache.outputs.cache-primary-key }}

      - name: Build official GKI arm64 baseline
        run: |
          set -Eeuo pipefail
          chmod +x scripts/50_build_android12_5.10_gki_baseline.sh
          ./scripts/50_build_android12_5.10_gki_baseline.sh

      - name: Enforce reference-build invariants
        run: |
          set -Eeuo pipefail
          OUT=artifacts/android12-5.10-gki-baseline
          test -s "$OUT/Image"
          test -s "$OUT/Image.lz4"
          test -s "$OUT/gki-5.10.config"
          test -s "$OUT/build-metadata.txt"
          test -s "$OUT/SHA256SUMS"
          grep -Fxq 'artifact_type=official-gki-reference-not-flashable' "$OUT/build-metadata.txt"
          grep -Fxq "common_tag=${GKI_COMMON_TAG}" "$OUT/build-metadata.txt"
          grep -Fxq "common_commit=${GKI_COMMON_SHA}" "$OUT/build-metadata.txt"
          grep -Fxq 'CONFIG_ARM64=y' "$OUT/gki-5.10.config"
          grep -Fxq 'CONFIG_MODULES=y' "$OUT/gki-5.10.config"
          grep -Fxq 'CONFIG_ANDROID_BINDER_IPC=y' "$OUT/gki-5.10.config"
          (
            cd "$OUT"
            sha256sum -c SHA256SUMS
          )

      - name: Upload official GKI reference artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android12-5.10-2026-04-r1-arm64-gki-reference-${{ github.run_number }}-DO-NOT-FLASH
          path: artifacts/android12-5.10-gki-baseline
          if-no-files-found: error
          retention-days: 30

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android12-5.10-gki-baseline-diagnostics-${{ github.run_number }}
          path: |
            gki-out/dist
            artifacts/android12-5.10-gki-baseline
          if-no-files-found: warn
          retention-days: 14
